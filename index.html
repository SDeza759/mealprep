  (function() {
    console.log("Test 2: Expanded scale factors + protein rescue on failing combo");
    var testMeals = [
      { recipe: { name: "Japanese Tamagoyaki" }, ingredients: [
        { name: "Egg", grams: 150, calories: 216, carbs: 1.2, protein: 18.9, fat: 15, isSpice: false },
        { name: "White Rice", grams: 50, calories: 183, carbs: 40, protein: 3.6, fat: 0.3, isSpice: false },
        { name: "Soy Sauce", grams: 8, calories: 4, carbs: 0.5, protein: 0.7, fat: 0, isSpice: false },
        { name: "Miso Paste", grams: 15, calories: 30, carbs: 3.8, protein: 1.8, fat: 0.9, isSpice: false },
        { name: "Green Onion", grams: 10, calories: 3, carbs: 0.7, protein: 0.2, fat: 0, isSpice: false }
      ]},
      { recipe: { name: "Carnitas Tacos" }, ingredients: [
        { name: "Pork Shoulder", grams: 150, calories: 330, carbs: 0, protein: 33, fat: 21, isSpice: false },
        { name: "Corn Tortillas", grams: 90, calories: 190, carbs: 39, protein: 5, fat: 2.3, isSpice: false },
        { name: "Onion", grams: 40, calories: 16, carbs: 3.8, protein: 0.4, fat: 0.1, isSpice: false },
        { name: "Cilantro", grams: 10, calories: 2, carbs: 0.4, protein: 0.2, fat: 0.1, isSpice: false },
        { name: "Lime", grams: 15, calories: 5, carbs: 1.6, protein: 0.1, fat: 0, isSpice: false },
        { name: "Coleslaw Mix", grams: 40, calories: 9, carbs: 2, protein: 0.5, fat: 0, isSpice: false }
      ]},
      { recipe: { name: "Black Bean Bowl" }, ingredients: [
        { name: "Black Beans", grams: 130, calories: 171, carbs: 30.7, protein: 11.4, fat: 0.8, isSpice: false },
        { name: "Brown Rice", grams: 56, calories: 207, carbs: 43.3, protein: 4.4, fat: 1.6, isSpice: false },
        { name: "Avocado", grams: 50, calories: 80, carbs: 4.3, protein: 1, fat: 7.3, isSpice: false },
        { name: "Tomato", grams: 60, calories: 11, carbs: 2.3, protein: 0.5, fat: 0.1, isSpice: false },
        { name: "Corn", grams: 60, calories: 52, carbs: 11.5, protein: 1.9, fat: 0.7, isSpice: false },
        { name: "Lime", grams: 15, calories: 5, carbs: 1.6, protein: 0.1, fat: 0, isSpice: false }
      ]}
    ];
    var beforePro = 0;
    testMeals.forEach(function(m) { m.ingredients.forEach(function(i) { beforePro += i.protein; }); });
    adjustDayMeals(testMeals, testCal, testCarbs, testPro, testFat);
    var afterPro = 0, hasRescue = false, rescueIng = "";
    testMeals.forEach(function(m) { m.ingredients.forEach(function(i) {
      afterPro += i.protein;
      if (i.adjustment && i.adjustment.indexOf("PROTEIN RESCUE") !== -1) { hasRescue = true; rescueIng = i.name + " (" + i.grams + "g)"; }
    }); });
    var shakeNeeded = (testPro - afterPro) > testPro * 0.10;
    var pass = afterPro > beforePro;
    console.log("  Before protein: " + round1(beforePro) + "g, After protein: " + round1(afterPro) + "g");
    console.log("  Rescue activated: " + hasRescue + (hasRescue ? " on " + rescueIng : ""));
    console.log("  Shake still needed: " + shakeNeeded + " — " + (pass ? "PASS" : "FAIL"));
    if (!pass) allPass = false;
  })();

  // Test 3: 20-day macro accuracy
  (function() {
    console.log("Test 3: 20-day macro accuracy");
    var savedRot = { counts: Object.assign({}, _recipeRotation.counts), totalSlots: _recipeRotation.totalSlots };
    _recipeRotation = { counts: {}, totalSlots: 0 };
    var totalDevs = [0,0,0,0], dayCount = 0, within10 = 0;
    for (var w = 0; w < 3; w++) {
      var plan = generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
      plan.forEach(function(day) {
        if (!day) return;
        dayCount++;
        var t = day.totals;
        var dc = Math.abs(t.calories - testCal) / testCal;
        var db = Math.abs(t.carbs - testCarbs) / testCarbs;
        var dp = Math.abs(t.protein - testPro) / testPro;
        var df = Math.abs(t.fat - testFat) / testFat;
        totalDevs[0] += dc; totalDevs[1] += db; totalDevs[2] += dp; totalDevs[3] += df;
        if (dc <= 0.1 && db <= 0.1 && dp <= 0.1 && df <= 0.1) within10++;
      });
    }
    var pct10 = Math.round(within10 / dayCount * 100);
    console.log("  " + dayCount + " days tested");
    console.log("  Avg deviation — Cal: " + round1(totalDevs[0]/dayCount*100) + "%, Carbs: " + round1(totalDevs[1]/dayCount*100) + "%, Pro: " + round1(totalDevs[2]/dayCount*100) + "%, Fat: " + round1(totalDevs[3]/dayCount*100) + "%");
    console.log("  Days within 10% on all 4 macros: " + within10 + "/" + dayCount + " (" + pct10 + "%)");
    console.log("  PASS (informational)");
    _recipeRotation = savedRot;
  })();

  // Test 4: Database integrity
  (function() {
    console.log("Test 4: Database integrity check");
    var recipeCount = RECIPES.length;
    var pass = recipeCount === 119;
    console.log("  Recipe count: " + recipeCount + " (expected 119) — " + (pass ? "PASS" : "FAIL"));
    if (!pass) allPass = false;
  })();

  console.log("\n[Self-Test Summary] " + (allPass ? "ALL TESTS PASSED" : "SOME TESTS FAILED"));
}, 500);

// ===== FINAL VALIDATION: 1000-week macro accuracy simulation =====
setTimeout(function() {
  console.log("\n[Final Macro Accuracy Validation — 1000 weeks]");
  var savedRot = { counts: Object.assign({}, _recipeRotation.counts), totalSlots: _recipeRotation.totalSlots };
  _recipeRotation = { counts: {}, totalSlots: 0 };
  var SIM_TOTAL = 1000, SIM_BATCH = 50;
  var testCal = 2000, testCarbs = 175, testPro = 200, testFat = 55;
  var totalDays = 0, within5 = 0, within10 = 0, totalProDev = 0, totalFatDev = 0, shakeDays = 0, done = 0;
  function batch() {
    var end = Math.min(done + SIM_BATCH, SIM_TOTAL);
    for (var i = done; i < end; i++) {
      var plan = generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
      plan.forEach(function(day) {
        if (!day) return;
        totalDays++;
        var t = day.totals;
        var dc = Math.abs(t.calories - testCal) / testCal;
        var db = Math.abs(t.carbs - testCarbs) / testCarbs;
        var dp = Math.abs(t.protein - testPro) / testPro;
        var df = Math.abs(t.fat - testFat) / testFat;
        totalProDev += dp; totalFatDev += df;
        if (dc <= 0.05 && db <= 0.05 && dp <= 0.05 && df <= 0.05) within5++;
        if (dc <= 0.10 && db <= 0.10 && dp <= 0.10 && df <= 0.10) within10++;
        if (day.proteinShake) shakeDays++;
      });
    }
    done = end;
    if (done < SIM_TOTAL) { setTimeout(batch, 0); return; }
    var pct5 = round1(within5 / totalDays * 100);
    var pct10 = round1(within10 / totalDays * 100);
    var avgPro = round1(totalProDev / totalDays * 100);
    var avgFat = round1(totalFatDev / totalDays * 100);
    console.log("  " + totalDays + " days across " + SIM_TOTAL + " weeks");
    console.log("  Days within 5% all macros: " + within5 + "/" + totalDays + " (" + pct5 + "%)");
    console.log("  Days within 10% all macros: " + within10 + "/" + totalDays + " (" + pct10 + "%)");
    console.log("  Avg protein deviation: " + avgPro + "%");
    console.log("  Avg fat deviation: " + avgFat + "%");
    console.log("  Days requiring protein shake: " + shakeDays + "/" + totalDays + " (" + round1(shakeDays/totalDays*100) + "%)");
    _recipeRotation = savedRot;
  }
  setTimeout(batch, 1000);
}, 2000);
</script>
