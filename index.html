// ===== RECIPE SELECTION ALGORITHM =====
// Design philosophy: Every recipe should have approximately equal probability of selection
// (~1/N where N is pool size). The selection stage is intentionally NOT a macro optimizer —
// the post-selection adjustDayMeals servo loop handles fitting any recipe to macro targets.
//
// The algorithm works in 6 steps per meal slot:
//   1. CANDIDATE POOL: Full recipe pool, only hard-excluding cuisine repeats (max 2/week)
//      and same-recipe-same-day duplicates.
//   2. BASE WEIGHT: Every candidate starts at weight 1.0 (equal probability).
//   3. MACRO NUDGE: Small multiplicative bonus (0.75x to 1.5x) based on macro proximity.
//      Narrow enough that no recipe gets >2x the weight of any other from macros alone.
//   4. SESSION ROTATION: Strongest modifier. Over-selected recipes get multiplied down,
//      under-selected recipes get multiplied up, driving long-run uniform distribution.
//   5. WEIGHTED RANDOM DRAW: Single draw from the full weighted distribution. No sorting,
//      no top-N, no attempt loops.
//   6. POST-SELECTION ADJUSTMENT: adjustDayMeals scales ingredient quantities to hit
//      macro targets. This is where accuracy comes from, not step 3.
function generatePlan(targetCal, targetCarbs, targetProtein, targetFat, overrides, dayGroups, excludedDays) {
  var days = new Array(7);
  var excluded = excludedDays || [];

  // Build generation slots: each group shares one plan, ungrouped days get individual plans
  var assigned = {};
  var slots = [];
  (dayGroups || []).forEach(function(group) {
    var active = group.filter(function(d) { return excluded.indexOf(d) === -1; });
    if (active.length > 0) { slots.push(active); active.forEach(function(d) { assigned[d] = true; }); }
  });
  for (var dd = 0; dd < 7; dd++) { if (!assigned[dd] && excluded.indexOf(dd) === -1) slots.push([dd]); }
  slots.sort(function(a, b) { return a[0] - b[0]; });

  // Cuisine hard limit: max 2 per cuisine per week
  var weekCuisineCounts = {};

  // Macro nudge with hard gates (Fix A), wider range (Fix B), and worst-macro weighting (Fix E).
  function macroNudge(recipe, remainingBudget) {
    var rm = recipe.totalMacros;
    var devCal = Math.abs(rm.calories - remainingBudget.calories) / Math.max(remainingBudget.calories, 1);
    var devCarbs = Math.abs(rm.carbs - remainingBudget.carbs) / Math.max(remainingBudget.carbs, 1);
    var devPro = Math.abs(rm.protein - remainingBudget.protein) / Math.max(remainingBudget.protein, 1);
    var devFat = Math.abs(rm.fat - remainingBudget.fat) / Math.max(remainingBudget.fat, 1);
    // Fix E: Worst-macro weighting — 60% worst single macro + 40% average of all four.
    // Prevents a recipe catastrophic on one macro from hiding behind good scores on others.
    var maxDev = Math.max(devCal, devCarbs, devPro, devFat);
    var avgAll = (devCal + devCarbs + devPro + devFat) / 4;
    var avgDev = maxDev * 0.6 + avgAll * 0.4;
    // Fix B: Wider nudge range [0.1, 2.0] (was [0.75, 1.5]) — 20:1 ratio competes with rotation's 30:1.
    var nudge = Math.max(0.1, Math.min(2.0, 2.0 - avgDev * 1.9));
    // Fix A: Hard gate — fat over budget gets 0.1x penalty.
    // Threshold: recipe fat > remaining fat budget means this meal would push fat over target.
    if (rm.fat > remainingBudget.fat) nudge *= 0.1;
    // Fix A: Hard gate — protein below 25% of budget gets 0.2x penalty.
    // Threshold: 25% because any recipe below this makes the protein gap nearly unrecoverable.
    if (rm.protein < remainingBudget.protein * 0.25) nudge *= 0.2;
    return nudge;
  }

  // Step 4 helper: compute rotation multiplier based on session history
  function rotationMultiplier(recipe) {
    var total = _recipeRotation.totalSlots;
    if (total < 1) return 1.0;
    var poolSize = RECIPES.length;
    var fairShare = total / poolSize;
    var count = _recipeRotation.counts[recipe.name] || 0;
    var ratio = count / Math.max(fairShare, 0.1);
    // Under-selected (ratio < 1): boost up to 3x at ratio=0
    // At fair share (ratio = 1): multiplier = 1.0
    // Over-selected (ratio > 1): shrink down, approaching 0.1x at ratio=3+
    if (ratio <= 1) return 1.0 + (1.0 - ratio) * 2.0;
    return Math.max(0.1, 1.0 / ratio);
  }

  // Fix 1: selectRecipe now receives remaining macro budget for the day
  function selectRecipe(pool, dayRecipeNames, remainingBudget) {
    var candidates = [];
    for (var i = 0; i < pool.length; i++) {
      var r = pool[i];
      if (dayRecipeNames.indexOf(r.name) !== -1) continue;
      if ((weekCuisineCounts[r.cuisine] || 0) >= 2) continue;
      candidates.push(r);
    }
    if (candidates.length === 0) {
      for (var j = 0; j < pool.length; j++) {
        if (dayRecipeNames.indexOf(pool[j].name) === -1) candidates.push(pool[j]);
      }
    }
    if (candidates.length === 0) return pool[Math.floor(Math.random() * pool.length)];
    var weights = [];
    for (var ci = 0; ci < candidates.length; ci++) {
      var base = 1.0;
      var macro = macroNudge(candidates[ci], remainingBudget);
      var rotation = rotationMultiplier(candidates[ci]);
      weights.push(base * macro * rotation);
    }
    // Step 5: Single weighted random draw
    var totalW = 0;
    for (var wi = 0; wi < weights.length; wi++) totalW += weights[wi];
    var rnd = Math.random() * totalW, cumul = 0;
    for (var si2 = 0; si2 < weights.length; si2++) {
      cumul += weights[si2];
      if (rnd <= cumul) return candidates[si2];
    }
    return candidates[candidates.length - 1];
  }

  for (var si = 0; si < slots.length; si++) {
    var slot = slots[si];
    var d = slot[0];
    var mealsPerDay = targetCal > 2200 ? 3 : (targetCal < 1500 ? 2 : (d % 2 === 0 ? 3 : 2));
    var includeBreakfast = mealsPerDay >= 3;

    // Fix 1: Track cumulative macros so each meal selection knows the remaining budget
    var dayRecipeNames = [];
    var dayPicks = [];
    var cumulativeMacros = { calories: 0, carbs: 0, protein: 0, fat: 0 };
    for (var m = 0; m < mealsPerDay; m++) {
      var pool = (m === 0 && includeBreakfast) ? BREAKFAST_RECIPES : MAIN_RECIPES;
      var mealsLeft = mealsPerDay - m;
      var remainingBudget = {
        calories: Math.max(1, (targetCal - cumulativeMacros.calories) / mealsLeft),
        carbs: Math.max(0.1, (targetCarbs - cumulativeMacros.carbs) / mealsLeft),
        protein: Math.max(0.1, (targetProtein - cumulativeMacros.protein) / mealsLeft),
        fat: Math.max(0.1, (targetFat - cumulativeMacros.fat) / mealsLeft)
      };
      var picked = selectRecipe(pool, dayRecipeNames, remainingBudget);
      dayPicks.push(picked);
      dayRecipeNames.push(picked.name);
      cumulativeMacros.calories += picked.totalMacros.calories;
      cumulativeMacros.carbs += picked.totalMacros.carbs;
      cumulativeMacros.protein += picked.totalMacros.protein;
      cumulativeMacros.fat += picked.totalMacros.fat;
    }

    // Step 6: Post-selection macro adjustment
    var allMealData = dayPicks.map(function(recipe) {
      var ings = recipe.ingredients.map(function(ing) { return Object.assign({}, ing, { adjustment: null }); });
      applyIngredientOverrides(ings, overrides);
      return { recipe: recipe, ingredients: ings };
    });

    adjustDayMeals(allMealData, targetCal, targetCarbs, targetProtein, targetFat);

    var dayTotals = { calories:0, carbs:0, protein:0, fat:0 }, dayMeals = [];
    allMealData.forEach(function(md) {
      var mt = md.ingredients.filter(function(i){return !i.isSpice;}).reduce(function(a, i) { return { calories: a.calories+i.calories, carbs: a.carbs+i.carbs, protein: a.protein+i.protein, fat: a.fat+i.fat }; }, { calories:0, carbs:0, protein:0, fat:0 });
      dayTotals.calories += mt.calories; dayTotals.carbs += mt.carbs; dayTotals.protein += mt.protein; dayTotals.fat += mt.fat;
      _recipeRotation.counts[md.recipe.name] = (_recipeRotation.counts[md.recipe.name] || 0) + 1;
      _recipeRotation.totalSlots++;
      dayMeals.push({ originalName: md.recipe.name, name: md.recipe.name, cuisine: md.recipe.cuisine, isBreakfast: md.recipe.tags.indexOf("breakfast") !== -1, ingredients: md.ingredients, totalMacros: mt });
    });

    // Protein Shake — last resort supplement after all 50 adjustment iterations complete.
    // Added only if protein is still >10% below target. Max one per day. Not a meal card.
    // Macros: 1 scoop = 25g protein, 3g carbs, 1g fat, 120 calories.
    var proteinShake = null;
    var proteinDeficit = targetProtein - dayTotals.protein;
    if (proteinDeficit > targetProtein * 0.10) {
      proteinShake = { scoops: 1, protein: 25, carbs: 3, fat: 1, calories: 120 };
      dayTotals.calories += 120;
      dayTotals.carbs += 3;
      dayTotals.protein += 25;
      dayTotals.fat += 1;
    }

    dayMeals.forEach(function(meal) {
      weekCuisineCounts[meal.cuisine] = (weekCuisineCounts[meal.cuisine] || 0) + 1;
    });

    var totalsObj = { calories: round1(dayTotals.calories), carbs: round1(dayTotals.carbs), protein: round1(dayTotals.protein), fat: round1(dayTotals.fat) };

    slot.forEach(function(dayIdx) {
      var clonedMeals = dayMeals.map(function(meal) {
        return Object.assign({}, meal, {
          ingredients: meal.ingredients.map(function(ing) { return Object.assign({}, ing); }),
          totalMacros: Object.assign({}, meal.totalMacros)
        });
      });
      days[dayIdx] = { day: dayIdx, meals: clonedMeals, totals: Object.assign({}, totalsObj), proteinShake: proteinShake };
    });
  }
  return days;
}

// Grocery list verification: buildGroceryList iterates every day and every meal slot,
// summing ingredient grams by name into a shared map. Duplicate recipe appearances (same
// recipe on multiple days, or same recipe twice in a week) are handled correctly — each
// meal slot contributes independently. Verified: no changes needed.

function buildGroceryList(plan, servingsMap) {
  var map = {};
  var sv = servingsMap || {};
  plan.forEach(function(day, di) {
    if (!day) return;
    day.meals.forEach(function(meal, mi) {
      var servings = sv[di + "-" + mi] || 1;
      meal.ingredients.forEach(function(ing) {
        if (!map[ing.name]) map[ing.name] = { name: ing.name, totalGrams: 0, totalUnits: 0, appearances: [], isSpice: !!ing.isSpice };
        map[ing.name].totalGrams += ing.grams * servings;
        if (isUnitBased(ing.name)) map[ing.name].totalUnits += Math.max(1, getUnitCount(ing.name, ing.grams)) * servings;
        map[ing.name].appearances.push("Day " + (di+1) + " \u2013 " + meal.name + (servings > 1 ? " (\u00D7" + servings + ")" : ""));
      });
    });
  });
  var categories = {};
  Object.values(map).forEach(function(item) { var cat = getCategory(item.name); if (!categories[cat]) categories[cat] = []; categories[cat].push(item); });
  var order = ["Proteins","Vegetables","Grains & Starches","Dairy","Pantry","Other","Spices"];
  return order.filter(function(c) { return categories[c]; }).map(function(c) {
    return { category: c, items: categories[c].sort(function(a, b) { return b.totalGrams - a.totalGrams; }) };
  });
}

// Practical grocery units for whole countable items
var GROCERY_COUNTABLE = {
  "Onion": { unit: "onion", plural: "onions", gPerUnit: 150 },
  "Red Onion": { unit: "red onion", plural: "red onions", gPerUnit: 150 },
  "Garlic": { unit: "clove", plural: "cloves", gPerUnit: 5 },
  "Lemon": { unit: "lemon", plural: "lemons", gPerUnit: 100 },
  "Lime": { unit: "lime", plural: "limes", gPerUnit: 70 },
  "Avocado": { unit: "avocado", plural: "avocados", gPerUnit: 150 },
  "Bell Pepper": { unit: "bell pepper", plural: "bell peppers", gPerUnit: 150 },
  "Egg": { unit: "egg", plural: "eggs", gPerUnit: 50 }
};

function groceryQtyText(item) {
  if (item.isSpice) return Math.round(item.totalGrams) + "g (~" + Math.max(1, Math.round(item.totalGrams / 3)) + " tsp)";
  var gc = GROCERY_COUNTABLE[item.name];
  if (gc) {
    var count = Math.ceil(item.totalGrams / gc.gPerUnit);
    return count + " " + (count === 1 ? gc.unit : gc.plural) + " (~" + Math.round(item.totalGrams) + "g)";
  }
  if (isUnitBased(item.name)) {
    var u = UNIT_INGREDIENTS[item.name];
    return item.totalUnits + " " + (item.totalUnits === 1 ? u.unit : u.plural);
  }
  var g = Math.round(item.totalGrams);
  var cat = getCategory(item.name);
  if (cat === "Proteins") return g + "g (" + formatImperial(g) + ")";
  if (item.name.indexOf("Oil") !== -1 || item.name.indexOf("Sauce") !== -1 || item.name === "Coconut Milk" || item.name === "Maple Syrup" || item.name === "Honey") {
    var tbsp = round1(g / 15);
    return g + "g (~" + (tbsp >= 1 ? round1(tbsp) + " tbsp" : round1(g / 5) + " tsp") + ")";
  }
  return g + "g (" + formatImperial(g) + ")";
}

function groceryToText(groceryList) {
  var lines = ["Weekly Grocery List","==================",""];
  groceryList.forEach(function(section) {
    lines.push(section.category); lines.push("-".repeat(section.category.length));
    section.items.forEach(function(item) { lines.push("  " + item.name + " - " + groceryQtyText(item)); });
    lines.push("");
  });
  return lines.join("\n");
}

var DAYS_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var ALL_CUISINES = [...new Set(RECIPES.map(function(r) { return r.cuisine; }))].sort();

function ProgressBar(props) {
  var pct = Math.min((props.value / props.target) * 100, 120);
  return React.createElement("div", { className: "progress-bar" },
    React.createElement("div", { className: "progress-fill " + props.className, style: { width: Math.min(pct, 100) + "%", opacity: pct > 105 ? 0.7 : 1 } })
  );
}

// ===== STATS TRACKING =====
var STATS_KEY = "mealprep_stats";
function loadStats() { try { return JSON.parse(localStorage.getItem(STATS_KEY) || '{"plans":[]}'); } catch(e) { return {plans:[]}; } }
function saveStats(data) { localStorage.setItem(STATS_KEY, JSON.stringify(data)); }

// Record only the meals the user checked as eaten
function recordEatenMeals(plan, eatenMap, targetCal, targetCarbs, targetProtein, targetFat) {
  var data = loadStats();
  var now = new Date();
  var dateStr = now.toISOString().slice(0,10);
  var id = dateStr + "-" + now.getTime();
  var meals = [];
  var weekTotals = {calories:0,carbs:0,protein:0,fat:0};
  var daysWithMeals = 0;
  var ingredientGrams = {}; // track by total grams, not count
  var cuisines = {};
  plan.forEach(function(day, di) {
    if (!day) return;
    var dayAte = false;
    day.meals.forEach(function(meal, mi) {
      var key = di + "-" + mi;
      if (!eatenMap[key]) return; // skip unchecked meals
      dayAte = true;
      meals.push({recipe:meal.name,cuisine:meal.cuisine,day:DAYS_NAMES[di],calories:round1(meal.totalMacros.calories),carbs:round1(meal.totalMacros.carbs),protein:round1(meal.totalMacros.protein),fat:round1(meal.totalMacros.fat)});
      cuisines[meal.cuisine] = (cuisines[meal.cuisine]||0)+1;
      meal.ingredients.forEach(function(ing) {
        if (!ing.isSpice) {
          if (!ingredientGrams[ing.name]) ingredientGrams[ing.name] = 0;
          ingredientGrams[ing.name] += ing.grams;
        }
      });
      weekTotals.calories += meal.totalMacros.calories;
      weekTotals.carbs += meal.totalMacros.carbs;
      weekTotals.protein += meal.totalMacros.protein;
      weekTotals.fat += meal.totalMacros.fat;
    });
    if (dayAte) daysWithMeals++;
  });
  if (meals.length === 0) return data; // nothing eaten
  var daysForAvg = Math.max(daysWithMeals, 1);
  var avgCal = round1(weekTotals.calories/daysForAvg), avgCarbs = round1(weekTotals.carbs/daysForAvg);
  var avgPro = round1(weekTotals.protein/daysForAvg), avgFat = round1(weekTotals.fat/daysForAvg);
  var cuisineCount = Object.keys(cuisines).length;
  var calScore = Math.max(0, 100 - Math.abs(avgCal/targetCal*100 - 100)*3);
  var carbScore = Math.max(0, 100 - Math.abs(avgCarbs/targetCarbs*100 - 100)*3);
  var proScore = Math.max(0, 100 - Math.abs(avgPro/targetProtein*100 - 100)*3);
  var fatScore = Math.max(0, 100 - Math.abs(avgFat/targetFat*100 - 100)*3);
  var macroScore = (calScore+carbScore+proScore+fatScore)/4;
  var varietyS = Math.min(20, cuisineCount*4);
  var consistencyScore = Math.round(Math.min(100, macroScore*0.8 + varietyS));
  var entry = {id:id,date:dateStr,targets:{calories:targetCal,carbs:targetCarbs,protein:targetProtein,fat:targetFat},
    avgDaily:{calories:avgCal,carbs:avgCarbs,protein:avgPro,fat:avgFat},
    daysWithMeals:daysWithMeals,meals:meals,cuisines:cuisines,ingredientGrams:ingredientGrams,
    consistencyScore:consistencyScore,totalMeals:meals.length};
  data.plans.push(entry);
  saveStats(data);
  return data;
}

function StatsView(props) {
  var statsData = props.statsData;
  var onUpdate = props.onUpdate;
  var savedPlans = props.savedPlans || [];
  var onSavedPlansUpdate = props.onSavedPlansUpdate;
  var [confirmText, setConfirmText] = React.useState("");
  var [showConfirm, setShowConfirm] = React.useState(false);
  var [importMsg, setImportMsg] = React.useState("");

  var plans = statsData.plans || [];
  if (plans.length === 0) return (<div className="card"><h2>Stats</h2><p style={{color:'#6b7f7a'}}>No data yet. Generate a weekly plan to start tracking.</p></div>);

  // === Recipe History (includes all recipes, even uneaten) ===
  var recipeMap = {};
  // Seed with every recipe in the database at count 0
  RECIPES.forEach(function(r) {
    if (!recipeMap[r.name]) recipeMap[r.name] = {name:r.name,cuisine:r.cuisine,count:0,lastDate:null};
  });
  plans.forEach(function(p) {
    p.meals.forEach(function(m) {
      if (!recipeMap[m.recipe]) recipeMap[m.recipe] = {name:m.recipe,cuisine:m.cuisine,count:0,lastDate:null};
      recipeMap[m.recipe].count++;
      if (!recipeMap[m.recipe].lastDate || p.date > recipeMap[m.recipe].lastDate) recipeMap[m.recipe].lastDate = p.date;
    });
  });
  var recipeList = Object.values(recipeMap).sort(function(a,b){ return b.count !== a.count ? b.count - a.count : a.name.localeCompare(b.name); });
  var maxRecipeCount = recipeList.length > 0 ? recipeList[0].count : 1;

  // === Macro Trends ===
  var weeklyTrends = plans.map(function(p) {
    var calHit = Math.abs(p.avgDaily.calories/p.targets.calories - 1) <= 0.05;
    var cHit = Math.abs(p.avgDaily.carbs/p.targets.carbs - 1) <= 0.05;
    var pHit = Math.abs(p.avgDaily.protein/p.targets.protein - 1) <= 0.05;
    var fHit = Math.abs(p.avgDaily.fat/p.targets.fat - 1) <= 0.05;
    return {date:p.date,avg:p.avgDaily,targets:p.targets,allHit:calHit&&cHit&&pHit&&fHit,calHit:calHit,cHit:cHit,pHit:pHit,fHit:fHit};
  });
  // Consistent over/under detection
  var overUnder = {carbs:0,protein:0,fat:0};
  plans.forEach(function(p) {
    if (p.avgDaily.carbs > p.targets.carbs*1.05) overUnder.carbs++;
    else if (p.avgDaily.carbs < p.targets.carbs*0.95) overUnder.carbs--;
    if (p.avgDaily.protein > p.targets.protein*1.05) overUnder.protein++;
    else if (p.avgDaily.protein < p.targets.protein*0.95) overUnder.protein--;
    if (p.avgDaily.fat > p.targets.fat*1.05) overUnder.fat++;
    else if (p.avgDaily.fat < p.targets.fat*0.95) overUnder.fat--;
  });

  // === Cuisine Variety ===
  var totalCuisineMeals = 0;
  var cuisineTotals = {};
  plans.forEach(function(p) { Object.keys(p.cuisines).forEach(function(c) { cuisineTotals[c]=(cuisineTotals[c]||0)+p.cuisines[c]; totalCuisineMeals+=p.cuisines[c]; }); });
  var cuisineList = Object.entries(cuisineTotals).sort(function(a,b){return b[1]-a[1];}).map(function(e){return {name:e[0],count:e[1],pct:Math.round(e[1]/totalCuisineMeals*100)};});
  var dominantCuisine = cuisineList.length > 0 && cuisineList[0].pct > 40 ? cuisineList[0] : null;

  // === Ingredient by Weight ===
  var ingGramTotals = {};
  plans.forEach(function(p) {
    var src = p.ingredientGrams || p.ingredientCounts || {};
    Object.keys(src).forEach(function(n) { ingGramTotals[n]=(ingGramTotals[n]||0)+src[n]; });
  });
  var ingList = Object.entries(ingGramTotals).sort(function(a,b){return b[1]-a[1];}).slice(0,25).map(function(e){return {name:e[0],grams:Math.round(e[1])};});
  var maxIngGrams = ingList.length > 0 ? ingList[0].grams : 1;

  // === Consistency Score ===
  var avgScore = Math.round(plans.reduce(function(s,p){return s+p.consistencyScore;},0)/plans.length);

  // === Streak ===
  var sortedDates = plans.map(function(p){return p.date;}).sort();
  var currentStreak = 1, longestStreak = 1, tempStreak = 1;
  for (var si = 1; si < sortedDates.length; si++) {
    var d1 = new Date(sortedDates[si-1]), d2 = new Date(sortedDates[si]);
    var diff = Math.round((d2-d1)/(1000*60*60*24));
    if (diff <= 8) { tempStreak++; } else { tempStreak = 1; }
    if (tempStreak > longestStreak) longestStreak = tempStreak;
  }
  currentStreak = tempStreak;
  if (sortedDates.length <= 1) { currentStreak = plans.length; longestStreak = plans.length; }

  // === Calorie Target Drift ===
  var targetHistory = plans.map(function(p){return {date:p.date,cal:p.targets.calories,carbs:p.targets.carbs,protein:p.targets.protein,fat:p.targets.fat};});

  // === Data Management ===
  var dataSize = round1((new Blob([JSON.stringify(statsData)]).size + new Blob([JSON.stringify(savedPlans)]).size) / 1024);
  var totalRecipes = Object.keys(recipeMap).length;

  function handleExport() {
    var exportData = { stats: statsData, savedPlans: savedPlans, exportDate: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(exportData,null,2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = 'mealprep-data.json'; a.click(); URL.revokeObjectURL(url);
  }
  function handleImport(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        var msgs = [];
        // Handle new format (stats + savedPlans) or old format (just {plans:[]})
        var importedStats = imported.stats || (imported.plans ? imported : null);
        if (importedStats && importedStats.plans) {
          var current = loadStats();
          var existingIds = {};
          current.plans.forEach(function(p){existingIds[p.id]=true;});
          var added = 0;
          importedStats.plans.forEach(function(p) { if (!existingIds[p.id]) { current.plans.push(p); added++; } });
          saveStats(current); onUpdate(current);
          msgs.push(added + " stat entries");
        }
        // Import saved plans
        if (imported.savedPlans && Array.isArray(imported.savedPlans) && onSavedPlansUpdate) {
          var existingNames = {};
          savedPlans.forEach(function(p){existingNames[p.name]=true;});
          var merged = savedPlans.slice();
          var spAdded = 0;
          imported.savedPlans.forEach(function(p) { if (!existingNames[p.name]) { merged.push(p); spAdded++; } });
          onSavedPlansUpdate(merged);
          msgs.push(spAdded + " saved plans");
        }
        if (msgs.length === 0) { setImportMsg("Invalid file format"); return; }
        setImportMsg("Imported: " + msgs.join(", "));
        setTimeout(function(){setImportMsg("");},3000);
      } catch(err) { setImportMsg("Error reading file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }
  function handleClearAll() {
    if (confirmText !== "DELETE") return;
    saveStats({plans:[]});
    onUpdate({plans:[]});
    setShowConfirm(false); setConfirmText("");
  }
  function handleDeletePlan(id) {
    var d = loadStats();
    d.plans = d.plans.filter(function(p){return p.id!==id;});
    saveStats(d); onUpdate(d);
  }

  return (<>
    {/* KPIs */}
    <div className="card">
      <h2>Stats Overview</h2>
      <div className="stats-grid">
        <div className="stats-kpi"><div className="kv">{plans.length}</div><div className="kl">Plans Generated</div></div>
        <div className="stats-kpi"><div className="kv">{totalRecipes}</div><div className="kl">Unique Recipes</div></div>
        <div className="stats-kpi"><div className="kv">{avgScore}</div><div className="kl">Avg Score</div></div>
        <div className="stats-kpi"><div className="kv">{currentStreak}</div><div className="kl">Current Streak</div></div>
        <div className="stats-kpi"><div className="kv">{longestStreak}</div><div className="kl">Longest Streak</div></div>
        <div className="stats-kpi"><div className="kv">{cuisineList.length}</div><div className="kl">Cuisines Used</div></div>
      </div>
    </div>

    {/* Macro Trends */}
    <div className="card"><div className="stats-section"><h3>Macro Trends</h3>
      <div style={{overflowX:'auto'}}><table className="stats-table"><thead><tr><th>Date</th><th>Avg Cal</th><th>Avg C</th><th>Avg P</th><th>Avg F</th><th>On Target</th></tr></thead><tbody>
        {weeklyTrends.slice().reverse().map(function(w,i){return (<tr key={i}>
          <td>{w.date}</td>
          <td className={w.calHit?"stats-hit":"stats-miss"}>{w.avg.calories}</td>
          <td className={w.cHit?"stats-hit":"stats-miss"}>{w.avg.carbs}g</td>
          <td className={w.pHit?"stats-hit":"stats-miss"}>{w.avg.protein}g</td>
          <td className={w.fHit?"stats-hit":"stats-miss"}>{w.avg.fat}g</td>
          <td className={w.allHit?"stats-hit":"stats-miss"}>{w.allHit?"Yes":"No"}</td>
        </tr>);})}
      </tbody></table></div>
      {Math.abs(overUnder.carbs) >= 2 && <div className="stats-warn">Carbs consistently {overUnder.carbs>0?"over":"under"} target across {Math.abs(overUnder.carbs)} plans</div>}
      {Math.abs(overUnder.protein) >= 2 && <div className="stats-warn">Protein consistently {overUnder.protein>0?"over":"under"} target across {Math.abs(overUnder.protein)} plans</div>}
      {Math.abs(overUnder.fat) >= 2 && <div className="stats-warn">Fat consistently {overUnder.fat>0?"over":"under"} target across {Math.abs(overUnder.fat)} plans</div>}
    </div></div>

    {/* Recipe History */}
    <div className="card"><div className="stats-section"><h3>Recipe History ({recipeList.filter(function(r){return r.count>0;}).length} eaten / {recipeList.length} total)</h3>
      {recipeList.map(function(r,i){return (<div className="stats-bar-row" key={i} style={r.count===0?{opacity:0.5}:{}}>
        <span className="stats-bar-label" title={r.name}>{r.name}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill fill-pro" style={{width:maxRecipeCount>0?Math.round(r.count/maxRecipeCount*100)+"%":"0%"}}></div></div>
        <span className="stats-bar-val">{r.count === 0 ? "—" : r.count+"x"}</span>
        <span style={{fontSize:'0.72rem',color:'#6b7f7a',minWidth:58}}>{r.lastDate || "never"}</span>
      </div>);})}
    </div></div>

    {/* Cuisine Variety */}
    <div className="card"><div className="stats-section"><h3>Cuisine Variety</h3>
      {cuisineList.map(function(c,i){return (<div className="stats-bar-row" key={i}>
        <span className="stats-bar-label">{c.name}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill fill-carb" style={{width:c.pct+"%"}}></div></div>
        <span className="stats-bar-val">{c.pct}%</span>
      </div>);})}
      {dominantCuisine && <div className="stats-warn">{dominantCuisine.name} dominates at {dominantCuisine.pct}% of meals — consider more variety</div>}
    </div></div>

    {/* Ingredient by Weight */}
    <div className="card"><div className="stats-section"><h3>Top Ingredients by Weight</h3>
      {ingList.map(function(ig,i){
        var display = isUnitBased(ig.name) ? getUnitDisplay(ig.name, ig.grams) : formatImperial(ig.grams);
        return (<div className="stats-bar-row" key={i}>
          <span className="stats-bar-label">{ig.name}</span>
          <div className="stats-bar-track"><div className="stats-bar-fill fill-fat" style={{width:Math.round(ig.grams/maxIngGrams*100)+"%"}}></div></div>
          <span className="stats-bar-val">{display}</span>
        </div>);
      })}
    </div></div>

    {/* Plan Consistency Scores */}
    <div className="card"><div className="stats-section"><h3>Plan Consistency Scores</h3>
      <p style={{fontSize:'0.82rem',color:'#6b7f7a',marginBottom:8}}>Running average: <strong>{avgScore}/100</strong></p>
      {plans.slice().reverse().map(function(p,i){return (<div className="stats-bar-row" key={i}>
        <span className="stats-bar-label">{p.date}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill" style={{width:p.consistencyScore+"%",background:p.consistencyScore>=70?'#2d6a4f':p.consistencyScore>=40?'#e67e22':'#e74c3c'}}></div></div>
        <span className="stats-bar-val">{p.consistencyScore}</span>
      </div>);})}
    </div></div>

    {/* Calorie Target Drift */}
    <div className="card"><div className="stats-section"><h3>Calorie Target Drift</h3>
      <div style={{overflowX:'auto'}}><table className="stats-table"><thead><tr><th>Date</th><th>Calories</th><th>Carbs (g)</th><th>Protein (g)</th><th>Fat (g)</th></tr></thead><tbody>
        {targetHistory.slice().reverse().map(function(t,i){
          var prev = targetHistory[targetHistory.length - 1 - i - 1];
          var changed = prev && (t.cal!==prev.cal || t.carbs!==prev.carbs || t.protein!==prev.protein || t.fat!==prev.fat);
          return (<tr key={i} style={changed?{background:'#fff3cd'}:{}}>
            <td>{t.date}</td><td>{t.cal}</td><td>{t.carbs}</td><td>{t.protein}</td><td>{t.fat}</td>
          </tr>);
        })}
      </tbody></table></div>
    </div></div>

    {/* Data Management */}
    <div className="card"><div className="stats-section"><h3>Data Management</h3>
      <div className="stats-dm-summary">
        <span><strong>{plans.length}</strong> logged plans</span>
        <span><strong>{savedPlans.length}</strong> saved plans</span>
        <span><strong>{totalRecipes}</strong> recipes tracked</span>
        <span><strong>{dataSize}</strong> KB stored</span>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
        <button className="btn btn-sm btn-secondary" onClick={handleExport}>Export JSON</button>
        <label className="btn btn-sm btn-secondary" style={{cursor:'pointer'}}>Import JSON<input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} /></label>
        {!showConfirm && <button className="btn btn-sm btn-danger" onClick={function(){setShowConfirm(true);}}>Clear All Data</button>}
        {showConfirm && <span><input className="confirm-input" placeholder='Type DELETE' value={confirmText} onChange={function(e){setConfirmText(e.target.value);}} />
          <button className="btn btn-sm btn-danger" onClick={handleClearAll} disabled={confirmText!=="DELETE"}>Confirm</button>
          <button className="btn btn-sm btn-secondary" onClick={function(){setShowConfirm(false);setConfirmText("");}}>Cancel</button></span>}
      </div>
      {importMsg && <div className="success">{importMsg}</div>}
      <div style={{marginTop:8}}>
        <p style={{fontSize:'0.82rem',color:'#6b7f7a',marginBottom:6}}>Individual plan deletion:</p>
        {plans.slice().reverse().map(function(p){return (<div className="stats-plan-row" key={p.id}>
          <span>{p.date} — Score: {p.consistencyScore} — {p.totalMeals} meals</span>
          <button className="btn btn-sm btn-danger" onClick={function(){handleDeletePlan(p.id);}}>Del</button>
        </div>);})}
      </div>
    </div></div>
  </>);
}

function App() {
  var [calories, setCalories] = React.useState(2000);
  var [carbPct, setCarbPct] = React.useState(35);
  var [proteinPct, setProteinPct] = React.useState(40);
  var [fatPct, setFatPct] = React.useState(25);
  var [plan, setPlan] = React.useState(null);
  var [view, setView] = React.useState("plan");
  var [swapTarget, setSwapTarget] = React.useState(null);
  var [swapSearch, setSwapSearch] = React.useState("");
  var [copyMsg, setCopyMsg] = React.useState("");
  var [saveName, setSaveName] = React.useState("");
  var [savedPlans, setSavedPlans] = React.useState(function() { try { return JSON.parse(localStorage.getItem("mealprep_plans") || "[]"); } catch(e) { return []; } });
  var [recipeSearch, setRecipeSearch] = React.useState("");
  var [recipeCuisine, setRecipeCuisine] = React.useState("All");
  var [ingredientOverrides, setIngredientOverrides] = React.useState(function() { try { return JSON.parse(localStorage.getItem("mealprep_overrides") || "{}"); } catch(e) { return {}; } });
  var [ingSearch, setIngSearch] = React.useState("");
  var [statsData, setStatsData] = React.useState(loadStats);
  var [statsNewData, setStatsNewData] = React.useState(false);
  var [lastStatsView, setLastStatsView] = React.useState(function() { return Number(localStorage.getItem("mealprep_stats_last_view") || "0"); });

  // Debug panel state
  var [debugVisible, setDebugVisible] = React.useState(false);
  var [simResults, setSimResults] = React.useState(null);
  var [simProgress, setSimProgress] = React.useState(null);
  var [ingAnalysis, setIngAnalysis] = React.useState(null);
  var [validationResults, setValidationResults] = React.useState(null);
  var [validationProgress, setValidationProgress] = React.useState(null);
  var debugBuf = React.useRef("");

  React.useEffect(function() {
    function onKey(e) {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      debugBuf.current += e.key.toLowerCase();
      if (debugBuf.current.length > 10) debugBuf.current = debugBuf.current.slice(-10);
      if (debugBuf.current.endsWith("debug")) {
        debugBuf.current = "";
        setDebugVisible(function(v) {
          if (v) { setSimResults(null); setSimProgress(null); setIngAnalysis(null); setValidationResults(null); setValidationProgress(null); }
          return !v;
        });
      }
    }
    window.addEventListener("keydown", onKey);
    return function() { window.removeEventListener("keydown", onKey); };
  }, []);

  function runValidation() {
    var savedRot = { counts: Object.assign({}, _recipeRotation.counts), totalSlots: _recipeRotation.totalSlots };
    _recipeRotation = { counts: {}, totalSlots: 0 };
    var vCal = pctValid ? calories : 2000;
    var vCarbs = pctValid ? carbGrams : round1((2000*0.35)/4);
    var vPro = pctValid ? proteinGrams : 200;
    var vFat = pctValid ? fatGrams : round1((2000*0.25)/9);
    var TOTAL = 100, BATCH = 10, done = 0;
    var flagged = [], totalDays = 0, passedDays = 0;
    var flagCounts = { calHigh:0, calLow:0, macroHigh:0, macroLow:0, ingOver500:0, shakeStillLow:0, rescueCarbBlown:0 };
    var worst = { calories:0, carbs:0, protein:Infinity, fat:0 };
    var worstDay = null;
    setValidationProgress({ done: 0, total: TOTAL });
    setValidationResults(null);

    function runBatch() {
      var end = Math.min(done + BATCH, TOTAL);
      for (var i = done; i < end; i++) {
        var plan = generatePlan(vCal, vCarbs, vPro, vFat, {}, [], []);
        plan.forEach(function(day, di) {
          if (!day) return;
          totalDays++;
          var t = day.totals;
          var flags = [];
          // Check 1: Calories >150% of target
          if (t.calories > vCal * 1.5) flags.push("CAL_HIGH: " + round1(t.calories) + " (" + Math.round(t.calories/vCal*100) + "%)");
          // Check 2: Calories <50% of target
          if (t.calories < vCal * 0.5) flags.push("CAL_LOW: " + round1(t.calories) + " (" + Math.round(t.calories/vCal*100) + "%)");
          // Check 3: Any macro >200% of target
          if (t.carbs > vCarbs * 2) flags.push("CARBS_HIGH: " + round1(t.carbs) + "g (" + Math.round(t.carbs/vCarbs*100) + "%)");
          if (t.protein > vPro * 2) flags.push("PRO_HIGH: " + round1(t.protein) + "g (" + Math.round(t.protein/vPro*100) + "%)");
          if (t.fat > vFat * 2) flags.push("FAT_HIGH: " + round1(t.fat) + "g (" + Math.round(t.fat/vFat*100) + "%)");
          // Check 4: Any macro <30% of target
          if (t.carbs < vCarbs * 0.3) flags.push("CARBS_LOW: " + round1(t.carbs) + "g (" + Math.round(t.carbs/vCarbs*100) + "%)");
          if (t.protein < vPro * 0.3) flags.push("PRO_LOW: " + round1(t.protein) + "g (" + Math.round(t.protein/vPro*100) + "%)");
          if (t.fat < vFat * 0.3) flags.push("FAT_LOW: " + round1(t.fat) + "g (" + Math.round(t.fat/vFat*100) + "%)");
          // Check 5: Any ingredient >500g
          day.meals.forEach(function(meal) {
            meal.ingredients.forEach(function(ing) {
              if (ing.grams > 500) flags.push("ING_OVER_500: " + ing.name + " " + ing.grams + "g in " + meal.name);
            });
          });
          // Check 6: Shake added but protein still <70% of target
          if (day.proteinShake && t.protein < vPro * 0.7) flags.push("SHAKE_STILL_LOW: protein " + round1(t.protein) + "g (" + Math.round(t.protein/vPro*100) + "%) after shake");
          // Check 7: Protein rescue activated but carbs >150% of target
          var hasRescue = false;
          day.meals.forEach(function(meal) { meal.ingredients.forEach(function(ing) { if (ing.adjustment && ing.adjustment.indexOf("PROTEIN RESCUE") !== -1) hasRescue = true; }); });
          if (hasRescue && t.carbs > vCarbs * 1.5) flags.push("RESCUE_CARB_BLOWN: carbs " + round1(t.carbs) + "g (" + Math.round(t.carbs/vCarbs*100) + "%) with rescue active");

          // Count flags
          flags.forEach(function(f) {
            if (f.indexOf("CAL_HIGH") === 0) flagCounts.calHigh++;
            if (f.indexOf("CAL_LOW") === 0) flagCounts.calLow++;
            if (f.indexOf("CARBS_HIGH") === 0 || f.indexOf("PRO_HIGH") === 0 || f.indexOf("FAT_HIGH") === 0) flagCounts.macroHigh++;
            if (f.indexOf("CARBS_LOW") === 0 || f.indexOf("PRO_LOW") === 0 || f.indexOf("FAT_LOW") === 0) flagCounts.macroLow++;
            if (f.indexOf("ING_OVER_500") === 0) flagCounts.ingOver500++;
            if (f.indexOf("SHAKE_STILL_LOW") === 0) flagCounts.shakeStillLow++;
            if (f.indexOf("RESCUE_CARB_BLOWN") === 0) flagCounts.rescueCarbBlown++;
          });

          // Track worst values
          if (t.calories > worst.calories) worst.calories = t.calories;
          if (t.carbs > worst.carbs) worst.carbs = t.carbs;
          if (t.protein < worst.protein) worst.protein = t.protein;
          if (t.fat > worst.fat) worst.fat = t.fat;

          if (flags.length > 0) {
            var entry = {
              week: i + 1, day: di, dayName: DAYS_NAMES[di] || ("Day " + di),
              meals: day.meals.map(function(m) { return m.name; }),
              totals: { calories: round1(t.calories), carbs: round1(t.carbs), protein: round1(t.protein), fat: round1(t.fat) },
              shake: !!day.proteinShake, flags: flags
            };
            flagged.push(entry);
            // Track worst overall day
            if (!worstDay || t.calories > worstDay.totals.calories) worstDay = entry;
          } else {
            passedDays++;
          }
        });
      }
      done = end;
      setValidationProgress({ done: done, total: TOTAL });
      if (done < TOTAL) { setTimeout(runBatch, 0); return; }
      setValidationResults({
        totalDays: totalDays, passedDays: passedDays, flaggedDays: flagged.length,
        passPct: round1(passedDays / totalDays * 100),
        flagCounts: flagCounts, worst: worst, worstDay: worstDay,
        flagged: flagged,
        targets: { calories: vCal, carbs: vCarbs, protein: vPro, fat: vFat },
        timestamp: new Date().toISOString()
      });
      setValidationProgress(null);
      _recipeRotation = savedRot;
    }
    setTimeout(runBatch, 0);
  }

  function runIngredientAnalysis() {
    var map = {};
    RECIPES.forEach(function(r) {
      r.ingredients.forEach(function(ing) {
        if (ing.isSpice) return;
        if (!map[ing.name]) map[ing.name] = { name: ing.name, recipes: [] };
        if (map[ing.name].recipes.indexOf(r.name) === -1) map[ing.name].recipes.push(r.name);
      });
    });
    var all = Object.values(map).map(function(item) {
      return { name: item.name, count: item.recipes.length, recipes: item.recipes };
    }).sort(function(a, b) { return a.count - b.count || a.name.localeCompare(b.name); });
    var unique = all.filter(function(i) { return i.count === 1; });
    var rare = all.filter(function(i) { return i.count >= 2 && i.count <= 4; });
    var flagged = unique.concat(rare);
    var affectedRecipes = {};
    flagged.forEach(function(i) { i.recipes.forEach(function(r) { affectedRecipes[r] = true; }); });
    setIngAnalysis({ all: all, unique: unique, rare: rare, affectedCount: Object.keys(affectedRecipes).length, totalIngredients: all.length, totalRecipes: RECIPES.length });
  }

  function runSimulation() {
    // Reset rotation tracker for clean simulation
    var savedRotation = { counts: Object.assign({}, _recipeRotation.counts), totalSlots: _recipeRotation.totalSlots };
    _recipeRotation = { counts: {}, totalSlots: 0 };
    var simCal = calories;
    var simCarbG = carbGrams;
    var simProG = proteinGrams;
    var simFatG = fatGrams;
    if (!pctValid) {
      simCal = 2500;
      simCarbG = round1((2500 * 0.4) / 4);
      simProG = round1((2500 * 0.3) / 4);
      simFatG = round1((2500 * 0.3) / 9);
    }
    var freq = {};
    RECIPES.forEach(function(r) { freq[r.name] = 0; });
    var totalSlots = 0;
    var done = 0;
    var TOTAL = 1000;
    var BATCH = 50;
    setSimProgress({ done: 0, total: TOTAL });
    setSimResults(null);

    function runBatch() {
      var end = Math.min(done + BATCH, TOTAL);
      for (var i = done; i < end; i++) {
        var plan = generatePlan(simCal, simCarbG, simProG, simFatG, {}, [], []);
        plan.forEach(function(day) {
          if (!day) return;
          day.meals.forEach(function(meal) {
            freq[meal.originalName] = (freq[meal.originalName] || 0) + 1;
            totalSlots++;
          });
        });
      }
      done = end;
      setSimProgress({ done: done, total: TOTAL });
      if (done < TOTAL) {
        setTimeout(runBatch, 0);
      } else {
        var sorted = Object.keys(freq).map(function(name) {
          return { name: name, count: freq[name], pct: round1((freq[name] / totalSlots) * 100) };
        }).sort(function(a, b) { return b.count - a.count; });
        var neverSelected = sorted.filter(function(r) { return r.count === 0; });
        var rarelySelected = sorted.filter(function(r) { return r.count > 0 && r.pct < 2; });
        var top10 = sorted.slice(0, 10);
        var maxCount = sorted[0] ? sorted[0].count : 1;
        var topName = sorted[0] ? sorted[0].name : "N/A";
        var topPct = sorted[0] ? sorted[0].pct : 0;
        var healthy = neverSelected.length === 0 && rarelySelected.length <= 5 && topPct <= 10;
        var summaryParts = [];
        if (healthy) {
          summaryParts.push("Distribution looks healthy.");
        } else {
          summaryParts.push("Significant bias issues detected.");
        }
        summaryParts.push(neverSelected.length + " recipe" + (neverSelected.length !== 1 ? "s" : "") + " never selected.");
        summaryParts.push(rarelySelected.length + " recipe" + (rarelySelected.length !== 1 ? "s" : "") + " rarely selected (<2%).");
        summaryParts.push("Most selected: " + topName + " at " + topPct + "%.");
        setSimResults({ sorted: sorted, neverSelected: neverSelected, rarelySelected: rarelySelected, top10: top10, maxCount: maxCount, totalSlots: totalSlots, summary: summaryParts.join(" "), macros: { calories: simCal, carbGrams: simCarbG, proteinGrams: simProG, fatGrams: simFatG }, weeksSimulated: TOTAL, timestamp: new Date().toISOString() });
        setSimProgress(null);
        // Restore rotation tracker after simulation
        _recipeRotation = savedRotation;
      }
    }
    setTimeout(runBatch, 0);
  }

  var pctSum = carbPct + proteinPct + fatPct, pctValid = pctSum === 100;
  var carbGrams = round1((calories * (carbPct / 100)) / 4);
  var proteinGrams = round1((calories * (proteinPct / 100)) / 4);
  var fatGrams = round1((calories * (fatPct / 100)) / 9);

  function updateOverride(name, field, value) {
    var next = Object.assign({}, ingredientOverrides);
    if (!next[name]) next[name] = Object.assign({}, DEFAULT_MACROS_PER100[name]);
    next[name][field] = Number(value) || 0;
    setIngredientOverrides(next);
    localStorage.setItem("mealprep_overrides", JSON.stringify(next));
  }
  function resetOverride(name) {
    var next = Object.assign({}, ingredientOverrides);
    delete next[name];
    setIngredientOverrides(next);
    localStorage.setItem("mealprep_overrides", JSON.stringify(next));
  }
  function resetAllOverrides() {
    setIngredientOverrides({});
    localStorage.setItem("mealprep_overrides", "{}");
  }

  var overrideCount = Object.keys(ingredientOverrides).length;

  var [eatenMeals, setEatenMeals] = React.useState({});
  var [mealServings, setMealServings] = React.useState({});
  var [dayGroups, setDayGroups] = React.useState(function() {
    try { var saved = JSON.parse(localStorage.getItem("mealprep_daygroups") || "null"); return saved && saved.groups ? saved.groups : []; } catch(e) { return []; }
  });
  var [excludedDays, setExcludedDays] = React.useState(function() {
    try { var saved = JSON.parse(localStorage.getItem("mealprep_daygroups") || "null"); return saved && saved.excluded ? saved.excluded : []; } catch(e) { return []; }
  });
  var [expandedDays, setExpandedDays] = React.useState({});
  var [expandedMeals, setExpandedMeals] = React.useState({});
  var [expandedInstructions, setExpandedInstructions] = React.useState({});

  // Persist day grouping config to localStorage
  function saveDayGroupConfig(groups, excluded) {
    localStorage.setItem("mealprep_daygroups", JSON.stringify({ groups: groups, excluded: excluded }));
  }

  // Day grouping helpers
  var assignedDays = {};
  dayGroups.forEach(function(g) { g.forEach(function(d) { assignedDays[d] = true; }); });
  var includedDays = [];
  var unassignedDays = [];
  for (var ud = 0; ud < 7; ud++) {
    if (excludedDays.indexOf(ud) === -1) {
      includedDays.push(ud);
      if (!assignedDays[ud]) unassignedDays.push(ud);
    }
  }
  var allDaysExcluded = includedDays.length === 0;

  function toggleExcludeDay(d) {
    var nextExcluded;
    if (excludedDays.indexOf(d) !== -1) {
      nextExcluded = excludedDays.filter(function(x) { return x !== d; });
    } else {
      // Remove from any group first
      var nextGroups = dayGroups.map(function(g) { return g.filter(function(x) { return x !== d; }); }).filter(function(g) { return g.length > 0; });
      nextExcluded = excludedDays.concat([d]).sort();
      setDayGroups(nextGroups);
      saveDayGroupConfig(nextGroups, nextExcluded);
      setExcludedDays(nextExcluded);
      return;
    }
    setExcludedDays(nextExcluded);
    saveDayGroupConfig(dayGroups, nextExcluded);
  }

  var [selectedDay, setSelectedDay] = React.useState(null);
  var clickTimer = React.useRef(null);

  // Group colors palette
  var GROUP_COLORS = [
    { bg: '#dbeafe', border: '#3b82f6', text: '#1e40af' },
    { bg: '#fef3c7', border: '#f59e0b', text: '#92400e' },
    { bg: '#ede9fe', border: '#8b5cf6', text: '#5b21b6' },
    { bg: '#ccfbf1', border: '#14b8a6', text: '#115e59' },
    { bg: '#fce7f3', border: '#ec4899', text: '#9d174d' },
    { bg: '#ffedd5', border: '#f97316', text: '#9a3412' }
  ];

  function getGroupColor(gi) { return GROUP_COLORS[gi % GROUP_COLORS.length]; }

  function findDayGroup(d) {
    for (var i = 0; i < dayGroups.length; i++) { if (dayGroups[i].indexOf(d) !== -1) return i; }
    return -1;
  }

  function handlePillClick(d) {
    if (excludedDays.indexOf(d) !== -1) return;
    if (selectedDay === null) {
      setSelectedDay(d);
    } else if (selectedDay === d) {
      setSelectedDay(null);
    } else {
      // Group selectedDay and d together
      var gA = findDayGroup(selectedDay), gB = findDayGroup(d);
      var next;
      if (gA !== -1 && gB !== -1) {
        if (gA === gB) { setSelectedDay(null); return; }
        // Merge group B into group A
        next = dayGroups.map(function(g, i) {
          if (i === gA) return g.concat(dayGroups[gB]).sort();
          return g;
        }).filter(function(_, i) { return i !== gB; });
      } else if (gA !== -1) {
        next = dayGroups.map(function(g, i) { return i === gA ? g.concat([d]).sort() : g; });
      } else if (gB !== -1) {
        next = dayGroups.map(function(g, i) { return i === gB ? g.concat([selectedDay]).sort() : g; });
      } else {
        next = dayGroups.concat([[selectedDay, d].sort()]);
      }
      setDayGroups(next); saveDayGroupConfig(next, excludedDays);
      setSelectedDay(null);
    }
  }

  function handlePillDoubleClick(d) {
    var gi = findDayGroup(d);
    if (gi === -1) return;
    var next = dayGroups.map(function(g, i) {
      return i === gi ? g.filter(function(x) { return x !== d; }) : g;
    }).filter(function(g) { return g.length > 1; });
    setDayGroups(next); saveDayGroupConfig(next, excludedDays);
    setSelectedDay(null);
  }

  // Collapsible helpers
  function toggleDay(di) { var n = Object.assign({}, expandedDays); if (n[di]) delete n[di]; else n[di] = true; setExpandedDays(n); }
  function toggleMeal(di, mi) { var k = di+"-"+mi; var n = Object.assign({}, expandedMeals); if (n[k]) delete n[k]; else n[k] = true; setExpandedMeals(n); }
  function expandAll() {
    if (!plan) return;
    var d = {}, m = {};
    plan.forEach(function(day, di) { if (!day) return; d[di] = true; day.meals.forEach(function(_, mi) { m[di+"-"+mi] = true; }); });
    setExpandedDays(d); setExpandedMeals(m);
  }
  function collapseAll() { setExpandedDays({}); setExpandedMeals({}); }

  function handleGenerate() {
    if (!pctValid || allDaysExcluded) return;
    var p = generatePlan(calories, carbGrams, proteinGrams, fatGrams, ingredientOverrides, dayGroups, excludedDays);
    setPlan(p);
    setView("plan");
    setEatenMeals({});
    setMealServings({});
    setExpandedDays({});
    setExpandedMeals({});
  }

  function toggleEaten(dayIdx, mealIdx) {
    var key = dayIdx + "-" + mealIdx;
    var next = Object.assign({}, eatenMeals);
    if (next[key]) { delete next[key]; } else { next[key] = true; }
    setEatenMeals(next);
  }

  function handleLogEaten() {
    if (!plan || Object.keys(eatenMeals).length === 0) return;
    var updated = recordEatenMeals(plan, eatenMeals, calories, carbGrams, proteinGrams, fatGrams);
    setStatsData(updated);
    setStatsNewData(true);
    setCopyMsg("Logged " + Object.keys(eatenMeals).length + " meals!");
    setTimeout(function() { setCopyMsg(""); }, 2500);
    setEatenMeals({});
  }

  var eatenCount = Object.keys(eatenMeals).length;

  function handleSave() {
    if (!plan || !saveName.trim()) return;
    var entry = { name: saveName.trim(), date: new Date().toLocaleDateString(), calories: calories, carbPct: carbPct, proteinPct: proteinPct, fatPct: fatPct, plan: plan };
    var updated = [entry, ...savedPlans.filter(function(p) { return p.name !== saveName.trim(); })];
    setSavedPlans(updated); localStorage.setItem("mealprep_plans", JSON.stringify(updated)); setSaveName("");
    setCopyMsg("Plan saved!"); setTimeout(function() { setCopyMsg(""); }, 2000);
  }
  function handleLoad(entry) { setCalories(entry.calories); setCarbPct(entry.carbPct); setProteinPct(entry.proteinPct); setFatPct(entry.fatPct); setPlan(entry.plan); setView("plan"); }
  function handleDeleteSaved(name) { var u = savedPlans.filter(function(p) { return p.name !== name; }); setSavedPlans(u); localStorage.setItem("mealprep_plans", JSON.stringify(u)); }

  function handleCopyGrocery() {
    var text = groceryToText(groceryList);
    // Include protein shake in copy if any days need it
    if (plan) {
      var shakeScoops = 0;
      plan.forEach(function(day) { if (day && day.proteinShake) shakeScoops += day.proteinShake.scoops; });
      if (shakeScoops > 0) text += "\nSupplements\n-----------\n  Protein Powder - " + shakeScoops + " scoops (~" + (shakeScoops*30) + "g)\n";
    }
    navigator.clipboard.writeText(text).then(function() { setCopyMsg("Copied!"); setTimeout(function() { setCopyMsg(""); }, 2000); });
  }

  function handleSwap(newRecipe) {
    if (!swapTarget || !plan) return;
    var di = swapTarget.dayIdx, mi = swapTarget.mealIdx;
    var newPlan = plan.map(function(day, dayI) {
      if (dayI !== di) return day;
      var newMeals = day.meals.map(function(meal, mealI) {
        if (mealI !== mi) return { ...meal, ingredients: meal.ingredients.map(function(i) { return { ...i }; }) };
        return { originalName: newRecipe.name, name: newRecipe.name, cuisine: newRecipe.cuisine, isBreakfast: newRecipe.tags.indexOf("breakfast") !== -1,
          ingredients: newRecipe.ingredients.map(function(i) { return Object.assign({}, i, { adjustment: null }); }), totalMacros: { ...newRecipe.totalMacros } };
      });
      var mealData = newMeals.map(function(m) {
        var ings = m.ingredients.map(function(i) { return Object.assign({}, i, { adjustment: null }); });
        applyIngredientOverrides(ings, ingredientOverrides);
        return { recipe: { name: m.name, tags: m.isBreakfast ? ["breakfast"] : [] }, ingredients: ings };
      });
      adjustDayMeals(mealData, calories, carbGrams, proteinGrams, fatGrams);
      var dayTotals = { calories:0, carbs:0, protein:0, fat:0 };
      var rebuilt = mealData.map(function(md, idx) {
        var mt = md.ingredients.filter(function(i){return !i.isSpice;}).reduce(function(a, i) { return { calories:a.calories+i.calories, carbs:a.carbs+i.carbs, protein:a.protein+i.protein, fat:a.fat+i.fat }; }, { calories:0, carbs:0, protein:0, fat:0 });
        dayTotals.calories += mt.calories; dayTotals.carbs += mt.carbs; dayTotals.protein += mt.protein; dayTotals.fat += mt.fat;
        return { originalName: idx === mi ? newRecipe.name : newMeals[idx].name, name: idx === mi ? newRecipe.name : newMeals[idx].name,
          cuisine: idx === mi ? newRecipe.cuisine : newMeals[idx].cuisine, isBreakfast: md.recipe.tags.indexOf("breakfast") !== -1, ingredients: md.ingredients, totalMacros: mt };
      });
      return { ...day, meals: rebuilt, totals: { calories: round1(dayTotals.calories), carbs: round1(dayTotals.carbs), protein: round1(dayTotals.protein), fat: round1(dayTotals.fat) } };
    });
    setPlan(newPlan); setSwapTarget(null);
  }

  var groceryList = plan ? buildGroceryList(plan.map(function(day, di) { return excludedDays.indexOf(di) !== -1 ? null : day; }), mealServings) : [];
  var filteredRecipes = RECIPES.filter(function(r) {
    var ms = !recipeSearch || r.name.toLowerCase().indexOf(recipeSearch.toLowerCase()) !== -1 || r.ingredients.some(function(i) { return i.name.toLowerCase().indexOf(recipeSearch.toLowerCase()) !== -1; });
    return ms && (recipeCuisine === "All" || r.cuisine === recipeCuisine);
  });
  var swapFiltered = RECIPES.filter(function(r) { return !swapSearch || r.name.toLowerCase().indexOf(swapSearch.toLowerCase()) !== -1 || r.cuisine.toLowerCase().indexOf(swapSearch.toLowerCase()) !== -1; });

  function ingQtyDisplay(ing) {
    if (ing.isSpice) return spiceDisplay(ing.grams);
    var ud = getUnitDisplay(ing.name, ing.grams);
    return ud || (ing.grams + "g");
  }

  return (
    <div className="app">
      <h1>Meal Prep Optimizer</h1>
      <p className="subtitle">Generate personalized weekly meal plans with smart grocery lists</p>

      <div className="card">
        <h2>Macro Calculator</h2>
        <div className="macro-inputs">
          <div className="input-group"><label>Daily Calories</label><input type="number" value={calories} min={1000} max={5000} onChange={function(e){setCalories(Number(e.target.value));}} /></div>
          <div className="input-group"><label>Carbs %</label><input type="number" value={carbPct} min={0} max={100} onChange={function(e){setCarbPct(Number(e.target.value));}} /></div>
          <div className="input-group"><label>Protein %</label><input type="number" value={proteinPct} min={0} max={100} onChange={function(e){setProteinPct(Number(e.target.value));}} /></div>
          <div className="input-group"><label>Fat %</label><input type="number" value={fatPct} min={0} max={100} onChange={function(e){setFatPct(Number(e.target.value));}} /></div>
        </div>
        {!pctValid && <div className={"warning"+(Math.abs(pctSum-100)>10?" error":"")}>Percentages sum to {pctSum}% — must equal 100%</div>}
        <div className="macro-summary">
          <div className="macro-pill"><div className="value">{calories}</div><div className="label">Calories</div></div>
          <div className="macro-pill"><div className="value">{carbGrams}g</div><div className="label">Carbs</div></div>
          <div className="macro-pill"><div className="value">{proteinGrams}g</div><div className="label">Protein</div></div>
          <div className="macro-pill"><div className="value">{fatGrams}g</div><div className="label">Fat</div></div>
        </div>
      </div>

      <div className="card">
        <h2>Day Grouping</h2>

        <div className="day-pill-row">
          {[0,1,2,3,4,5,6].map(function(d) {
            var isExcluded = excludedDays.indexOf(d) !== -1;
            var gi = findDayGroup(d);
            var gc = gi !== -1 ? getGroupColor(gi) : null;
            var isSelected = selectedDay === d;
            var pillClass = "day-pill" + (isExcluded ? " dp-excluded" : "") + (isSelected ? " dp-selected" : "");
            var pillStyle = {};
            if (!isExcluded && gc) { pillStyle = { background: gc.bg, borderColor: gc.border }; }
            return (<div className={pillClass} key={d} style={pillStyle}
              onClick={function(e) {
                if (e.target.classList.contains('dp-toggle')) return;
                if (clickTimer.current) { clearTimeout(clickTimer.current); clickTimer.current = null; handlePillDoubleClick(d); return; }
                clickTimer.current = setTimeout(function() { clickTimer.current = null; handlePillClick(d); }, 250);
              }}>
              <div className="dp-name" style={gc && !isExcluded ? {color: gc.text} : {}}>{DAYS_NAMES[d].slice(0,3)}</div>
              {gi !== -1 && !isExcluded && <div className="dp-label" style={gc ? {color: gc.text} : {}}>G{gi+1}</div>}
              <div className={"dp-toggle" + (isExcluded ? " dp-off" : "")} onClick={function(e){e.stopPropagation();toggleExcludeDay(d);}} />
            </div>);
          })}
        </div>

        {allDaysExcluded && <div className="warning" style={{marginTop:10}}>All days are excluded. Include at least one day to generate a plan.</div>}
        <div className="dg-helper">Tap a pill to select, then tap another to group. Double-tap to ungroup. Toggle switch to include/exclude.</div>
      </div>

      <div className="btn-row">
        <button className="btn btn-primary" onClick={handleGenerate} disabled={!pctValid || allDaysExcluded}>Generate Weekly Plan</button>
      </div>

      <div className="card">
        <h2>Saved Plans</h2>
        <div className="save-section">
          <input placeholder="Plan name..." value={saveName} onChange={function(e){setSaveName(e.target.value);}} />
          <button className="btn btn-sm btn-primary" onClick={handleSave} disabled={!plan||!saveName.trim()}>Save Current</button>
          {copyMsg && <span className="copy-feedback">{copyMsg}</span>}
        </div>
        {savedPlans.length > 0 && <div className="saved-plans-list">
          {savedPlans.map(function(sp, i) {
            return <div className="saved-plan-item" key={i}><div><span className="sp-name">{sp.name}</span><br/><span className="sp-meta">{sp.date} — {sp.calories} cal</span></div>
              <div className="sp-actions"><button className="btn btn-sm btn-secondary" onClick={function(){handleLoad(sp);}}>Load</button><button className="btn btn-sm btn-danger" onClick={function(){handleDeleteSaved(sp.name);}}>Del</button></div></div>;
          })}
        </div>}
      </div>

      {/* Tab bar — always visible */}
      <div className="btn-row">
        {plan && <button className={"btn btn-toggle"+(view==="plan"?" active":"")} onClick={function(){setView("plan");}}>Meal Plan</button>}
        {plan && <button className={"btn btn-toggle"+(view==="grocery"?" active":"")} onClick={function(){setView("grocery");}}>Grocery List</button>}
        <button className={"btn btn-toggle"+(view==="recipes"?" active":"")} onClick={function(){setView("recipes");}}>All Recipes</button>
        <button className={"btn btn-toggle"+(view==="ingredients"?" active":"")} onClick={function(){setView("ingredients");}}>Ingredients</button>
        <button className={"btn btn-toggle"+(view==="stats"?" active":"")} onClick={function(){setView("stats");setStatsNewData(false);setLastStatsView(Date.now());localStorage.setItem("mealprep_stats_last_view",String(Date.now()));}}>Stats{statsNewData && <span className="stats-badge"></span>}</button>
        {debugVisible && <button className={"btn btn-debug"+(view==="debug"?" active":"")} onClick={function(){setView("debug");}}>Debug Panel</button>}
      </div>

      {plan && (<>
        {view === "plan" && (<>
          <div className="log-eaten-bar">
            <span className="le-info">{eatenCount > 0 ? eatenCount + " meal" + (eatenCount > 1 ? "s" : "") + " checked" : "Check meals as you eat them"}</span>
            <div className="expand-collapse-bar">
              <button className="btn btn-sm btn-secondary" onClick={expandAll}>Expand All</button>
              <button className="btn btn-sm btn-secondary" onClick={collapseAll}>Collapse All</button>
              <button className="btn btn-sm btn-primary" onClick={handleLogEaten} disabled={eatenCount === 0}>Log Eaten Meals to Stats</button>
            </div>
          </div>
          {plan.map(function(day, di) {
          if (!day || excludedDays.indexOf(di) !== -1) return null;
          var isDayExpanded = !!expandedDays[di];
          return (<div className="card day-card" key={di}>
            <div className="day-summary" onClick={function(){toggleDay(di);}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
                <div className="day-label" style={{marginBottom:0}}>{isDayExpanded ? "\u25BC" : "\u25B6"} {DAYS_NAMES[di]}</div>
                <div className="day-meals-list">{day.meals.map(function(m){return m.name;}).join(" \u2022 ")}</div>
              </div>
              <div className="day-totals" style={{borderTop:'none',paddingTop:4,marginTop:4}}><span>Cal: {day.totals.calories}</span><span>C: {day.totals.carbs}g</span><span>P: {day.totals.protein}g</span><span>F: {day.totals.fat}g</span></div>
              {day.proteinShake && <div style={{fontSize:'0.75rem',color:'#6b7f7a',fontStyle:'italic',marginTop:2}}>+ Protein Shake: {day.proteinShake.scoops} scoop, {day.proteinShake.protein}g protein, {day.proteinShake.carbs}g carbs, {day.proteinShake.fat}g fat, {day.proteinShake.calories} cal</div>}
              <div className="progress-row">
                <div className="progress-item"><div className="plabel"><span>Carbs</span><span>{Math.round(day.totals.carbs/carbGrams*100)}%</span></div><ProgressBar value={day.totals.carbs} target={carbGrams} className="fill-carb" /></div>
                <div className="progress-item"><div className="plabel"><span>Protein</span><span>{Math.round(day.totals.protein/proteinGrams*100)}%</span></div><ProgressBar value={day.totals.protein} target={proteinGrams} className="fill-pro" /></div>
                <div className="progress-item"><div className="plabel"><span>Fat</span><span>{Math.round(day.totals.fat/fatGrams*100)}%</span></div><ProgressBar value={day.totals.fat} target={fatGrams} className="fill-fat" /></div>
                <div className="progress-item"><div className="plabel"><span>Calories</span><span>{Math.round(day.totals.calories/calories*100)}%</span></div><ProgressBar value={day.totals.calories} target={calories} className="fill-cal" /></div>
              </div>
            </div>
            {isDayExpanded && day.meals.map(function(meal, mi) {
              var mealKey = di + "-" + mi;
              var isEaten = !!eatenMeals[mealKey];
              var isMealExpanded = !!expandedMeals[mealKey];
              return (<div className={"meal-card" + (isEaten ? " eaten" : "")} key={mi}>
                <div className="meal-card-header" onClick={function(e){if(e.target.tagName!=='BUTTON')toggleMeal(di,mi);}}>
                  <div className="meal-header">
                    <span className="meal-name">{isMealExpanded ? "\u25BC" : "\u25B6"} {meal.name}</span>
                    <span style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      {meal.isBreakfast && <span className="cuisine-tag breakfast-tag">Breakfast</span>}
                      <span className="cuisine-tag">{meal.cuisine}</span>
                      <span style={{fontSize:'0.78rem',color:'#3a5a50'}}>Cal: {round1(meal.totalMacros.calories)} | C: {round1(meal.totalMacros.carbs)}g | P: {round1(meal.totalMacros.protein)}g | F: {round1(meal.totalMacros.fat)}g</span>
                      <span className="servings-ctrl">
                        <button onClick={function(e){e.stopPropagation();var k=di+"-"+mi;var cur=mealServings[k]||1;if(cur>1){var n=Object.assign({},mealServings);n[k]=cur-1;if(n[k]===1)delete n[k];setMealServings(n);}}}>−</button>
                        <span className="sv-val">{mealServings[di+"-"+mi]||1}</span>
                        <button onClick={function(e){e.stopPropagation();var k=di+"-"+mi;var n=Object.assign({},mealServings);n[k]=(mealServings[k]||1)+1;setMealServings(n);}}>+</button>
                      </span>
                      <button className="swap-btn" onClick={function(e){e.stopPropagation();setSwapTarget({dayIdx:di,mealIdx:mi});setSwapSearch("");}}>Swap</button>
                      <button className={"eaten-btn" + (isEaten ? " active" : "")} onClick={function(e){e.stopPropagation();toggleEaten(di,mi);}}>{isEaten ? "\u2713 Eaten" : "\u2713"}</button>
                    </span>
                  </div>
                </div>
                {isMealExpanded && (function() {
                  var recipeData = RECIPES.find(function(r){return r.name===meal.originalName;});
                  var instrKey = di+"-"+mi+"-instr";
                  var instrOpen = !!expandedInstructions[instrKey];
                  return (<>
                  {recipeData && recipeData.prepTime && <div className="cook-times"><span>Prep: {recipeData.prepTime}</span><span>Cook: {recipeData.cookTime}</span></div>}
                  <table className="ing-table">
                    <thead><tr><th>Ingredient</th><th>Qty</th><th>Cal</th><th>C</th><th>P</th><th>F</th></tr></thead>
                    <tbody>
                      {meal.ingredients.map(function(ing, ii) {
                        return (<React.Fragment key={ii}>
                          <tr className={ing.isSpice?"spice-row":""}>
                            <td>{ing.name}</td>
                            <td>{ingQtyDisplay(ing)}</td>
                            <td>{ing.isSpice ? "\u2014" : round1(ing.calories)}</td>
                            <td>{ing.isSpice ? "\u2014" : round1(ing.carbs)}</td>
                            <td>{ing.isSpice ? "\u2014" : round1(ing.protein)}</td>
                            <td>{ing.isSpice ? "\u2014" : round1(ing.fat)}</td>
                          </tr>
                          {ing.adjustment && <tr><td colSpan={6}><div className="adj-note">{"\u26A0\uFE0F"} {ing.adjustment}</div></td></tr>}
                        </React.Fragment>);
                      })}
                    </tbody>
                  </table>
                  <div className="meal-totals">
                    <span>Cal: {round1(meal.totalMacros.calories)}</span><span>C: {round1(meal.totalMacros.carbs)}g</span>
                    <span>P: {round1(meal.totalMacros.protein)}g</span><span>F: {round1(meal.totalMacros.fat)}g</span>
                  </div>
                  {recipeData && recipeData.steps && (<>
                    <button className="instructions-toggle" onClick={function(e){e.stopPropagation();var n=Object.assign({},expandedInstructions);if(n[instrKey])delete n[instrKey];else n[instrKey]=true;setExpandedInstructions(n);}}>{instrOpen ? "\u25BC" : "\u25B6"} {instrOpen ? "Hide Instructions" : "How to Cook"}</button>
                    {instrOpen && <div className="instructions-list"><ol>{recipeData.steps.map(function(step,si){return <li key={si}>{step}</li>;})}</ol></div>}
                  </>)}
                </>);})()}
              </div>);
            })}
          </div>);
        })}
        </>)}

        {view === "grocery" && (<div className="card">
          <div className="grocery-top-bar"><h2 style={{margin:0}}>Weekly Grocery List</h2><button className="btn btn-sm btn-secondary" onClick={handleCopyGrocery}>Copy List</button></div>
          {copyMsg && <div className="success">{copyMsg}</div>}
          {groceryList.map(function(section, si) {
            return (<div className="grocery-section" key={si}><h3>{section.category}</h3>
              {section.items.map(function(item, ii) {
                return (<div className="grocery-item" key={ii}>
                  <span className="gi-name">{item.name}</span>
                  <span className="gi-qty">{groceryQtyText(item)}</span>
                  <span className="gi-alt"></span>
                  <span className="gi-usage">{[...new Set(item.appearances)].join(", ")}</span>
                </div>);
              })}
            </div>);
          })}
          {plan && (function() {
            var shakeScoops = 0;
            plan.forEach(function(day) { if (day && day.proteinShake) shakeScoops += day.proteinShake.scoops; });
            if (shakeScoops === 0) return null;
            return (<div className="grocery-section"><h3>Supplements</h3>
              <div className="grocery-item">
                <span className="gi-name">Protein Powder</span>
                <span className="gi-qty">{shakeScoops} {shakeScoops === 1 ? "scoop" : "scoops"}</span>
                <span className="gi-alt">~{shakeScoops * 30}g</span>
                <span className="gi-usage">Protein shake supplement ({shakeScoops} {shakeScoops === 1 ? "day" : "days"} this week)</span>
              </div>
            </div>);
          })()}
        </div>)}

        {view === "recipes" && (<div className="card">
          <h2>Recipe Database ({RECIPES.length} recipes)</h2>

// Background validation: run 1000-week simulation and log full distribution summary.
// Target: zero recipes never selected, no single recipe above 3%.
(function() {
  var SIM_TOTAL = 1000, SIM_BATCH = 50;
  var freq = {}, totalSlots = 0, done = 0;
  RECIPES.forEach(function(r) { freq[r.name] = 0; });
  var simCal = 2500, simCarbG = round1((2500*0.4)/4), simProG = round1((2500*0.3)/4), simFatG = round1((2500*0.3)/9);
  _recipeRotation = { counts: {}, totalSlots: 0 };
  function batch() {
    var end = Math.min(done + SIM_BATCH, SIM_TOTAL);
    for (var i = done; i < end; i++) {
      var plan = generatePlan(simCal, simCarbG, simProG, simFatG, {}, [], []);
      plan.forEach(function(day) { if (!day) return; day.meals.forEach(function(meal) { freq[meal.originalName] = (freq[meal.originalName]||0)+1; totalSlots++; }); });
    }
    done = end;
    if (done < SIM_TOTAL) { setTimeout(batch, 0); return; }
    var sorted = Object.keys(freq).map(function(n) { return { name: n, count: freq[n], pct: round1((freq[n]/totalSlots)*100) }; }).sort(function(a,b) { return b.count - a.count; });
    var never = sorted.filter(function(r) { return r.count === 0; });
    var below1 = sorted.filter(function(r) { return r.pct < 1; });
    var topPct = sorted[0] ? sorted[0].pct : 0;
    var idealPct = round1(100 / RECIPES.length);
    console.log("[MealPrep Distribution Validation] 1000 weeks, " + totalSlots + " slots, " + RECIPES.length + " recipes (ideal ~" + idealPct + "% each)");
    console.log("  Never selected: " + never.length + (never.length === 0 ? " (PASS)" : " (FAIL — target 0)") + (never.length > 0 ? " — " + never.map(function(r){return r.name;}).join(", ") : ""));
    console.log("  Below 1%: " + below1.length + " recipes");
    console.log("  Most selected: " + sorted[0].name + " at " + sorted[0].pct + "% " + (topPct <= 3 ? "(PASS — target <=3%)" : "(FAIL — target <=3%)"));
    console.log("  Least selected: " + sorted[sorted.length-1].name + " at " + sorted[sorted.length-1].pct + "%");
    console.log("  Spread: top " + sorted[0].pct + "% / bottom " + sorted[sorted.length-1].pct + "% (ratio " + round1(sorted[0].pct / Math.max(sorted[sorted.length-1].pct, 0.1)) + "x)");
    _recipeRotation = { counts: {}, totalSlots: 0 };
  }
  setTimeout(batch, 100);
})();

// ===== SELF-TESTS for Fixes A-E (hard gates, scale factors, protein rescue) =====
setTimeout(function() {
  console.log("\n[Fixes A-E Self-Tests]");
  var testCal = 2000, testCarbs = 175, testPro = 200, testFat = 55;
  var allPass = true;

  // Test 1: Verify hard gate on Carnitas Tacos after Japanese Tamagoyaki
  (function() {
    console.log("Test 1: Fix A hard gate on fat-over-budget recipe");
    // Simulate remaining budget after Japanese Tamagoyaki (cal:436, carbs:46.2, pro:25.2, fat:16.2)
    var mealsLeft = 2;
    var remainingBudget = {
      calories: Math.max(1, (testCal - 436) / mealsLeft),
      carbs: Math.max(0.1, (testCarbs - 46.2) / mealsLeft),
      protein: Math.max(0.1, (testPro - 25.2) / mealsLeft),
      fat: Math.max(0.1, (testFat - 16.2) / mealsLeft)
    };
    // Find Carnitas Tacos and a high-protein low-fat alternative
    var carnitas = RECIPES.find(function(r) { return r.name === "Carnitas Tacos"; });
    var chicken = RECIPES.find(function(r) { return r.name === "Grilled Chicken & Rice Bowl"; });
    if (!carnitas || !chicken) { console.log("  SKIP: recipes not found"); return; }
    // macroNudge is inside generatePlan scope, so we replicate the logic here
    function testNudge(recipe, rb) {
      var rm = recipe.totalMacros;
      var devCal = Math.abs(rm.calories - rb.calories) / Math.max(rb.calories, 1);
      var devCarbs = Math.abs(rm.carbs - rb.carbs) / Math.max(rb.carbs, 1);
      var devPro = Math.abs(rm.protein - rb.protein) / Math.max(rb.protein, 1);
      var devFat = Math.abs(rm.fat - rb.fat) / Math.max(rb.fat, 1);
      var maxD = Math.max(devCal, devCarbs, devPro, devFat);
      var avgAll = (devCal + devCarbs + devPro + devFat) / 4;
      var avgDev = maxD * 0.6 + avgAll * 0.4;
      var nudge = Math.max(0.1, Math.min(2.0, 2.0 - avgDev * 1.9));
      if (rm.fat > rb.fat) nudge *= 0.1;
      if (rm.protein < rb.protein * 0.25) nudge *= 0.2;
      return nudge;
    }
    var carnitasNudge = testNudge(carnitas, remainingBudget);
    var chickenNudge = testNudge(chicken, remainingBudget);
    // Carnitas has 23.5g fat vs 19.4g budget — should trigger 0.1x fat gate
    var fatGateTriggered = carnitas.totalMacros.fat > remainingBudget.fat;
    var carnitasLower = carnitasNudge < chickenNudge;
    var pass = fatGateTriggered && carnitasLower;

    console.log("  Fat gate triggered: " + fatGateTriggered + ", Carnitas nudge: " + round1(carnitasNudge) + ", Chicken nudge: " + round1(chickenNudge));
    console.log("  Carnitas lower than chicken: " + carnitasLower + " — " + (pass ? "PASS" : "FAIL"));
    if (!pass) allPass = false;
  })();
