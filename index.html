<script type="text/babel">

// ===== UNIT-BASED INGREDIENTS =====
var UNIT_INGREDIENTS = {
  "Egg": { unit: "egg", plural: "eggs", gPerUnit: 50 },
  "Corn Tortillas": { unit: "tortilla", plural: "tortillas", gPerUnit: 30 },
  "Whole Wheat Tortilla": { unit: "tortilla", plural: "tortillas", gPerUnit: 35 },
  "Pita Bread": { unit: "pita", plural: "pitas", gPerUnit: 60 },
  "Flatbread": { unit: "flatbread", plural: "flatbreads", gPerUnit: 90 },
  "Whole Wheat Bread": { unit: "slice", plural: "slices", gPerUnit: 30 },
  "Sub Roll": { unit: "roll", plural: "rolls", gPerUnit: 75 },
  "Lime": { unit: "lime", plural: "limes", gPerUnit: 15 },
  "Lemon": { unit: "lemon", plural: "lemons", gPerUnit: 15 },
  "Banana": { unit: "banana", plural: "bananas", gPerUnit: 100 },
  "Nori Seaweed": { unit: "sheet", plural: "sheets", gPerUnit: 2.5 }
};

function isUnitBased(name) { return !!UNIT_INGREDIENTS[name]; }
function getUnitCount(name, grams) {
  var u = UNIT_INGREDIENTS[name];
  if (!u) return null;
  return Math.round(grams / u.gPerUnit);
}
function getUnitDisplay(name, grams) {
  var u = UNIT_INGREDIENTS[name];
  if (!u) return null;
  var count = Math.max(1, Math.round(grams / u.gPerUnit));
  return count + " " + (count === 1 ? u.unit : u.plural);
}

// ===== SPICE DISPLAY =====
function spiceDisplay(grams) {
  if (grams <= 1) return "pinch";
  if (grams <= 3) return "\u00BD tsp";
  if (grams <= 6) return "1 tsp";
  return Math.round(grams / 5) + " tsp";
}

  "Avocado Toast with Egg": { prepTime: "5 mins", cookTime: "5 mins", steps: ["1. Toast the whole wheat bread slices until golden and crisp.", "2. Halve the avocado, remove the pit, and mash the flesh with a fork. Season with salt and pepper.", "3. Fry or poach the eggs to your preference (about 3-4 minutes for a runny yolk).", "4. Spread mashed avocado evenly onto the toast slices.", "5. Top each slice with an egg and halved cherry tomatoes.", "6. Season with salt, pepper, and a pinch of red pepper flakes if desired."] },

  "Breakfast Burrito": { prepTime: "10 mins", cookTime: "10 mins", steps: ["1. Scramble the eggs in a non-stick skillet over medium heat until just set, about 2-3 minutes. Set aside.", "2. Warm the black beans in a small saucepan or microwave.", "3. Warm the tortilla in a dry skillet for 30 seconds per side.", "4. Layer scrambled eggs, black beans, shredded cheddar cheese, and sliced avocado down the center of the tortilla.", "5. Fold in the sides, then roll tightly from the bottom up.", "6. Optional: toast the burrito seam-side down in a skillet for 1-2 minutes for a crispy exterior."] },
  "Shakshuka Breakfast": { prepTime: "10 mins", cookTime: "20 mins", steps: ["1. Dice the onion and bell pepper. Sauté in a skillet with a drizzle of olive oil over medium heat for 5 minutes until softened.", "2. Pour in the tomato sauce, season with cumin, paprika, salt, and pepper. Simmer for 5 minutes.", "3. Make small wells in the sauce and crack eggs into them.", "4. Cover the skillet and cook on medium-low for 6-8 minutes until egg whites are set but yolks are still slightly runny.", "5. Crumble feta cheese over the top.", "6. Serve straight from the skillet with warm pita bread for dipping."] },

  "Smoothie Bowl": { prepTime: "5 mins", cookTime: "0 mins", steps: ["1. Freeze the banana for at least 2 hours (or use a pre-frozen banana).", "2. Blend frozen banana, blueberries, and Greek yogurt until thick and smooth. Add a splash of water if needed, but keep it thicker than a regular smoothie.", "3. Pour into a bowl.", "4. Top with granola, extra blueberries, and a drizzle of honey.", "5. Serve immediately before it melts."] },
  "Masala Dosa": { prepTime: "15 mins", cookTime: "20 mins", steps: ["1. Boil the potatoes until fork-tender, about 12-15 minutes. Drain, peel, and mash roughly.", "2. Sauté diced onion with mustard seeds, curry leaves, and turmeric in a little oil until golden. Mix into the mashed potatoes and season with salt.", "3. Mix rice flour with water and a pinch of salt to form a thin, pourable batter.", "4. Heat a non-stick skillet or griddle over medium-high heat. Pour batter and spread in a circular motion to form a thin crepe.", "5. Cook until the edges lift and the bottom is golden and crispy, about 2 minutes.", "6. Place the potato filling on one half, fold the dosa over, and serve with coconut chutney."] },

  "French Toast": { prepTime: "5 mins", cookTime: "10 mins", steps: ["1. Whisk together eggs, whole milk, a pinch of cinnamon, and a splash of vanilla extract in a shallow dish.", "2. Melt butter in a non-stick skillet over medium heat.", "3. Dip each bread slice into the egg mixture, letting it soak for 10-15 seconds per side.", "4. Cook in the skillet for 2-3 minutes per side until golden brown.", "5. Slice strawberries while the toast cooks.", "6. Serve topped with fresh strawberries and a drizzle of maple syrup."] },
  "Huevos Rancheros": { prepTime: "10 mins", cookTime: "15 mins", steps: ["1. Warm the black beans in a small saucepan with a pinch of cumin and salt.", "2. Heat tomato sauce in a skillet until simmering.", "3. Lightly toast or fry the corn tortillas in a dry skillet until slightly crisp.", "4. Fry the eggs sunny-side up or over-easy in a lightly oiled skillet.", "5. Place tortillas on a plate, spread with black beans, top with fried eggs, and spoon warm tomato sauce over everything.", "6. Garnish with sliced avocado and crumbled feta cheese."] },
  "Grilled Chicken & Rice Bowl": { prepTime: "10 mins", cookTime: "25 mins", steps: ["1. Cook brown rice according to package directions, about 20-25 minutes.", "2. Season chicken breast with salt, pepper, and a drizzle of olive oil.", "3. Grill or pan-sear chicken over medium-high heat for 6-7 minutes per side until internal temperature reaches 74°C (165°F). Let rest 5 minutes, then slice.", "4. Steam or blanch broccoli for 3-4 minutes until bright green and tender-crisp.", "5. Assemble the bowl with rice, sliced chicken, and broccoli.", "6. Drizzle with remaining olive oil and season to taste."] },
  "Spaghetti Bolognese": { prepTime: "10 mins", cookTime: "30 mins", steps: ["1. Bring a large pot of salted water to a boil. Cook spaghetti according to package directions until al dente. Drain, reserving a splash of pasta water.", "2. Dice the onion. Sauté in a drizzle of olive oil over medium heat until translucent, about 3-4 minutes.", "3. Add ground beef, breaking it apart with a wooden spoon. Cook until browned, about 5-6 minutes. Drain excess fat.", "4. Stir in tomato sauce, season with salt, pepper, and Italian herbs. Simmer on low for 15-20 minutes.", "5. Toss the cooked spaghetti into the sauce, adding a splash of pasta water to help it coat.", "6. Serve topped with grated Parmesan cheese."] },
  "Chicken Burrito Bowl": { prepTime: "10 mins", cookTime: "25 mins", steps: ["1. Cook brown rice according to package directions.", "2. Season chicken breast with cumin, chili powder, salt, and pepper. Grill or pan-sear over medium-high heat for 6-7 minutes per side until cooked through. Slice into strips.", "3. Warm black beans in a small saucepan with a pinch of cumin.", "4. Slice the bell pepper and sauté in a skillet until slightly charred, about 3-4 minutes.", "5. Slice the avocado.", "6. Assemble the bowl: rice on the bottom, topped with chicken, black beans, bell pepper, and avocado slices."] },
  "Teriyaki Salmon Bowl": { prepTime: "10 mins", cookTime: "15 mins", steps: ["1. Cook white rice according to package directions.", "2. Mix soy sauce with a tablespoon of honey or mirin for the teriyaki glaze.", "3. Pat salmon fillet dry and season with salt. Sear skin-side down in an oiled skillet over medium-high heat for 4 minutes.", "4. Flip, brush with teriyaki glaze, and cook for another 3-4 minutes until the salmon flakes easily.", "5. Cook edamame in boiling water for 3 minutes, then drain.", "6. Assemble the bowl with rice, salmon, and edamame. Drizzle with remaining teriyaki glaze."] },

  "Pad Thai": { prepTime: "15 mins", cookTime: "10 mins", steps: ["1. Soak rice noodles in warm water for 15-20 minutes until pliable. Drain.", "2. Mix a sauce with 2 tbsp fish sauce, 1 tbsp tamarind paste, 1 tbsp sugar, and a squeeze of lime.", "3. Heat oil in a wok over high heat. Cook shrimp for 2 minutes per side until pink. Set aside.", "4. Scramble the egg in the wok, breaking it into small pieces.", "5. Add drained noodles and sauce to the wok. Toss for 2-3 minutes until noodles are coated and heated through. Return shrimp to the wok.", "6. Plate and top with crushed peanuts, bean sprouts, and a lime wedge."] },
  "Greek Chicken Salad": { prepTime: "15 mins", cookTime: "15 mins", steps: ["1. Season chicken breast with olive oil, oregano, salt, and pepper.", "2. Grill or pan-sear over medium-high heat for 6-7 minutes per side until cooked through. Rest 5 minutes, then slice.", "3. Dice cucumber, tomato, and red onion.", "4. Toss the vegetables together in a large bowl.", "5. Top the salad with sliced chicken and crumbled feta cheese.", "6. Drizzle with olive oil and a squeeze of lemon juice. Season to taste."] },

  "Carnitas Tacos": { prepTime: "10 mins", cookTime: "120 mins", steps: ["1. Season pork shoulder generously with salt, pepper, cumin, and oregano.", "2. Place pork in a Dutch oven or slow cooker with a squeeze of lime juice and a splash of water. Cover and braise at 160°C (325°F) for about 2 hours, or slow-cook on low for 4-6 hours, until fork-tender.", "3. Shred the pork with two forks and crisp it under a broiler or in a hot skillet for 3-4 minutes.", "4. Warm corn tortillas in a dry skillet for 30 seconds per side.", "5. Dice the onion and roughly chop the cilantro.", "6. Fill tortillas with carnitas, top with diced onion, cilantro, and a squeeze of fresh lime."] },

  "Palak Paneer": { prepTime: "10 mins", cookTime: "25 mins", steps: ["1. Cook brown rice according to package directions.", "2. Blanch spinach in boiling water for 2 minutes, then drain and blend into a smooth puree.", "3. Cut paneer into cubes. Pan-fry in a little oil over medium heat until golden on all sides, about 3-4 minutes. Set aside.", "4. Sauté diced onion and minced garlic in the same pan until softened, about 4-5 minutes.", "5. Add the spinach puree, season with cumin, garam masala, and salt. Simmer for 5-7 minutes.", "6. Fold in the paneer cubes, cook for 2 more minutes, and serve over brown rice."] },
  "Shawarma Bowl": { prepTime: "15 mins", cookTime: "20 mins", steps: ["1. Cook white rice according to package directions.", "2. Slice chicken thigh and season with cumin, paprika, turmeric, garlic powder, salt, and pepper.", "3. Cook the seasoned chicken in an oiled skillet over medium-high heat for 5-6 minutes per side until charred and cooked through.", "4. Dice the tomato and cucumber.", "5. Assemble the bowl: rice on the bottom, topped with shawarma chicken, diced tomato, cucumber, and a generous dollop of hummus.", "6. Drizzle with a squeeze of lemon juice and serve."] },
  "Kimchi Fried Rice": { prepTime: "5 mins", cookTime: "10 mins", steps: ["1. Slice pork belly into small pieces. Cook in a wok or large skillet over medium-high heat until crispy, about 4-5 minutes. Remove and set aside, leaving the rendered fat.", "2. Roughly chop the kimchi. Add to the wok and stir-fry for 2 minutes.", "3. Add the cooked white rice, breaking up any clumps. Stir-fry for 3-4 minutes until rice is heated through and slightly crispy.", "4. Drizzle with sesame oil and toss to combine. Return pork belly to the wok.", "5. Fry the egg sunny-side up in a separate skillet.", "6. Plate the fried rice, top with the fried egg, crispy pork belly, and sliced green onion."] }

"Shawarma Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice chicken thigh into strips and season with shawarma spices.","Cook chicken in a hot skillet for 5-6 minutes until browned and cooked through.","Dice tomato and cucumber.","Assemble bowls with rice, chicken, hummus, tomato, and cucumber."]},
"Kimchi Fried Rice":{prepTime:"5 mins",cookTime:"10 mins",steps:["Dice pork belly into small pieces.","Heat sesame oil in a wok, cook pork belly until crispy, about 4 minutes.","Add chopped kimchi and stir-fry for 2 minutes.","Add cooked rice and toss everything together over high heat.","Push rice to the side, fry an egg in the center of the wok.","Plate rice topped with the fried egg and sliced green onion."]},
"Green Curry":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Cut chicken breast into bite-sized pieces.","Heat a splash of coconut milk in a pot, add green curry paste and cook 1 minute.","Add remaining coconut milk, chicken, bamboo shoots, and sliced bell pepper.","Simmer for 15 minutes until chicken is cooked through.","Serve curry over rice."]},
"Lentil Soup":{prepTime:"10 mins",cookTime:"30 mins",steps:["Dice onion, carrot, and tomato. Mince garlic.","Heat olive oil in a large pot, saut\u00e9 onion and garlic until soft.","Add carrot and cook 2 minutes.","Add red lentils, diced tomato, and 3 cups water or broth.","Bring to a boil, then reduce heat and simmer for 25 minutes until lentils are soft.","Season with salt and pepper, blend partially if desired."]},
"Turkey Club Wrap":{prepTime:"10 mins",cookTime:"0 mins",steps:["Warm the tortilla in a dry pan or microwave for 15 seconds.","Layer turkey breast slices on the tortilla.","Slice avocado and tomato.","Add spinach, avocado, and tomato on top of the turkey.","Roll up tightly, tucking in the sides.","Slice in half diagonally and serve."]},
"Pasta Primavera":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook penne pasta in salted boiling water according to package directions.","Dice zucchini and bell pepper. Halve cherry tomatoes.","Heat olive oil in a large pan, saut\u00e9 zucchini and bell pepper for 4-5 minutes.","Add cherry tomatoes and cook 2 more minutes.","Toss drained pasta with vegetables and grated parmesan.","Season with salt and pepper."]},
"Fish Tacos":{prepTime:"10 mins",cookTime:"10 mins",steps:["Pat cod fillets dry and season with salt, pepper, and cumin.","Pan-sear fish in a hot oiled pan for 3-4 minutes per side until flaky.","Warm corn tortillas in a dry pan.","Shred cabbage thinly.","Break fish into chunks and fill tortillas with fish, cabbage, and sliced avocado.","Serve with lime wedges."]},
"Tofu Stir Fry":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Press tofu to remove excess water, then cut into cubes.","Heat sesame oil in a wok, cook tofu until golden on all sides, about 6-8 minutes.","Add broccoli florets and sliced carrot, stir-fry 4-5 minutes.","Add soy sauce and toss everything together.","Serve over rice."]},
"Lamb Kofta Plate":{prepTime:"15 mins",cookTime:"12 mins",steps:["Mix ground lamb with spices, minced onion, and salt.","Form mixture into oval-shaped kofta patties or cylinders.","Grill or pan-fry kofta for 4-5 minutes per side until cooked through.","Dice tomato and red onion.","Arrange kofta on a plate with hummus, warm pita bread, tomato, and red onion."]},
"Japchae":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook sweet potato noodles according to package, drain and toss with a little sesame oil.","Slice beef sirloin into thin strips.","Blanch spinach, squeeze dry, and season with sesame oil.","Julienne bell pepper and carrot.","Stir-fry beef in a hot pan, set aside. Stir-fry vegetables briefly.","Combine noodles, beef, vegetables, soy sauce, and sesame oil. Toss together and serve."]},
"Tom Yum Shrimp Soup":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Peel and devein shrimp.","Bring 3 cups of water to a boil, add halved cherry tomatoes and sliced mushrooms.","Add coconut milk and tom yum paste or lemongrass and galangal.","Add shrimp and cook for 3-4 minutes until pink.","Squeeze in lime juice, adjust seasoning, and serve alongside rice."]},
"Quinoa Power Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook quinoa in water according to package directions.","Peel and cube sweet potato, toss with olive oil and roast at 200\u00b0C (400\u00b0F) for 20 minutes.","Season and grill or pan-sear chicken breast until cooked through, then slice.","Arrange bowls with quinoa, roasted sweet potato, sliced chicken, and fresh spinach.","Drizzle with remaining olive oil."]},
"BBQ Chicken Plate":{prepTime:"10 mins",cookTime:"35 mins",steps:["Peel and cube sweet potato, roast at 200\u00b0C (400\u00b0F) for 25 minutes.","Season chicken thighs with salt, pepper, and paprika.","Grill or bake chicken for 20-25 minutes until cooked through.","Brush chicken with BBQ sauce during the last 5 minutes of cooking.","Toss coleslaw mix with a light dressing.","Serve chicken with roasted sweet potato and coleslaw."]},
"Chana Masala":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Dice onion and mince garlic.","Heat olive oil in a pan, saut\u00e9 onion and garlic until golden.","Add spices and toast for 30 seconds.","Add chickpeas and tomato sauce, simmer for 15-20 minutes.","Serve over rice."]},
"Poke Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and let it cool slightly.","Cut ahi tuna into 1cm cubes.","Marinate tuna in soy sauce and a dash of sesame oil for 5 minutes.","Slice avocado and cucumber.","Cook edamame in boiling water for 3 minutes, drain.","Assemble bowls with rice, marinated tuna, avocado, cucumber, and edamame."]},
"Bulgogi Rice Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice beef sirloin thinly and marinate in soy sauce, sesame oil, and a pinch of sugar for 10 minutes.","Julienne carrot and slice green onion.","Cook marinated beef in a hot skillet for 3-4 minutes until caramelized.","Assemble bowls with rice, bulgogi beef, carrot, and green onion."]},
"Massaman Curry":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook white rice according to package directions.","Cut chicken thigh into chunks and peel and cube sweet potato.","Heat coconut milk in a pot, add massaman curry paste and stir.","Add chicken and sweet potato, simmer for 25 minutes until tender.","Stir in peanuts during the last 5 minutes.","Serve curry over rice."]},
"Egg Fried Rice":{prepTime:"5 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results.","Heat sesame oil in a wok over high heat.","Scramble eggs in the wok, break into small pieces.","Add rice and green peas, stir-fry for 3-4 minutes.","Add diced carrot and soy sauce, toss until heated through.","Serve immediately."]},
"Tuna Nicoise Salad":{prepTime:"15 mins",cookTime:"15 mins",steps:["Boil potato until tender, about 12 minutes. Slice when cool.","Hard-boil egg for 10 minutes, peel and quarter.","Blanch green beans for 3 minutes, then cool in ice water.","Halve the cherry tomatoes.","Arrange potato, egg, green beans, cherry tomatoes, and drained tuna on a plate.","Drizzle with olive oil and season with salt and pepper."]},
"Chicken Quesadilla":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season and cook chicken breast in a pan until done, then dice.","Dice bell pepper and onion, saut\u00e9 until softened.","Place tortilla in a dry pan, add chicken, vegetables, and cheddar cheese on one half.","Fold tortilla over and cook 2-3 minutes per side until golden and cheese melts.","Let rest for 1 minute, then cut into wedges."]},
"Hummus & Veggie Wrap":{prepTime:"10 mins",cookTime:"0 mins",steps:["Warm the tortilla briefly in a dry pan or microwave.","Spread hummus generously over the tortilla.","Slice cucumber and carrot into thin sticks.","Layer spinach, cucumber, carrot, and crumbled feta on top.","Roll up tightly, tucking in the sides.","Slice in half and serve."]},
"Chicken Caesar Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season chicken breast with salt, pepper, and garlic powder.","Grill or pan-sear chicken 6-7 minutes per side until cooked through. Let rest, then slice.","Wash and chop romaine lettuce.","Toss lettuce with olive oil and a squeeze of lemon as dressing.","Top with sliced chicken, shaved parmesan, and croutons."]},
"Lamb Shawarma Wrap":{prepTime:"10 mins",cookTime:"12 mins",steps:["Season ground lamb with shawarma spices and form into a flat patty or crumbles.","Cook lamb in a hot skillet until browned and cooked through, about 8 minutes.","Warm the tortilla in a dry pan.","Dice tomato and slice red onion.","Layer lamb, tomato, red onion, and a drizzle of tahini on the tortilla.","Roll up tightly and serve."]},
"Shrimp Fried Rice":{prepTime:"10 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results.","Peel and devein shrimp.","Heat sesame oil in a wok over high heat, cook shrimp 2 minutes per side, set aside.","Scramble egg in the wok, break apart.","Add rice and green peas, stir-fry for 3 minutes.","Return shrimp, add soy sauce, and toss until combined."]},
"Butter Chicken":{prepTime:"15 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Cut chicken breast into bite-sized pieces.","Melt butter in a large pan and sear chicken until golden on all sides.","Add tomato sauce and simmer for 10 minutes.","Stir in greek yogurt and cook for 5 more minutes on low heat.","Serve over rice."]},
"Mediterranean Stuffed Peppers":{prepTime:"15 mins",cookTime:"30 mins",steps:["Preheat oven to 190\u00b0C (375\u00b0F).","Cook quinoa according to package directions.","Brown ground beef in a skillet with spices.","Mix cooked quinoa, beef, diced tomato, and half the feta.","Cut bell peppers in half and remove seeds.","Stuff peppers with the mixture, top with remaining feta, and bake for 25 minutes."]},
"Korean Chicken Wings":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook white rice according to package directions.","Pat chicken wings dry and season with salt and pepper.","Bake wings at 220\u00b0C (425\u00b0F) for 25-30 minutes until crispy, flipping halfway.","Mix soy sauce, honey, minced garlic, and sesame oil for the glaze.","Toss baked wings in the glaze.","Serve wings over rice."]},
"Cacio e Pepe":{prepTime:"5 mins",cookTime:"12 mins",steps:["Cook spaghetti in salted boiling water until al dente. Reserve 1 cup of pasta water.","Finely grate parmesan cheese.","Melt butter with olive oil in a large pan over low heat.","Add cooked pasta to the pan with a splash of pasta water.","Toss vigorously while adding parmesan, creating a creamy sauce. Add more pasta water as needed.","Finish with generous freshly cracked black pepper."]},
"Chicken Enchiladas":{prepTime:"15 mins",cookTime:"25 mins",steps:["Preheat oven to 190\u00b0C (375\u00b0F).","Cook and shred chicken breast, or dice finely.","Mix chicken with diced onion and half the cheddar cheese.","Warm corn tortillas briefly to make them pliable.","Fill tortillas with chicken mixture, roll up, and place seam-side down in a baking dish.","Pour tomato sauce over enchiladas, top with remaining cheese, and bake for 20 minutes."]},
"Sushi Bowl (Chirashi)":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and season with a splash of rice vinegar while warm.","Slice salmon fillet into thin sashimi-style pieces.","Slice avocado and cucumber.","Cook edamame in boiling water for 3 minutes, drain.","Arrange rice in a bowl and artfully top with salmon, avocado, cucumber, and edamame.","Serve with soy sauce on the side."]},
"Aloo Gobi":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Peel and cube potato. Cut cauliflower into florets.","Dice onion and tomato.","Heat olive oil in a pan, saut\u00e9 onion until golden.","Add potato, cauliflower, tomato, and spices. Cover and cook for 20 minutes, stirring occasionally.","Serve over rice."]},
"Tabbouleh with Grilled Chicken":{prepTime:"15 mins",cookTime:"20 mins",steps:["Cook quinoa according to package directions and let cool.","Season and grill chicken breast until cooked through, then dice.","Finely dice cucumber and tomato.","Toss cooled quinoa with cucumber, tomato, olive oil, and lemon juice.","Season with salt, pepper, and fresh herbs.","Top tabbouleh with diced grilled chicken."]},
"Pork Tonkatsu":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Pound pork loin to even thickness and season with salt and pepper.","Set up breading station: flour, beaten egg, panko breadcrumbs.","Coat pork in flour, dip in egg, then press into panko.","Pan-fry in oil over medium-high heat for 3-4 minutes per side until golden and crispy.","Slice tonkatsu and serve with rice and shredded cabbage."]},
"Thai Basil Chicken":{prepTime:"10 mins",cookTime:"10 mins",steps:["Cook white rice according to package directions.","Dice chicken breast into small pieces.","Mince garlic and slice bell pepper.","Heat sesame oil in a wok over high heat, cook chicken until browned.","Add garlic, bell pepper, and soy sauce. Stir-fry for 3-4 minutes.","Serve over rice."]},
"Tuscan White Bean Soup":{prepTime:"10 mins",cookTime:"20 mins",steps:["Mince garlic and dice tomato.","Heat olive oil in a large pot, saut\u00e9 garlic for 1 minute.","Add white beans, tomato, and 2 cups water or broth.","Simmer for 15 minutes.","Stir in spinach and cook until wilted, about 2 minutes.","Toast whole wheat bread and serve soup with bread on the side."]},
"Mango Chicken Curry":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Cut chicken thigh into pieces and dice onion.","Saut\u00e9 onion in oil until softened, add chicken and brown on all sides.","Add coconut milk, diced mango, and spices.","Simmer for 15-20 minutes until chicken is cooked and sauce thickens.","Serve over rice."]},
"Grilled Salmon & Asparagus":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook quinoa according to package directions.","Trim asparagus ends and toss with olive oil, salt, and pepper.","Season salmon fillet with salt, pepper, and lemon juice.","Grill or bake salmon and asparagus at 200\u00b0C (400\u00b0F) for 12-15 minutes.","Plate quinoa, top with salmon and asparagus.","Squeeze fresh lemon over everything."]},
"Beef Tacos":{prepTime:"10 mins",cookTime:"12 mins",steps:["Brown ground beef in a skillet over medium-high heat, breaking it apart.","Season with cumin, chili powder, salt, and pepper.","Dice tomato, onion, and avocado.","Warm corn tortillas in a dry pan.","Fill tortillas with seasoned beef, tomato, onion, avocado, and cilantro.","Serve immediately."]},
"Chicken Pesto Pasta":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook penne pasta according to package directions.","Season and pan-sear chicken breast until cooked through, then slice.","Halve the cherry tomatoes.","Toss drained pasta with pesto sauce and cherry tomatoes.","Top with sliced chicken and grated parmesan cheese."]},
"Katsu Curry":{prepTime:"15 mins",cookTime:"25 mins",steps:["Cook white rice according to package directions.","Dice onion and carrot for the curry sauce.","Saut\u00e9 onion and carrot in oil, add curry powder and water, simmer for 15 minutes.","Pound chicken breast to even thickness, coat in flour, beaten egg, then panko.","Pan-fry chicken for 3-4 minutes per side until golden and crispy.","Slice katsu and serve with rice and curry sauce."]},
"Spicy Tuna Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and let it cool slightly.","Cut ahi tuna into cubes.","Mix tuna with soy sauce, sesame oil, and chili flakes.","Slice avocado and cucumber.","Assemble bowls with rice, spicy tuna, avocado, and cucumber.","Drizzle with extra sesame oil if desired."]},
"Steak & Sweet Potato":{prepTime:"10 mins",cookTime:"30 mins",steps:["Peel and cube sweet potato, toss with a little oil and roast at 200\u00b0C (400\u00b0F) for 25 minutes.","Season beef sirloin with salt and pepper.","Sear steak in a hot pan with butter for 3-4 minutes per side for medium.","Let steak rest for 5 minutes, then slice.","Steam broccoli until tender-crisp, about 4 minutes.","Serve sliced steak with sweet potato and broccoli."]},
"Chicken Lettuce Wraps":{prepTime:"10 mins",cookTime:"10 mins",steps:["Dice chicken breast into small pieces.","Heat oil in a wok, cook chicken until browned.","Add soy sauce and cook 1 more minute.","Grate or julienne carrot.","Separate romaine lettuce leaves to use as cups.","Fill lettuce cups with chicken, carrot, and crushed peanuts. Squeeze lime over top."]},
"Dal Tadka":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook brown rice according to package directions.","Rinse red lentils and cook in 2.5 cups water until soft, about 20 minutes.","Dice onion, tomato, and mince garlic.","Heat butter in a small pan, saut\u00e9 garlic and onion until golden (this is the tadka).","Add tomato and spices to the tadka, cook 2 minutes.","Pour the tadka over the cooked lentils, stir, and serve over rice."]},
"Baba Ganoush Plate":{prepTime:"10 mins",cookTime:"30 mins",steps:["Roast whole eggplant at 220\u00b0C (425\u00b0F) for 25-30 minutes until completely soft.","Scoop out eggplant flesh and mash with tahini, olive oil, and lemon juice.","Season with salt and pepper.","Dice cucumber and tomato.","Arrange baba ganoush on a plate with cucumber, tomato, and warm pita bread."]},
"Dakgalbi":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Cut chicken thigh into bite-sized pieces.","Peel and cube sweet potato, slice cabbage.","Stir-fry chicken in sesame oil with gochugaru and gochujang until nearly cooked.","Add sweet potato and cabbage, cook for 10-12 minutes until vegetables are tender.","Serve over rice."]},
"Panang Curry":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Cut chicken breast into strips. Slice bell pepper and trim green beans.","Heat coconut milk in a pot with panang curry paste.","Add chicken and simmer for 10 minutes.","Add bell pepper and green beans, cook 5 more minutes.","Stir in crushed peanuts and serve over rice."]},
"Eggplant Parmesan":{prepTime:"15 mins",cookTime:"30 mins",steps:["Cook spaghetti according to package directions.","Slice eggplant into rounds, salt and let drain for 10 minutes.","Brush eggplant with olive oil and bake at 200\u00b0C (400\u00b0F) for 15 minutes per side.","Layer baked eggplant in a baking dish with tomato sauce and mozzarella.","Top with grated parmesan and bake for 15 minutes until cheese is bubbly.","Serve alongside pasta."]},
"Black Bean Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Warm black beans in a pot with cumin and a pinch of salt.","Dice tomato and slice avocado.","If using fresh corn, saut\u00e9 kernels briefly in a hot pan.","Assemble bowls with rice, beans, tomato, avocado, and corn.","Squeeze lime over everything."]},
"Salmon Teriyaki Bento":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Season salmon fillet with salt and pepper.","Pan-sear salmon for 4 minutes per side, glaze with soy sauce in the last minute.","Steam broccoli for 4 minutes until tender-crisp.","Cook edamame in boiling water for 3 minutes, drain.","Arrange rice, salmon, broccoli, and edamame in a bento box or plate."]},
"Chicken Alfredo":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook penne pasta according to package directions. Reserve 1 cup pasta water.","Season and pan-sear chicken breast until cooked through, then slice.","Melt butter in a large pan, saut\u00e9 minced garlic for 1 minute.","Add pasta water gradually and stir in grated parmesan until a creamy sauce forms.","Toss pasta in the sauce.","Top with sliced chicken."]},
"Lamb Biryani":{prepTime:"15 mins",cookTime:"35 mins",steps:["Wash and soak basmati rice for 10 minutes, then parboil until 70% cooked. Drain.","Brown ground lamb in a pot with diced onion and minced garlic.","Add greek yogurt and biryani spices, cook for 5 minutes.","Layer parboiled rice over the lamb mixture.","Cover tightly and cook on low heat for 15-20 minutes until rice is fully cooked.","Fluff gently and serve."]},
"Grilled Halloumi Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook quinoa according to package directions and let cool.","Slice halloumi into thick pieces.","Grill or pan-sear halloumi 2 minutes per side until golden.","Halve cherry tomatoes and dice cucumber.","Toss quinoa with vegetables, olive oil, and lemon juice.","Top salad with warm halloumi slices."]},
"Tofu Pad See Ew":{prepTime:"10 mins",cookTime:"10 mins",steps:["Soak rice noodles in warm water for 15 minutes, then drain.","Press tofu and cut into cubes.","Heat sesame oil in a wok, cook tofu until golden, set aside.","Stir-fry broccoli florets in the wok for 2 minutes.","Add noodles and soy sauce, toss together.","Push noodles aside, scramble egg in the wok, then mix everything together with tofu."]},
"Meatball Sub":{prepTime:"15 mins",cookTime:"20 mins",steps:["Mix ground beef with breadcrumbs, salt, pepper, and a beaten egg. Form into meatballs.","Brown meatballs in a pan on all sides, about 5 minutes.","Add tomato sauce, cover, and simmer for 15 minutes until meatballs are cooked through.","Split the sub roll and toast lightly.","Fill the roll with meatballs and sauce.","Top with sliced mozzarella and broil briefly until cheese melts."]},
"Chicken Shawarma Plate":{prepTime:"15 mins",cookTime:"15 mins",steps:["Slice chicken breast into strips and marinate with shawarma spices and olive oil.","Cook chicken in a hot skillet for 5-6 minutes until browned and cooked through.","Warm pita bread in a dry pan.","Dice cucumber and tomato.","Arrange chicken on a plate with pita, hummus, cucumber, and tomato."]},
"Tteokbokki":{prepTime:"5 mins",cookTime:"15 mins",steps:["Soak rice cakes in warm water for 10 minutes if using dried.","Slice fish cakes into bite-sized pieces.","Bring 1.5 cups water to a boil with gochugaru, gochujang, and a pinch of sugar.","Add rice cakes and fish cakes, simmer for 8-10 minutes until rice cakes are soft and chewy.","Stir in sliced green onion.","Top with a soft-boiled egg and a drizzle of sesame oil."]},
"Prawn Laksa":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook rice noodles according to package directions, drain.","Peel and devein shrimp.","Heat coconut milk with laksa paste in a pot until simmering.","Add shrimp and cook for 3-4 minutes until pink.","Place noodles in bowls and ladle the laksa broth and shrimp over them.","Top with bean sprouts and a squeeze of lime."]},
"Risotto with Mushrooms":{prepTime:"10 mins",cookTime:"25 mins",steps:["Slice mushrooms and dice onion.","Heat olive oil and half the butter in a wide pan, saut\u00e9 onion until soft.","Add arborio rice and stir for 1 minute to toast.","Add warm broth or water one ladle at a time, stirring constantly, for about 18-20 minutes.","Stir in saut\u00e9ed mushrooms, remaining butter, and grated parmesan.","Season with salt and pepper, serve immediately."]},
"Cobb Salad":{prepTime:"15 mins",cookTime:"15 mins",steps:["Season and grill or pan-sear chicken breast until cooked through, then dice.","Hard-boil egg for 10 minutes, peel and quarter.","Dice avocado and halve cherry tomatoes.","Chop romaine lettuce and arrange on a plate.","Arrange rows of chicken, egg, avocado, cherry tomatoes, and crumbled cheddar on the lettuce.","Drizzle with olive oil and season with salt and pepper."]},
"Veggie Sushi Rolls":{prepTime:"20 mins",cookTime:"15 mins",steps:["Cook white rice and season with rice vinegar while warm. Let cool.","Julienne cucumber, carrot, and slice avocado thinly.","Place a nori sheet on a bamboo rolling mat, spread rice over the bottom two-thirds.","Arrange vegetables in a line across the center.","Roll tightly using the mat, seal the edge with a little water.","Slice into 8 pieces with a wet knife. Serve with soy sauce."]},
"Chipotle Chicken Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Season chicken thigh with chipotle spices and cook in a hot pan for 6-7 minutes per side.","Warm black beans in a pot.","Dice avocado. Cook corn in a hot dry pan for a charred effect.","Slice chicken and assemble bowls with rice, beans, corn, chicken, and avocado."]},
"Minestrone Soup":{prepTime:"10 mins",cookTime:"25 mins",steps:["Dice zucchini and carrot.","Heat olive oil in a large pot, saut\u00e9 carrot for 3 minutes.","Add zucchini, tomato sauce, and 3 cups water or broth.","Add white beans and penne pasta, simmer for 15 minutes.","Stir in spinach and cook 2 more minutes until wilted.","Season with salt and pepper."]},
"Saag Chicken":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Blanch spinach, then blend into a smooth puree.","Dice onion and cut chicken breast into pieces.","Saut\u00e9 onion until golden, add chicken and cook until browned.","Add spinach puree, greek yogurt, and spices. Simmer for 15 minutes.","Serve over rice."]},
"Stuffed Grape Leaves":{prepTime:"20 mins",cookTime:"40 mins",steps:["Mix cooked white rice with ground lamb, diced onion, and spices.","Blanch grape leaves briefly in boiling water and pat dry.","Place a spoonful of filling on each leaf and roll tightly, tucking in sides.","Layer stuffed leaves seam-side down in a pot.","Add olive oil, lemon juice, diced tomato, and enough water to just cover.","Cover and simmer on low for 35-40 minutes."]},
"Doenjang Jjigae":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Cut tofu into cubes. Slice zucchini, onion, and mushrooms.","Dissolve miso paste (doenjang) in 2 cups of water or anchovy broth.","Bring to a boil and add tofu, zucchini, onion, and mushrooms.","Simmer for 15 minutes until vegetables are tender.","Serve stew alongside rice."]},
"Chicken Souvlaki Plate":{prepTime:"15 mins",cookTime:"12 mins",steps:["Cut chicken breast into cubes and marinate with olive oil, oregano, lemon juice, salt, and pepper.","Thread chicken onto skewers if desired.","Grill or pan-sear chicken for 10-12 minutes, turning occasionally, until cooked through.","Dice cucumber, tomato, and red onion.","Mix greek yogurt with a pinch of garlic and salt for tzatziki.","Serve chicken with warm pita, tzatziki, and diced vegetables."]},
"Pulled Pork Sandwich":{prepTime:"10 mins",cookTime:"3 hrs",steps:["Season pork shoulder generously with salt, pepper, and smoked paprika.","Place in a slow cooker or Dutch oven with a splash of liquid, cover tightly.","Cook on low for 3 hours until fork-tender.","Shred pork with two forks and toss with BBQ sauce.","Toast the sub rolls.","Pile pulled pork on the rolls and top with coleslaw mix."]},
"Shrimp Scampi":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook spaghetti according to package directions.","Peel and devein shrimp. Mince garlic.","Melt butter in a large skillet, saut\u00e9 garlic for 1 minute.","Add shrimp and cook 2-3 minutes per side until pink.","Squeeze in lemon juice and toss with drained pasta.","Season with salt, pepper, and parsley if desired."]},
"Veggie Stir Fry with Tofu":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Press tofu and cut into cubes. Slice bell pepper, carrot, and mushrooms.","Heat sesame oil in a wok, cook tofu until golden on all sides.","Add vegetables and stir-fry for 4-5 minutes.","Add soy sauce and toss everything together.","Serve over rice."]},
"Chicken Fried Rice":{prepTime:"10 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results. Dice chicken breast.","Heat sesame oil in a wok over high heat, cook chicken until done, set aside.","Scramble egg in the wok, break apart.","Add rice, green peas, and diced carrot, stir-fry for 3-4 minutes.","Return chicken, add soy sauce, and toss until combined.","Serve immediately."]},
"Caprese Panini":{prepTime:"5 mins",cookTime:"8 mins",steps:["Slice tomato and mozzarella.","Layer mozzarella, tomato, and spinach on the flatbread.","Drizzle with olive oil, season with salt and pepper.","Fold or top with another piece of flatbread.","Press in a panini press or cook in a skillet with a weight on top, 3-4 minutes per side.","Slice and serve warm."]},
"Mujaddara":{prepTime:"10 mins",cookTime:"30 mins",steps:["Rinse red lentils and cook with white rice in 2.5 cups water for 20-25 minutes until tender.","Slice onion into thin rings.","Fry onion rings in olive oil until deeply caramelized and crispy, about 15 minutes.","Fluff the lentil-rice mixture and season with cumin, salt, and pepper.","Top with crispy onions.","Serve with a dollop of greek yogurt on the side."]},
"Pork Gyoza Plate":{prepTime:"20 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Mix ground pork (from pork shoulder) with finely chopped cabbage, soy sauce, sesame oil, and ginger.","Place a spoonful of filling in each gyoza wrapper, fold and pleat to seal.","Pan-fry gyoza in oil until bottoms are golden, about 2 minutes.","Add a splash of water, cover, and steam for 5-6 minutes.","Serve with rice and a soy sauce dipping sauce."]},
"Chicken Korma":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook basmati rice according to package directions.","Cut chicken thigh into pieces and dice onion.","Saut\u00e9 onion in oil until golden, add chicken and brown.","Stir in greek yogurt, coconut milk, and korma spices.","Simmer for 15-20 minutes until chicken is cooked through.","Stir in crushed peanuts and serve over rice."]},

"Turkey Meatballs & Zoodles":{prepTime:"15 mins",cookTime:"20 mins",steps:["Mix ground turkey with salt, pepper, and Italian seasoning. Form into meatballs.","Brown meatballs in olive oil on all sides.","Add tomato sauce, cover, and simmer for 15 minutes until meatballs are cooked through.","Spiralize or ribbon-cut zucchini into zoodles.","Saut\u00e9 zoodles briefly in a hot pan for 2 minutes.","Serve meatballs and sauce over zoodles with grated parmesan."]},

function adjustDayMeals(allMealData, targetCal, targetCarbs, targetProtein, targetFat) {
  var targets = [targetCal, targetCarbs, targetProtein, targetFat];
  var keys = ["calories", "carbs", "protein", "fat"];

  function computeTotals() {
    var t = [0,0,0,0];
    allMealData.forEach(function(meal) {
      meal.ingredients.forEach(function(ing) {
        if (!ing.isSpice) { t[0]+=ing.calories; t[1]+=ing.carbs; t[2]+=ing.protein; t[3]+=ing.fat; }
      });
    });
    return t;
  }

  function canAdjust(ing) { return !ing.isSpice && !isUnitBased(ing.name) && ing.name !== "Soy Sauce"; }
  function macroCal(k, v) { return k === 3 ? v*9 : v*4; }

  var used = {};

  for (var iter = 0; iter < 30; iter++) {
    var t = computeTotals();

    // Find worst macro (carbs=1, protein=2, fat=3) by % deviation
    var worstK = -1, worstDev = 0;
    for (var k = 1; k <= 3; k++) {
      if (targets[k] <= 0) continue;
      var dev = Math.abs(t[k] - targets[k]) / targets[k];
      if (dev > worstDev) { worstDev = dev; worstK = k; }
    }
    if (worstDev <= 0.03) break;

    var gap = targets[worstK] - t[worstK];
    var worstKey = keys[worstK];

    // Find best lever: highest selectivity + bonus for unused ingredients
    var bestMi = -1, bestIi = -1, bestSel = -999;
    allMealData.forEach(function(meal, mi) {
      meal.ingredients.forEach(function(ing, ii) {
        if (!canAdjust(ing) || ing.calories < 5 || ing[worstKey] < 0.5) return;
        var sel = ing.calories > 0 ? macroCal(worstK, ing[worstKey]) / ing.calories : 0;
        if (!used[mi + ":" + ii]) sel += 0.1;
        if (sel > bestSel) { bestSel = sel; bestMi = mi; bestIi = ii; }
      });
    });
    if (bestMi < 0) break;

    var ing = allMealData[bestMi].ingredients[bestIi];
    var partialGap = gap * 0.6;
    var targetVal = ing[worstKey] + partialGap;
    if (ing[worstKey] < 0.1) continue;
    var scale = targetVal / ing[worstKey];
    scale = Math.max(0.4, Math.min(2.5, scale));
    if (Math.abs(scale - 1) < 0.02) continue;

    var oldG = ing.grams;
    var newG = Math.round(oldG * scale);
    if (newG === oldG || newG < 5) continue;
    var actualScale = newG / oldG;
    ing.adjustment = "serving adjusted from " + oldG + "g to " + newG + "g to meet " + worstKey + " target";
    ing.calories = round1(ing.calories * actualScale);
    ing.carbs = round1(ing.carbs * actualScale);
    ing.protein = round1(ing.protein * actualScale);
    ing.fat = round1(ing.fat * actualScale);
    ing.grams = newG;
    used[bestMi + ":" + bestIi] = true;
  }

  return allMealData;
}

function generatePlan(targetCal, targetCarbs, targetProtein, targetFat, overrides, dayGroups, excludedDays) {
  var days = new Array(7), ingredientFrequency = {};
  var excluded = excludedDays || [];

  // Build generation slots: each group shares one plan, ungrouped days get individual plans
  var assigned = {};
  var slots = [];
  (dayGroups || []).forEach(function(group) {
    if (group.length > 0) { slots.push(group.slice()); group.forEach(function(d) { assigned[d] = true; }); }
  });
  for (var dd = 0; dd < 7; dd++) { if (!assigned[dd] && excluded.indexOf(dd) === -1) slots.push([dd]); }
  slots.sort(function(a, b) { return a[0] - b[0]; });

  for (var si = 0; si < slots.length; si++) {
    var slot = slots[si];
    var d = slot[0];
    var mealsPerDay = targetCal > 2200 ? 3 : (targetCal < 1500 ? 2 : (d % 2 === 0 ? 3 : 2));
    var includeBreakfast = mealsPerDay >= 3 && d % 3 === 0;
    var recentRecipes = {};
    // Look back at previous slots for variety
    for (var lb = Math.max(0, si - 2); lb < si; lb++) {
      slots[lb].forEach(function(dayIdx) { if (days[dayIdx]) days[dayIdx].meals.forEach(function(m) { recentRecipes[m.originalName] = true; }); });
    }

    function comboScore(picks) {
      var tc=0, tb=0, tp=0, tf=0;
      picks.forEach(function(r) { tc+=r.totalMacros.calories; tb+=r.totalMacros.carbs; tp+=r.totalMacros.protein; tf+=r.totalMacros.fat; });
      if (tc < 1) return 999;
      var s = Math.pow((tc-targetCal)/targetCal, 2);
      s += Math.pow((tb-targetCarbs)/Math.max(targetCarbs,1), 2);
      s += Math.pow((tp-targetProtein)/Math.max(targetProtein,1), 2);
      s += Math.pow((tf-targetFat)/Math.max(targetFat,1), 2);
      var ols = 0; picks[0].ingredients.forEach(function(ing) { if (!ing.isSpice && ingredientFrequency[ing.name]) ols += ingredientFrequency[ing.name]; });
      return s - ols * 0.01;
    }

    var bestPicks = null, bestScore = Infinity;
    for (var attempt = 0; attempt < 8; attempt++) {
      var picks = [], usedAttempt = {};
      for (var m = 0; m < mealsPerDay; m++) {
        var pool = (m === 0 && includeBreakfast) ? BREAKFAST_RECIPES : MAIN_RECIPES;
        var scored = [];
        for (var i = 0; i < pool.length; i++) {
          var r = pool[i], gi = RECIPES.indexOf(r);
          if (usedAttempt[gi] || recentRecipes[r.name]) continue;
          var testPicks = picks.concat([r]);
          scored.push({ recipe: r, index: gi, score: comboScore(testPicks) });
        }
        scored.sort(function(a, b) { return a.score - b.score; });
        var pick = scored[Math.min(Math.floor(Math.random() * 3), scored.length - 1)] || scored[0];
        if (!pick) continue;
        usedAttempt[pick.index] = true;
        picks.push(pick.recipe);
      }
      var sc = comboScore(picks);
      if (sc < bestScore) { bestScore = sc; bestPicks = picks; }
    }

    var allMealData = (bestPicks || []).map(function(recipe) {
      var ings = recipe.ingredients.map(function(ing) { return Object.assign({}, ing, { adjustment: null }); });
      applyIngredientOverrides(ings, overrides);
      return { recipe: recipe, ingredients: ings };
    });

    adjustDayMeals(allMealData, targetCal, targetCarbs, targetProtein, targetFat);

    var dayTotals = { calories:0, carbs:0, protein:0, fat:0 }, dayMeals = [];
    allMealData.forEach(function(md) {
      var mt = md.ingredients.filter(function(i){return !i.isSpice;}).reduce(function(a, i) { return { calories: a.calories+i.calories, carbs: a.carbs+i.carbs, protein: a.protein+i.protein, fat: a.fat+i.fat }; }, { calories:0, carbs:0, protein:0, fat:0 });
      dayTotals.calories += mt.calories; dayTotals.carbs += mt.carbs; dayTotals.protein += mt.protein; dayTotals.fat += mt.fat;
      md.ingredients.forEach(function(ing) { if (!ing.isSpice) ingredientFrequency[ing.name] = (ingredientFrequency[ing.name] || 0) + 1; });
      dayMeals.push({ originalName: md.recipe.name, name: md.recipe.name, cuisine: md.recipe.cuisine, isBreakfast: md.recipe.tags.indexOf("breakfast") !== -1, ingredients: md.ingredients, totalMacros: mt });
    });

    var totalsObj = { calories: round1(dayTotals.calories), carbs: round1(dayTotals.carbs), protein: round1(dayTotals.protein), fat: round1(dayTotals.fat) };

    // Assign to all days in this slot (deep copy for each)
    slot.forEach(function(dayIdx) {
      var clonedMeals = dayMeals.map(function(meal) {
        return Object.assign({}, meal, {
          ingredients: meal.ingredients.map(function(ing) { return Object.assign({}, ing); }),
          totalMacros: Object.assign({}, meal.totalMacros)
        });
      });
      days[dayIdx] = { day: dayIdx, meals: clonedMeals, totals: Object.assign({}, totalsObj) };
    });
  }
  return days;
}

function buildGroceryList(plan) {
  var map = {};
  plan.forEach(function(day, di) {
    if (!day) return;
    day.meals.forEach(function(meal) {
      meal.ingredients.forEach(function(ing) {
        if (!map[ing.name]) map[ing.name] = { name: ing.name, totalGrams: 0, totalUnits: 0, appearances: [], isSpice: !!ing.isSpice };
        map[ing.name].totalGrams += ing.grams;
        if (isUnitBased(ing.name)) map[ing.name].totalUnits += Math.max(1, getUnitCount(ing.name, ing.grams));
        map[ing.name].appearances.push("Day " + (di+1) + " \u2013 " + meal.name);
      });
    });
  });
  var categories = {};
  Object.values(map).forEach(function(item) { var cat = getCategory(item.name); if (!categories[cat]) categories[cat] = []; categories[cat].push(item); });
  var order = ["Proteins","Vegetables","Grains & Starches","Dairy","Pantry","Other","Spices"];
  return order.filter(function(c) { return categories[c]; }).map(function(c) {
    return { category: c, items: categories[c].sort(function(a, b) { return b.totalGrams - a.totalGrams; }) };
  });
}

// Practical grocery units for whole countable items
var GROCERY_COUNTABLE = {
  "Onion": { unit: "onion", plural: "onions", gPerUnit: 150 },
  "Red Onion": { unit: "red onion", plural: "red onions", gPerUnit: 150 },
  "Garlic": { unit: "clove", plural: "cloves", gPerUnit: 5 },
  "Lemon": { unit: "lemon", plural: "lemons", gPerUnit: 100 },
  "Lime": { unit: "lime", plural: "limes", gPerUnit: 70 },
  "Avocado": { unit: "avocado", plural: "avocados", gPerUnit: 150 },
  "Bell Pepper": { unit: "bell pepper", plural: "bell peppers", gPerUnit: 150 },
  "Egg": { unit: "egg", plural: "eggs", gPerUnit: 50 }
};

function groceryQtyText(item) {
  if (item.isSpice) return Math.round(item.totalGrams) + "g (~" + Math.max(1, Math.round(item.totalGrams / 3)) + " tsp)";
  var gc = GROCERY_COUNTABLE[item.name];
  if (gc) {
    var count = Math.ceil(item.totalGrams / gc.gPerUnit);
    return count + " " + (count === 1 ? gc.unit : gc.plural) + " (~" + Math.round(item.totalGrams) + "g)";
  }
  if (isUnitBased(item.name)) {
    var u = UNIT_INGREDIENTS[item.name];
    return item.totalUnits + " " + (item.totalUnits === 1 ? u.unit : u.plural);
  }
  var g = Math.round(item.totalGrams);
  var cat = getCategory(item.name);
  if (cat === "Proteins") return g + "g (" + formatImperial(g) + ")";
  if (item.name.indexOf("Oil") !== -1 || item.name.indexOf("Sauce") !== -1 || item.name === "Coconut Milk" || item.name === "Maple Syrup" || item.name === "Honey") {
    var tbsp = round1(g / 15);
    return g + "g (~" + (tbsp >= 1 ? round1(tbsp) + " tbsp" : round1(g / 5) + " tsp") + ")";
  }
  return g + "g (" + formatImperial(g) + ")";
}

function groceryToText(groceryList) {
  var lines = ["Weekly Grocery List","==================",""];
  groceryList.forEach(function(section) {
    lines.push(section.category); lines.push("-".repeat(section.category.length));
    section.items.forEach(function(item) { lines.push("  " + item.name + " - " + groceryQtyText(item)); });
    lines.push("");
  });
  return lines.join("\n");
}

var DAYS_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
var ALL_CUISINES = [...new Set(RECIPES.map(function(r) { return r.cuisine; }))].sort();

function ProgressBar(props) {
  var pct = Math.min((props.value / props.target) * 100, 120);
  return React.createElement("div", { className: "progress-bar" },
    React.createElement("div", { className: "progress-fill " + props.className, style: { width: Math.min(pct, 100) + "%", opacity: pct > 105 ? 0.7 : 1 } })
  );

// ===== STATS TRACKING =====
var STATS_KEY = "mealprep_stats";
function loadStats() { try { return JSON.parse(localStorage.getItem(STATS_KEY) || '{"plans":[]}'); } catch(e) { return {plans:[]}; } }
function saveStats(data) { localStorage.setItem(STATS_KEY, JSON.stringify(data)); }

// Record only the meals the user checked as eaten
function recordEatenMeals(plan, eatenMap, targetCal, targetCarbs, targetProtein, targetFat) {
  var data = loadStats();
  var now = new Date();
  var dateStr = now.toISOString().slice(0,10);
  var id = dateStr + "-" + now.getTime();
  var meals = [];
  var weekTotals = {calories:0,carbs:0,protein:0,fat:0};
  var daysWithMeals = 0;
  var ingredientGrams = {}; // track by total grams, not count
  var cuisines = {};
  plan.forEach(function(day, di) {
    if (!day) return;
    var dayAte = false;
    day.meals.forEach(function(meal, mi) {
      var key = di + "-" + mi;
      if (!eatenMap[key]) return; // skip unchecked meals
      dayAte = true;
      meals.push({recipe:meal.name,cuisine:meal.cuisine,day:DAYS_NAMES[di],calories:round1(meal.totalMacros.calories),carbs:round1(meal.totalMacros.carbs),protein:round1(meal.totalMacros.protein),fat:round1(meal.totalMacros.fat)});
      cuisines[meal.cuisine] = (cuisines[meal.cuisine]||0)+1;
      meal.ingredients.forEach(function(ing) {
        if (!ing.isSpice) {
          if (!ingredientGrams[ing.name]) ingredientGrams[ing.name] = 0;
          ingredientGrams[ing.name] += ing.grams;
        }
      });
      weekTotals.calories += meal.totalMacros.calories;
      weekTotals.carbs += meal.totalMacros.carbs;
      weekTotals.protein += meal.totalMacros.protein;
      weekTotals.fat += meal.totalMacros.fat;
    });
    if (dayAte) daysWithMeals++;
  });
  if (meals.length === 0) return data; // nothing eaten
  var daysForAvg = Math.max(daysWithMeals, 1);
  var avgCal = round1(weekTotals.calories/daysForAvg), avgCarbs = round1(weekTotals.carbs/daysForAvg);
  var avgPro = round1(weekTotals.protein/daysForAvg), avgFat = round1(weekTotals.fat/daysForAvg);
  var cuisineCount = Object.keys(cuisines).length;
  var calScore = Math.max(0, 100 - Math.abs(avgCal/targetCal*100 - 100)*3);
  var carbScore = Math.max(0, 100 - Math.abs(avgCarbs/targetCarbs*100 - 100)*3);
  var proScore = Math.max(0, 100 - Math.abs(avgPro/targetProtein*100 - 100)*3);
  var fatScore = Math.max(0, 100 - Math.abs(avgFat/targetFat*100 - 100)*3);
  var macroScore = (calScore+carbScore+proScore+fatScore)/4;
  var varietyS = Math.min(20, cuisineCount*4);
  var consistencyScore = Math.round(Math.min(100, macroScore*0.8 + varietyS));
  var entry = {id:id,date:dateStr,targets:{calories:targetCal,carbs:targetCarbs,protein:targetProtein,fat:targetFat},
    avgDaily:{calories:avgCal,carbs:avgCarbs,protein:avgPro,fat:avgFat},
    daysWithMeals:daysWithMeals,meals:meals,cuisines:cuisines,ingredientGrams:ingredientGrams,
    consistencyScore:consistencyScore,totalMeals:meals.length};
  data.plans.push(entry);
  saveStats(data);
  return data;
}

function StatsView(props) {
  var statsData = props.statsData;
  var onUpdate = props.onUpdate;
  var savedPlans = props.savedPlans || [];
  var onSavedPlansUpdate = props.onSavedPlansUpdate;
  var [confirmText, setConfirmText] = React.useState("");
  var [showConfirm, setShowConfirm] = React.useState(false);
  var [importMsg, setImportMsg] = React.useState("");

  var plans = statsData.plans || [];
  if (plans.length === 0) return (<div className="card"><h2>Stats</h2><p style={{color:'#6b7f7a'}}>No data yet. Generate a weekly plan to start tracking.</p></div>);

  // === Recipe History (includes all recipes, even uneaten) ===
  var recipeMap = {};
  // Seed with every recipe in the database at count 0
  RECIPES.forEach(function(r) {
    if (!recipeMap[r.name]) recipeMap[r.name] = {name:r.name,cuisine:r.cuisine,count:0,lastDate:null};
  });
  plans.forEach(function(p) {
    p.meals.forEach(function(m) {
      if (!recipeMap[m.recipe]) recipeMap[m.recipe] = {name:m.recipe,cuisine:m.cuisine,count:0,lastDate:null};
      recipeMap[m.recipe].count++;
      if (!recipeMap[m.recipe].lastDate || p.date > recipeMap[m.recipe].lastDate) recipeMap[m.recipe].lastDate = p.date;
    });
  });
  var recipeList = Object.values(recipeMap).sort(function(a,b){ return b.count !== a.count ? b.count - a.count : a.name.localeCompare(b.name); });
  var maxRecipeCount = recipeList.length > 0 ? recipeList[0].count : 1;

  // === Macro Trends ===
  var weeklyTrends = plans.map(function(p) {
    var calHit = Math.abs(p.avgDaily.calories/p.targets.calories - 1) <= 0.05;
    var cHit = Math.abs(p.avgDaily.carbs/p.targets.carbs - 1) <= 0.05;
    var pHit = Math.abs(p.avgDaily.protein/p.targets.protein - 1) <= 0.05;
    var fHit = Math.abs(p.avgDaily.fat/p.targets.fat - 1) <= 0.05;
    return {date:p.date,avg:p.avgDaily,targets:p.targets,allHit:calHit&&cHit&&pHit&&fHit,calHit:calHit,cHit:cHit,pHit:pHit,fHit:fHit};
  });
  // Consistent over/under detection
  var overUnder = {carbs:0,protein:0,fat:0};
  plans.forEach(function(p) {
    if (p.avgDaily.carbs > p.targets.carbs*1.05) overUnder.carbs++;
    else if (p.avgDaily.carbs < p.targets.carbs*0.95) overUnder.carbs--;
    if (p.avgDaily.protein > p.targets.protein*1.05) overUnder.protein++;
    else if (p.avgDaily.protein < p.targets.protein*0.95) overUnder.protein--;
    if (p.avgDaily.fat > p.targets.fat*1.05) overUnder.fat++;
    else if (p.avgDaily.fat < p.targets.fat*0.95) overUnder.fat--;
  });

  // === Cuisine Variety ===
  var totalCuisineMeals = 0;
  var cuisineTotals = {};
  plans.forEach(function(p) { Object.keys(p.cuisines).forEach(function(c) { cuisineTotals[c]=(cuisineTotals[c]||0)+p.cuisines[c]; totalCuisineMeals+=p.cuisines[c]; }); });
  var cuisineList = Object.entries(cuisineTotals).sort(function(a,b){return b[1]-a[1];}).map(function(e){return {name:e[0],count:e[1],pct:Math.round(e[1]/totalCuisineMeals*100)};});
  var dominantCuisine = cuisineList.length > 0 && cuisineList[0].pct > 40 ? cuisineList[0] : null;

  // === Ingredient by Weight ===
  var ingGramTotals = {};
  plans.forEach(function(p) {
    var src = p.ingredientGrams || p.ingredientCounts || {};
    Object.keys(src).forEach(function(n) { ingGramTotals[n]=(ingGramTotals[n]||0)+src[n]; });
  });
  var ingList = Object.entries(ingGramTotals).sort(function(a,b){return b[1]-a[1];}).slice(0,25).map(function(e){return {name:e[0],grams:Math.round(e[1])};});
  var maxIngGrams = ingList.length > 0 ? ingList[0].grams : 1;

  // === Consistency Score ===
  var avgScore = Math.round(plans.reduce(function(s,p){return s+p.consistencyScore;},0)/plans.length);

  // === Streak ===
  var sortedDates = plans.map(function(p){return p.date;}).sort();
  var currentStreak = 1, longestStreak = 1, tempStreak = 1;
  for (var si = 1; si < sortedDates.length; si++) {
    var d1 = new Date(sortedDates[si-1]), d2 = new Date(sortedDates[si]);
    var diff = Math.round((d2-d1)/(1000*60*60*24));
    if (diff <= 8) { tempStreak++; } else { tempStreak = 1; }
    if (tempStreak > longestStreak) longestStreak = tempStreak;
  }
  currentStreak = tempStreak;
  if (sortedDates.length <= 1) { currentStreak = plans.length; longestStreak = plans.length; }

  // === Calorie Target Drift ===
  var targetHistory = plans.map(function(p){return {date:p.date,cal:p.targets.calories,carbs:p.targets.carbs,protein:p.targets.protein,fat:p.targets.fat};});

  // === Data Management ===
  var dataSize = round1((new Blob([JSON.stringify(statsData)]).size + new Blob([JSON.stringify(savedPlans)]).size) / 1024);
  var totalRecipes = Object.keys(recipeMap).length;

  function handleExport() {
    var exportData = { stats: statsData, savedPlans: savedPlans, exportDate: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(exportData,null,2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = 'mealprep-data.json'; a.click(); URL.revokeObjectURL(url);
  }
  function handleImport(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        var msgs = [];
        // Handle new format (stats + savedPlans) or old format (just {plans:[]})
        var importedStats = imported.stats || (imported.plans ? imported : null);
        if (importedStats && importedStats.plans) {
          var current = loadStats();
          var existingIds = {};
          current.plans.forEach(function(p){existingIds[p.id]=true;});
          var added = 0;
          importedStats.plans.forEach(function(p) { if (!existingIds[p.id]) { current.plans.push(p); added++; } });
          saveStats(current); onUpdate(current);
          msgs.push(added + " stat entries");
        }
        // Import saved plans
        if (imported.savedPlans && Array.isArray(imported.savedPlans) && onSavedPlansUpdate) {
          var existingNames = {};
          savedPlans.forEach(function(p){existingNames[p.name]=true;});
          var merged = savedPlans.slice();
          var spAdded = 0;
          imported.savedPlans.forEach(function(p) { if (!existingNames[p.name]) { merged.push(p); spAdded++; } });
          onSavedPlansUpdate(merged);
          msgs.push(spAdded + " saved plans");
        }
        if (msgs.length === 0) { setImportMsg("Invalid file format"); return; }
        setImportMsg("Imported: " + msgs.join(", "));
        setTimeout(function(){setImportMsg("");},3000);
      } catch(err) { setImportMsg("Error reading file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }
  function handleClearAll() {
    if (confirmText !== "DELETE") return;
    saveStats({plans:[]});
    onUpdate({plans:[]});
    setShowConfirm(false); setConfirmText("");
  }
  function handleDeletePlan(id) {
    var d = loadStats();
    d.plans = d.plans.filter(function(p){return p.id!==id;});
    saveStats(d); onUpdate(d);
  }

  return (<>
    {/* KPIs */}
    <div className="card">
      <h2>Stats Overview</h2>
      <div className="stats-grid">
        <div className="stats-kpi"><div className="kv">{plans.length}</div><div className="kl">Plans Generated</div></div>
        <div className="stats-kpi"><div className="kv">{totalRecipes}</div><div className="kl">Unique Recipes</div></div>
        <div className="stats-kpi"><div className="kv">{avgScore}</div><div className="kl">Avg Score</div></div>
        <div className="stats-kpi"><div className="kv">{currentStreak}</div><div className="kl">Current Streak</div></div>
        <div className="stats-kpi"><div className="kv">{longestStreak}</div><div className="kl">Longest Streak</div></div>
        <div className="stats-kpi"><div className="kv">{cuisineList.length}</div><div className="kl">Cuisines Used</div></div>
      </div>
    </div>

    {/* Macro Trends */}
    <div className="card"><div className="stats-section"><h3>Macro Trends</h3>
      <div style={{overflowX:'auto'}}><table className="stats-table"><thead><tr><th>Date</th><th>Avg Cal</th><th>Avg C</th><th>Avg P</th><th>Avg F</th><th>On Target</th></tr></thead><tbody>
        {weeklyTrends.slice().reverse().map(function(w,i){return (<tr key={i}>
          <td>{w.date}</td>
          <td className={w.calHit?"stats-hit":"stats-miss"}>{w.avg.calories}</td>
          <td className={w.cHit?"stats-hit":"stats-miss"}>{w.avg.carbs}g</td>
          <td className={w.pHit?"stats-hit":"stats-miss"}>{w.avg.protein}g</td>
          <td className={w.fHit?"stats-hit":"stats-miss"}>{w.avg.fat}g</td>
          <td className={w.allHit?"stats-hit":"stats-miss"}>{w.allHit?"Yes":"No"}</td>
        </tr>);})}
      </tbody></table></div>
      {Math.abs(overUnder.carbs) >= 2 && <div className="stats-warn">Carbs consistently {overUnder.carbs>0?"over":"under"} target across {Math.abs(overUnder.carbs)} plans</div>}
      {Math.abs(overUnder.protein) >= 2 && <div className="stats-warn">Protein consistently {overUnder.protein>0?"over":"under"} target across {Math.abs(overUnder.protein)} plans</div>}
      {Math.abs(overUnder.fat) >= 2 && <div className="stats-warn">Fat consistently {overUnder.fat>0?"over":"under"} target across {Math.abs(overUnder.fat)} plans</div>}
    </div></div>

    {/* Recipe History */}
    <div className="card"><div className="stats-section"><h3>Recipe History ({recipeList.filter(function(r){return r.count>0;}).length} eaten / {recipeList.length} total)</h3>
      {recipeList.map(function(r,i){return (<div className="stats-bar-row" key={i} style={r.count===0?{opacity:0.5}:{}}>
        <span className="stats-bar-label" title={r.name}>{r.name}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill fill-pro" style={{width:maxRecipeCount>0?Math.round(r.count/maxRecipeCount*100)+"%":"0%"}}></div></div>
        <span className="stats-bar-val">{r.count === 0 ? "—" : r.count+"x"}</span>
        <span style={{fontSize:'0.72rem',color:'#6b7f7a',minWidth:58}}>{r.lastDate || "never"}</span>
      </div>);})}
    </div></div>

    {/* Cuisine Variety */}
    <div className="card"><div className="stats-section"><h3>Cuisine Variety</h3>
      {cuisineList.map(function(c,i){return (<div className="stats-bar-row" key={i}>
        <span className="stats-bar-label">{c.name}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill fill-carb" style={{width:c.pct+"%"}}></div></div>
        <span className="stats-bar-val">{c.pct}%</span>
      </div>);})}
      {dominantCuisine && <div className="stats-warn">{dominantCuisine.name} dominates at {dominantCuisine.pct}% of meals — consider more variety</div>}
    </div></div>

    {/* Ingredient by Weight */}
    <div className="card"><div className="stats-section"><h3>Top Ingredients by Weight</h3>

        var display = isUnitBased(ig.name) ? getUnitDisplay(ig.name, ig.grams) : formatImperial(ig.grams);
        return (<div className="stats-bar-row" key={i}>
          <span className="stats-bar-label">{ig.name}</span>
          <div className="stats-bar-track"><div className="stats-bar-fill fill-fat" style={{width:Math.round(ig.grams/maxIngGrams*100)+"%"}}></div></div>
          <span className="stats-bar-val">{display}</span>
        </div>);

    {/* Plan Consistency Scores */}

        <span className="stats-bar-label">{p.date}</span>
        <div className="stats-bar-track"><div className="stats-bar-fill" style={{width:p.consistencyScore+"%",background:p.consistencyScore>=70?'#2d6a4f':p.consistencyScore>=40?'#e67e22':'#e74c3c'}}></div></div>
