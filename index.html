                    </React.Fragment>);
                  })}
                  {spiceIngs.length > 0 && <tr className="md-spice-row"><td>{spiceIngs.map(function(s){return s.name;}).join(", ")}</td><td>{"\u2014"}</td><td>{"\u2014"}</td><td>{"\u2014"}</td><td>{"\u2014"}</td><td>{"\u2014"}</td></tr>}
                </tbody>
              </table>
              {cookData && cookData.steps && (<>
                <button className="md-instr-toggle" onClick={function(){setDetailInstrOpen(!detailInstrOpen);}}>{detailInstrOpen ? "\u25BC" : "\u25B6"} Cooking instructions</button>
                {detailInstrOpen && <div className="md-instr-list"><ol>{cookData.steps.map(function(step, si) { return <li key={si}>{step}</li>; })}</ol></div>}
              </>)}
            </div>
            <div className="md-actions">
              <button className="md-btn-swap" onClick={function(){setDetailModal(null);setDetailInstrOpen(false);setSwapTarget({dayIdx:di,mealIdx:mi});setSwapSearch("");}}>Swap meal</button>
              <button className={"md-btn-eaten" + (isEaten ? " active" : "")} onClick={function(){toggleEaten(di, mi);}}>{isEaten ? "Unmark eaten" : "Mark eaten \u2713"}</button>
            </div>
          </div>
        </div>);
      })()}

      {swapTarget && (function() {
        var searched = RECIPES.filter(function(r) { return !swapSearch || r.name.toLowerCase().indexOf(swapSearch.toLowerCase()) !== -1 || r.cuisine.toLowerCase().indexOf(swapSearch.toLowerCase()) !== -1; });
        var compatible = [], incompatible = [];
        if (swapScores) {
          searched.forEach(function(r) {
            var s = swapScores[r.name];
            if (s && s.inZone) compatible.push(r); else incompatible.push(r);
          });
          compatible.sort(function(a, b) { return (swapScores[a.name] ? swapScores[a.name].score : 99) - (swapScores[b.name] ? swapScores[b.name].score : 99); });
          incompatible.sort(function(a, b) { return (swapScores[a.name] ? swapScores[a.name].score : 99) - (swapScores[b.name] ? swapScores[b.name].score : 99); });
        }
        return (<div className="modal-overlay" onClick={function(e){if(e.target===e.currentTarget)setSwapTarget(null);}}>
        <div className="modal">
          <h3>Swap Recipe — {DAYS_NAMES[swapTarget.dayIdx]}, Meal {swapTarget.mealIdx+1}</h3>
          <p style={{fontSize:'0.82rem',color:'#6b7f7a',marginBottom:8}}>{swapScores ? "Ranked by macro fit. Solved macros show the full day's totals after swapping." : "Ranking recipes by macro fit..."}</p>
          <input className="modal-search" placeholder="Search recipes..." value={swapSearch} onChange={function(e){setSwapSearch(e.target.value);}} autoFocus />
          {!swapScores && <div style={{textAlign:'center',padding:'24px 0',color:'#6b7f7a',fontSize:'0.9rem'}}>Scoring {RECIPES.length} recipes against day targets...</div>}
          {swapScores && <div style={{maxHeight:'50vh',overflowY:'auto'}}>
            {compatible.map(function(r, i) {
              var s = swapScores[r.name];
              return (<div className="modal-recipe" key={r.name} onClick={function(){handleSwap(r);}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                  <span><span className="mr-name">{r.name}</span>{s.variantLabel && <span className="variant-tag" style={{marginLeft:6}}>{s.variantLabel}</span>} <span className="mr-cuisine">— {r.cuisine}</span></span>
                  <span style={{color:'#2d6a4f',fontSize:'0.75rem',fontWeight:600,whiteSpace:'nowrap'}}>{"\u2713"} Fits</span>
                </div>
                <div className="mr-macros">Day totals: Cal: {round1(s.totals.calories)} ({Math.round(s.pcts.cal)}%) | C: {round1(s.totals.carbs)}g ({Math.round(s.pcts.carbs)}%) | P: {round1(s.totals.protein)}g ({Math.round(s.pcts.pro)}%) | F: {round1(s.totals.fat)}g ({Math.round(s.pcts.fat)}%){s.shake && <span style={{color:'#5b21b6',marginLeft:6}}>+ shake</span>}</div>
              </div>);
            })}
            {incompatible.length > 0 && <div style={{marginTop:12}}>
              <button className="btn btn-sm btn-secondary" style={{width:'100%',fontSize:'0.8rem'}} onClick={function(){setSwapShowIncompat(!swapShowIncompat);}}>
                {swapShowIncompat ? "Hide" : "Show"} {incompatible.length} incompatible recipe{incompatible.length !== 1 ? "s" : ""}
              </button>
              {swapShowIncompat && incompatible.map(function(r) {
                var s = swapScores[r.name];
                return (<div className="modal-recipe" key={r.name} style={{opacity:0.55,cursor:'pointer',marginTop:8}} onClick={function(){handleSwap(r);}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                    <span><span className="mr-name">{r.name}</span>{s && s.variantLabel && <span className="variant-tag" style={{marginLeft:6,opacity:0.7}}>{s.variantLabel}</span>} <span className="mr-cuisine">— {r.cuisine}</span></span>
                    <span style={{color:'#e67e22',fontSize:'0.72rem',fontWeight:600,whiteSpace:'nowrap'}}>May miss targets</span>
                  </div>
                  {s && <div className="mr-macros">Day totals: Cal: {round1(s.totals.calories)} ({Math.round(s.pcts.cal)}%) | C: {round1(s.totals.carbs)}g ({Math.round(s.pcts.carbs)}%) | P: {round1(s.totals.protein)}g ({Math.round(s.pcts.pro)}%) | F: {round1(s.totals.fat)}g ({Math.round(s.pcts.fat)}%)</div>}
                </div>);
              })}
            </div>}
            {compatible.length === 0 && incompatible.length === 0 && <div style={{padding:'16px 0',color:'#6b7f7a',textAlign:'center',fontSize:'0.88rem'}}>No recipes match your search.</div>}
          </div>}
          <div style={{marginTop:12,textAlign:'right'}}><button className="btn btn-sm btn-secondary" onClick={function(){setSwapTarget(null);}}>Cancel</button></div>
        </div>
      </div>);
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Background validation: run 1000-week simulation and log full distribution summary.
// Target: zero recipes never selected, no single recipe above 3%.
(function() {
  var SIM_TOTAL = 1000, SIM_BATCH = 50;
  var freq = {}, totalSlots = 0, done = 0;
  RECIPES.forEach(function(r) { freq[r.name] = 0; });
  var simCal = 2000, simCarbG = round1((2000*0.35)/4), simProG = 200, simFatG = round1((2000*0.25)/9);
  _recipeRotation = { counts: {}, totalSlots: 0 };
  function batch() {
    var end = Math.min(done + SIM_BATCH, SIM_TOTAL);
    for (var i = done; i < end; i++) {
      var plan = generatePlan(simCal, simCarbG, simProG, simFatG, {}, [], []);
      plan.forEach(function(day) { if (!day) return; day.meals.forEach(function(meal) { freq[meal.originalName] = (freq[meal.originalName]||0)+1; totalSlots++; }); });
    }
    done = end;
    if (done < SIM_TOTAL) { setTimeout(batch, 0); return; }
    var sorted = Object.keys(freq).map(function(n) { return { name: n, count: freq[n], pct: round1((freq[n]/totalSlots)*100) }; }).sort(function(a,b) { return b.count - a.count; });
    var never = sorted.filter(function(r) { return r.count === 0; });
    var below1 = sorted.filter(function(r) { return r.pct < 1; });
    var topPct = sorted[0] ? sorted[0].pct : 0;
    var idealPct = round1(100 / RECIPES.length);
    console.log("[MealPrep Distribution Validation] 1000 weeks, " + totalSlots + " slots, " + RECIPES.length + " recipes (ideal ~" + idealPct + "% each)");
    console.log("  Never selected: " + never.length + (never.length === 0 ? " (PASS)" : " (FAIL — target 0)") + (never.length > 0 ? " — " + never.map(function(r){return r.name;}).join(", ") : ""));
    console.log("  Below 1%: " + below1.length + " recipes");
    console.log("  Most selected: " + sorted[0].name + " at " + sorted[0].pct + "% " + (topPct <= 3 ? "(PASS — target <=3%)" : "(FAIL — target <=3%)"));
    console.log("  Least selected: " + sorted[sorted.length-1].name + " at " + sorted[sorted.length-1].pct + "%");
    console.log("  Spread: top " + sorted[0].pct + "% / bottom " + sorted[sorted.length-1].pct + "% (ratio " + round1(sorted[0].pct / Math.max(sorted[sorted.length-1].pct, 0.1)) + "x)");
    // Turkey Breast recipe check: verify all 5 turkey recipes were selected at least once
    // Turkey Breast should appear in 5 recipes: Turkey & Broccoli Bowl, Turkey Lettuce Wraps,
    // Turkey Kofta Plate, Turkey Stir Fry with Rice, Turkey Burrito Bowl
    var turkeyRecipes = ["Turkey & Broccoli Bowl","Turkey Lettuce Wraps","Turkey Kofta Plate","Turkey Stir Fry with Rice","Turkey Burrito Bowl"];
    var turkeyAll = true;
    turkeyRecipes.forEach(function(name) {
      var count = freq[name] || 0;
      if (count === 0) turkeyAll = false;
      console.log("  Turkey: " + name + " — " + count + " selections" + (count === 0 ? " (NEVER)" : ""));
    });
    console.log("  Turkey Breast in 5 recipes: " + (turkeyAll ? "ALL SELECTED (PASS)" : "SOME MISSING (FAIL)"));
    _recipeRotation = { counts: {}, totalSlots: 0 };
  }
  setTimeout(batch, 100);
})();

// ===== FINAL ARCHITECTURE VALIDATION =====
// Baseline from 100-combo run: 94.9% pass, calLow 24, carbsLow 24, proLow 28, fatLow 18, fatHigh 8, shakes 23 days.
// Now running with 100 combos per day — should see improvement in pass rate and flag counts.
setTimeout(function() {
  console.log("\n========================================");
  console.log("[FINAL ARCHITECTURE VALIDATION]");
  console.log("========================================");
  var testCal = 2000, testCarbs = 175, testPro = 200, testFat = 55.6;
  var savedRot = { counts: Object.assign({}, _recipeRotation.counts), totalSlots: _recipeRotation.totalSlots };
  _recipeRotation = { counts: {}, totalSlots: 0 };

  // Test 1: 100-week macro accuracy validator (95-105% thresholds)
  var SIM_TOTAL = 100, SIM_BATCH = 10, done = 0;
  var totalDays = 0, passedDays = 0;
  var fc = { calHigh:0, calLow:0, carbsHigh:0, carbsLow:0, proHigh:0, proLow:0, fatHigh:0, fatLow:0 };
  var worst = { calLow:Infinity, calHigh:0, carbsLow:Infinity, carbsHigh:0, proLow:Infinity, proHigh:0, fatLow:Infinity, fatHigh:0 };
  var shakeDays = 0;
  function valBatch() {
    var end = Math.min(done + SIM_BATCH, SIM_TOTAL);
    for (var i = done; i < end; i++) {
      var plan = generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
      plan.forEach(function(day) {
        if (!day) return;
        totalDays++;
        var t = day.totals;
        var cp = Math.round(t.calories/testCal*100), bp = Math.round(t.carbs/testCarbs*100);
        var pp = Math.round(t.protein/testPro*100), fp = Math.round(t.fat/testFat*100);
        var flags = 0;
        if (cp > 105) { fc.calHigh++; flags++; } if (cp < 95) { fc.calLow++; flags++; }
        if (bp > 105) { fc.carbsHigh++; flags++; } if (bp < 95) { fc.carbsLow++; flags++; }
        if (pp > 105) { fc.proHigh++; flags++; } if (pp < 95) { fc.proLow++; flags++; }
        if (fp > 105) { fc.fatHigh++; flags++; } if (fp < 95) { fc.fatLow++; flags++; }
        if (t.calories < worst.calLow) worst.calLow = t.calories;
        if (t.calories > worst.calHigh) worst.calHigh = t.calories;
        if (t.carbs < worst.carbsLow) worst.carbsLow = t.carbs;
        if (t.carbs > worst.carbsHigh) worst.carbsHigh = t.carbs;
        if (t.protein < worst.proLow) worst.proLow = t.protein;
        if (t.protein > worst.proHigh) worst.proHigh = t.protein;
        if (t.fat < worst.fatLow) worst.fatLow = t.fat;
        if (t.fat > worst.fatHigh) worst.fatHigh = t.fat;
        if (day.proteinShake) shakeDays++;
        if (flags === 0) passedDays++;
      });
    }
    done = end;
    if (done < SIM_TOTAL) { setTimeout(valBatch, 0); return; }
    var passPct = round1(passedDays / totalDays * 100);
    console.log("\nTest 1: 100-Week Macro Accuracy (" + totalDays + " days)");
    console.log("  PASS RATE: " + passPct + "% (" + passedDays + "/" + totalDays + " within 95-105% on all 4 macros)");
    console.log("  Calories — low(<95%): " + fc.calLow + ", high(>105%): " + fc.calHigh + " | worst: " + round1(worst.calLow) + "-" + round1(worst.calHigh) + " (target " + testCal + ")");
    console.log("  Carbs    — low: " + fc.carbsLow + ", high: " + fc.carbsHigh + " | worst: " + round1(worst.carbsLow) + "g-" + round1(worst.carbsHigh) + "g (target " + testCarbs + "g)");
    console.log("  Protein  — low: " + fc.proLow + ", high: " + fc.proHigh + " | worst: " + round1(worst.proLow) + "g-" + round1(worst.proHigh) + "g (target " + testPro + "g)");
    console.log("  Fat      — low: " + fc.fatLow + ", high: " + fc.fatHigh + " | worst: " + round1(worst.fatLow) + "g-" + round1(worst.fatHigh) + "g (target " + testFat + "g)");
    console.log("  Protein shakes: " + shakeDays + "/" + totalDays + " days (" + round1(shakeDays/totalDays*100) + "%)");

    // Test 2: 5 plans generate correctly with 7 days each
    console.log("\nTest 2: Plan Generation Integrity (5 plans)");
    var pass2 = true;
    try {
      for (var pw = 0; pw < 5; pw++) {
        var p = generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
        var activeDays = p.filter(function(d) { return d && d.meals && d.meals.length >= 2; }).length;
        if (activeDays < 7) { pass2 = false; console.log("  FAIL: plan " + (pw+1) + " has only " + activeDays + "/7 days"); }
      }
    } catch(e) { pass2 = false; console.log("  FAIL: JS error — " + e.message); }
    console.log("  " + (pass2 ? "PASS — 5 plans, all 7 days populated" : "FAIL"));

    // Test 3: Recipe count matches expected
    console.log("\nTest 3: Database Integrity");
    var expectedCount = 135; // 134 + Lean Beef Tacos (Hearty Beef Tacos removed — duplicate after registry unification)
    var pass3 = RECIPES.length === expectedCount;
    console.log("  Recipe count: " + RECIPES.length + " (expected " + expectedCount + ") — " + (pass3 ? "PASS" : "FAIL"));

    // Test 4: Dead code verification
    console.log("\nTest 4: Dead Code Check");
    var pass4 = true;
    if (typeof RESCUE_ALLOWLIST !== "undefined") { pass4 = false; console.log("  FAIL: RESCUE_ALLOWLIST still defined"); }
    if (typeof MEAT_FISH_NAMES !== "undefined") { pass4 = false; console.log("  FAIL: MEAT_FISH_NAMES still defined"); }
    if (typeof BREAKFAST_RECIPES !== "undefined") { pass4 = false; console.log("  FAIL: BREAKFAST_RECIPES still defined"); }
    if (typeof MAIN_RECIPES !== "undefined") { pass4 = false; console.log("  FAIL: MAIN_RECIPES still defined"); }
    console.log("  " + (pass4 ? "PASS — all removed constants confirmed undefined" : "FAIL"));

    // Test 5: Variant system infrastructure
    console.log("\nTest 5: Variant System Infrastructure");
    var pass5 = true;
    var variantRecipes = RECIPES.filter(function(r) { return r.variants && r.variants.length > 0; });
    console.log("  Recipes with variants: " + variantRecipes.length + " (28 expected)");
    // Verify variant labels appear ONLY on recipes that have variants defined.
    // Labels on variant-equipped recipes are expected; labels on non-variant recipes are a bug.
    var vPlan = generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
    var labelCount = 0, noLabelCount = 0, spuriousLabels = 0;
    var variantNameSet = {};
    variantRecipes.forEach(function(r) { variantNameSet[r.name] = true; });
    for (var vw = 0; vw < 5; vw++) {
      var vp = (vw === 0) ? vPlan : generatePlan(testCal, testCarbs, testPro, testFat, {}, [], []);
      vp.forEach(function(day) {
        if (!day) return;
        day.meals.forEach(function(m) {
          if (m.variantLabel) {
            labelCount++;
            // Check if this recipe actually has variants — if not, label is spurious
            if (!variantNameSet[m.originalName]) { spuriousLabels++; console.log("  SPURIOUS: " + m.originalName + " got label '" + m.variantLabel + "' but has no variants"); }
          } else {
            noLabelCount++;
          }
        });
      });
    }
    if (spuriousLabels > 0) pass5 = false;
    console.log("  Across 5 plans: " + labelCount + " meals with variant label, " + noLabelCount + " without");
    console.log("  Spurious labels (on non-variant recipes): " + spuriousLabels + " — " + (spuriousLabels === 0 ? "PASS" : "FAIL"));
    console.log("  " + (pass5 ? "PASS — variant infrastructure ready, no variants active" : "FAIL"));

    // Summary
    console.log("\n========================================");
    var allPass = pass2 && pass3 && pass4 && pass5;
    console.log("[FINAL RESULT] " + (allPass ? "VARIANT INFRASTRUCTURE COMPLETE" : "ISSUES DETECTED — SEE ABOVE"));
    console.log("========================================");

    _recipeRotation = savedRot;
  }
  setTimeout(valBatch, 500);
}, 500);
</script>
