"French Toast":{prepTime:"5 mins",cookTime:"10 mins",steps:["Whisk together eggs, milk, and a pinch of cinnamon in a shallow dish.","Dip bread slices in the egg mixture, soaking each side for 10 seconds.","Melt butter in a pan over medium heat.","Cook bread slices 2-3 minutes per side until golden brown.","Serve topped with sliced strawberries, blueberries, sliced banana, and granola. Drizzle with maple syrup."]},
"Huevos Rancheros":{prepTime:"10 mins",cookTime:"15 mins",steps:["Warm corn tortillas in a dry pan until pliable.","Heat black beans in a small pot with a pinch of cumin and a splash of water.","Warm tomato sauce in a skillet.","Fry eggs sunny-side up in a lightly oiled pan.","Layer tortillas with beans, fried eggs, and warm tomato sauce.","Top with sliced avocado and crumbled feta cheese."]},
"Grilled Chicken & Rice Bowl":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook brown rice according to package directions.","Season chicken breast with salt, pepper, and a drizzle of olive oil.","Grill or pan-sear chicken over medium-high heat, 6-7 minutes per side until cooked through.","Steam or blanch broccoli florets until tender-crisp, about 4 minutes.","Slice the chicken and assemble bowls with rice, broccoli, and chicken.","Drizzle with remaining olive oil."]},
"Spaghetti Bolognese":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook spaghetti in salted boiling water according to package directions.","Dice the onion finely.","Brown ground beef in a large pan over medium-high heat, breaking it apart.","Add diced onion and cook until softened, about 3 minutes.","Pour in tomato sauce, season with oregano, dried basil, salt, and pepper. Simmer for 15 minutes.","Drain pasta, toss with the sauce, and top with grated parmesan."]},
"Chicken Burrito Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Season chicken breast with cumin and chili powder. Grill or pan-sear until cooked through, about 6-7 minutes per side.","Warm black beans in a small pot.","Dice bell pepper and slice avocado.","Slice the chicken and assemble bowls with rice, beans, bell pepper, and avocado."]},
"Teriyaki Salmon Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Pat salmon dry and season with salt and pepper.","Pan-sear salmon skin-side down in a hot oiled pan for 4 minutes, flip and cook 3 more minutes.","Glaze salmon with soy sauce during the last minute of cooking.","Cook edamame in boiling water for 3 minutes, then drain.","Assemble bowls with rice, salmon, and edamame."]},
"Chicken Tikka Masala":{prepTime:"15 mins",cookTime:"30 mins",steps:["Cut chicken breast into bite-sized pieces and marinate in greek yogurt with cumin, turmeric, garam masala, and coriander for at least 10 minutes.","Dice the onion.","Heat olive oil in a large pan and cook chicken pieces until browned on all sides.","In the same pan, saut\u00e9 onion until golden, then add tomato sauce.","Return chicken to the sauce and simmer for 15-20 minutes.","Serve over cooked basmati rice."]},
"Falafel Plate":{prepTime:"20 mins",cookTime:"15 mins",steps:["Drain and rinse chickpeas, then pulse in a food processor with cumin, coriander, and parsley until coarsely ground.","Form mixture into small patties or balls.","Pan-fry falafel in a bit of oil over medium heat, 3-4 minutes per side until golden.","Dice cucumber for a simple salad.","Arrange falafel on a plate with salad, warm pita bread, and a drizzle of tahini."]},
"Greek Chicken Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season chicken breast with oregano, salt, and pepper.","Grill or pan-sear chicken until cooked through, 6-7 minutes per side. Let rest, then slice.","Dice cucumber and red onion.","Crumble feta cheese.","Toss vegetables with olive oil and a squeeze of lemon.","Arrange salad on a plate and top with sliced chicken and feta."]},
"Beef Stir Fry":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook brown rice according to package directions.","Slice beef sirloin into thin strips against the grain.","Slice bell pepper and cut broccoli into small florets.","Heat sesame oil in a wok over high heat, sear beef strips for 2 minutes, set aside.","Stir-fry bell pepper and broccoli for 3-4 minutes.","Return beef to wok, add soy sauce, toss together, and serve over rice."]},
"Sausage Flatbread":{prepTime:"5 mins",cookTime:"12 mins",steps:["Cook pork sausage in a skillet, breaking into crumbles, for 4-5 minutes.","Preheat oven to 220\u00b0C (425\u00b0F). Place flatbread on a baking sheet.","Tear or slice mozzarella.","Arrange mozzarella and cooked sausage on flatbread. Sprinkle with oregano and drizzle with olive oil.","Bake for 8-10 minutes until cheese is melted and bubbly.","Season with salt and pepper before serving."]},
"Carnitas Tacos":{prepTime:"10 mins",cookTime:"3 hrs",steps:["Season pork shoulder with cumin, oregano, salt, and pepper.","Place in a slow cooker or Dutch oven with a splash of water and orange juice.","Cook on low for 3 hours until fork-tender, then shred with two forks.","Warm corn tortillas in a dry pan.","Fill tortillas with shredded pork, diced onion, and fresh cilantro.","Serve with lime wedges for squeezing over tacos."]},
"Miso Ramen":{prepTime:"10 mins",cookTime:"20 mins",steps:["Bring a pot of water to a boil and cook rice noodles according to package. Drain and set aside.","Slice pork loin slices thinly and sear in a hot pan until browned.","Dissolve miso paste in 3 cups of hot broth or water.","Bring miso broth to a gentle simmer, add spinach and cook 1 minute.","Soft-boil an egg (6-7 minutes), peel and halve.","Assemble bowls with noodles, miso broth, pork, egg, and sliced green onion."]},
"Palak Paneer":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Blanch spinach in boiling water for 2 minutes, then blend into a smooth puree.","Dice onion and mince garlic.","Saut\u00e9 onion and garlic in oil until golden.","Add spinach puree, cumin, garam masala, and turmeric. Simmer for 5 minutes.","Cube paneer, add to the sauce, and cook for 5 more minutes. Serve over rice."]},
"Shawarma Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice chicken thigh into strips and season with cumin, paprika, turmeric, cinnamon, and allspice.","Cook chicken in a hot skillet for 5-6 minutes until browned and cooked through.","Dice cucumber.","Assemble bowls with rice, chicken, hummus, and cucumber."]},
"Kimchi Fried Rice":{prepTime:"5 mins",cookTime:"10 mins",steps:["Dice pork loin into small pieces.","Heat sesame oil in a wok, cook pork loin until browned, about 4 minutes.","Add chopped kimchi and a pinch of gochugaru. Stir-fry for 2 minutes.","Add cooked rice and toss everything together over high heat.","Push rice to the side, fry an egg in the center of the wok.","Plate rice topped with the fried egg and sliced green onion."]},
"Lamb & Lentil Soup":{prepTime:"10 mins",cookTime:"30 mins",steps:["Dice onion and carrot. Mince garlic.","Heat olive oil in a large pot. Brown ground lamb for 4-5 minutes, breaking it apart.","Add onion, garlic, and carrot. Cook 2 minutes.","Add red lentils, tomato sauce, and 3 cups water or broth.","Bring to a boil, then reduce heat and simmer for 25 minutes until lentils are soft.","Season with salt and pepper, blend partially if desired."]},
"Pork Club Wrap":{prepTime:"10 mins",cookTime:"10 mins",steps:["Slice pork loin thinly and sear in a hot pan for 2-3 minutes per side.","Warm the tortilla in a dry pan or microwave for 15 seconds.","Layer sliced pork loin on the tortilla.","Slice avocado.","Add spinach and avocado on top of the pork.","Roll up tightly, tucking in the sides. Slice in half and serve."]},
"Shrimp Primavera":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook penne pasta in salted boiling water according to package directions.","Peel and devein shrimp. Dice zucchini and bell pepper.","Heat olive oil in a large pan. Sear shrimp for 2-3 minutes per side until pink. Set aside.","Saut\u00e9 zucchini and bell pepper for 4-5 minutes.","Toss drained pasta with vegetables, shrimp, grated parmesan, and a pinch of dried basil.","Season with salt and pepper."]},
"Shrimp Tacos":{prepTime:"10 mins",cookTime:"10 mins",steps:["Season shrimp with salt, pepper, and cumin.","Sear shrimp in a hot oiled pan for 2-3 minutes per side until pink.","Warm corn tortillas in a dry pan.","Shred cabbage thinly.","Fill tortillas with shrimp, cabbage, coleslaw, and sliced avocado.","Serve with lime wedges."]},
"Chicken Stir Fry":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Cut chicken breast into bite-sized pieces.","Heat sesame oil in a wok, cook chicken until golden on all sides, about 6-8 minutes.","Add broccoli florets and sliced carrot, stir-fry 4-5 minutes.","Add soy sauce and toss everything together.","Serve over rice."]},
"Lamb Kofta Plate":{prepTime:"15 mins",cookTime:"12 mins",steps:["Mix ground lamb with cumin, paprika, coriander, minced onion, and salt.","Form mixture into oval-shaped kofta patties or cylinders.","Grill or pan-fry kofta for 4-5 minutes per side until cooked through.","Dice red onion.","Arrange kofta on a plate with hummus, warm pita bread, and red onion."]},
"Japchae":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook sweet potato noodles according to package, drain and toss with a little sesame oil.","Slice beef sirloin into thin strips.","Blanch spinach, squeeze dry, and season with sesame oil.","Julienne bell pepper and carrot.","Stir-fry beef in a hot pan, set aside. Stir-fry vegetables briefly.","Combine noodles, beef, vegetables, soy sauce, and sesame oil. Toss together and serve."]},
"Brown Rice Power Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice in water according to package directions.","Peel and cube sweet potato, toss with olive oil and roast at 200\u00b0C (400\u00b0F) for 20 minutes.","Season and grill or pan-sear chicken breast until cooked through, then slice.","Arrange bowls with brown rice, roasted sweet potato, sliced chicken, and fresh spinach.","Drizzle with remaining olive oil."]},
"BBQ Chicken Plate":{prepTime:"10 mins",cookTime:"35 mins",steps:["Peel and cube sweet potato, roast at 200\u00b0C (400\u00b0F) for 25 minutes.","Season chicken thighs with salt, pepper, and paprika.","Grill or bake chicken for 20-25 minutes until cooked through.","Brush chicken with BBQ sauce during the last 5 minutes of cooking.","Toss coleslaw mix with a light dressing.","Serve chicken with roasted sweet potato and coleslaw."]},
"Chana Masala":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Dice onion and mince garlic.","Heat olive oil in a pan, saut\u00e9 onion and garlic until golden.","Add cumin, turmeric, garam masala, coriander, and chili powder. Toast for 30 seconds.","Add chickpeas and tomato sauce, simmer for 15-20 minutes.","Serve over rice."]},
"Poke Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and let it cool slightly.","Cut ahi tuna into 1cm cubes.","Marinate tuna in soy sauce and a dash of sesame oil for 5 minutes.","Slice avocado and cucumber.","Cook edamame in boiling water for 3 minutes, drain.","Assemble bowls with rice, marinated tuna, avocado, cucumber, and edamame."]},
"Bulgogi Rice Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice beef sirloin thinly and marinate in soy sauce, sesame oil, and a pinch of sugar for 10 minutes.","Julienne carrot and slice green onion.","Cook marinated beef in a hot skillet for 3-4 minutes until caramelized.","Assemble bowls with rice, bulgogi beef, carrot, and green onion."]},
"Egg Fried Rice":{prepTime:"5 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results.","Heat sesame oil in a wok over high heat.","Scramble eggs in the wok, break into small pieces.","Add rice and green peas, stir-fry for 3-4 minutes.","Add diced carrot and soy sauce, toss until heated through.","Serve immediately."]},
"Tuna Nicoise Salad":{prepTime:"15 mins",cookTime:"15 mins",steps:["Boil potato until tender, about 12 minutes. Slice when cool.","Hard-boil egg for 10 minutes, peel and quarter.","Blanch green beans for 3 minutes, then cool in ice water.","Arrange potato, egg, green beans, and drained tuna on a plate.","Drizzle with olive oil and season with salt and pepper."]},
"Chicken Quesadilla":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season and cook chicken breast in a pan until done, then dice.","Dice bell pepper and onion, saut\u00e9 until softened.","Place tortilla in a dry pan, add chicken, vegetables, and cheddar cheese on one half.","Fold tortilla over and cook 2-3 minutes per side until golden and cheese melts.","Let rest for 1 minute, then cut into wedges."]},
"Lamb & Hummus Wrap":{prepTime:"10 mins",cookTime:"10 mins",steps:["Season ground lamb with cumin, paprika, salt, and pepper. Cook in a skillet over medium-high heat for 5-6 minutes until browned.","Warm the tortilla briefly in a dry pan or microwave.","Spread hummus generously over the tortilla.","Slice cucumber and carrot into thin sticks.","Layer cooked lamb, spinach, cucumber, and carrot on top.","Roll up tightly, tucking in the sides. Slice in half and serve."]},
"Chicken Caesar Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season chicken breast with salt, pepper, and garlic powder.","Grill or pan-sear chicken 6-7 minutes per side until cooked through. Let rest, then slice.","Wash and chop romaine lettuce.","Toss lettuce with olive oil and a squeeze of lemon as dressing.","Top with sliced chicken, shaved parmesan, and croutons."]},
"Lamb Shawarma Wrap":{prepTime:"10 mins",cookTime:"12 mins",steps:["Season ground lamb with cumin, paprika, turmeric, cinnamon, and allspice. Form into a flat patty or crumbles.","Cook lamb in a hot skillet until browned and cooked through, about 8 minutes.","Warm the tortilla in a dry pan.","Slice red onion.","Layer lamb, red onion, and a drizzle of tahini on the tortilla.","Roll up tightly and serve."]},
"Shrimp Fried Rice":{prepTime:"10 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results.","Peel and devein shrimp.","Heat sesame oil in a wok over high heat, cook shrimp 2 minutes per side, set aside.","Scramble egg in the wok, break apart.","Add rice and green peas, stir-fry for 3 minutes.","Return shrimp, add soy sauce, and toss until combined."]},
"Butter Chicken":{prepTime:"15 mins",cookTime:"25 mins",steps:["Cook basmati rice according to package directions.","Cut chicken breast into bite-sized pieces.","Melt butter in a large pan and sear chicken until golden on all sides.","Add tomato sauce, cumin, turmeric, garam masala, and coriander. Simmer for 10 minutes.","Stir in greek yogurt and cook for 5 more minutes on low heat.","Serve over rice."]},
"Mediterranean Stuffed Peppers":{prepTime:"15 mins",cookTime:"30 mins",steps:["Preheat oven to 190\u00b0C (375\u00b0F).","Cook brown rice according to package directions.","Brown ground beef in a skillet with cumin and oregano.","Mix cooked brown rice, beef, tomato sauce, and half the feta.","Cut bell peppers in half and remove seeds.","Stuff peppers with the mixture, top with remaining feta, and bake for 25 minutes."]},
"Korean Chicken Wings":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook white rice according to package directions.","Pat chicken thighs dry and season with gochugaru, salt, and pepper.","Bake thighs at 220\u00b0C (425\u00b0F) for 25-30 minutes until crispy, flipping halfway.","Mix soy sauce, honey, minced garlic, and sesame oil for the glaze.","Toss baked chicken in the glaze.","Serve chicken over rice."]},
"Spaghetti alle Vongole":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook spaghetti in salted boiling water until al dente. Reserve 1 cup of pasta water.","Peel and devein shrimp (or scrub clams if using). Mince garlic.","Heat olive oil in a large skillet over medium-high heat. Saut\u00e9 garlic for 30 seconds.","Add shrimp and cook 2-3 minutes per side until pink and curled.","Add a splash of pasta water and squeeze of lemon juice, toss with cooked spaghetti.","Season with chili flakes, parsley, salt and pepper. Serve immediately."]},
"Chicken Enchiladas":{prepTime:"15 mins",cookTime:"25 mins",steps:["Preheat oven to 190\u00b0C (375\u00b0F).","Cook and shred chicken breast, or dice finely. Season with cumin and chili powder.","Mix chicken with diced onion and half the cheddar cheese.","Warm corn tortillas briefly to make them pliable.","Fill tortillas with chicken mixture, roll up, and place seam-side down in a baking dish.","Pour tomato sauce over enchiladas, top with remaining cheese, and bake for 20 minutes."]},
"Sushi Bowl (Chirashi)":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and season with a splash of rice vinegar while warm.","Slice salmon fillet into thin sashimi-style pieces.","Slice avocado and cucumber.","Cook edamame in boiling water for 3 minutes, drain.","Arrange rice in a bowl and artfully top with salmon, avocado, cucumber, and edamame.","Serve with soy sauce on the side."]},
"Aloo Gobi":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Peel and cube potato. Cut cauliflower into florets.","Dice onion.","Heat olive oil in a pan, saut\u00e9 onion until golden.","Add potato, cauliflower, tomato sauce, cumin, turmeric, coriander, and chili powder. Cover and cook for 20 minutes, stirring occasionally.","Serve over rice."]},
"Tabbouleh with Grilled Chicken":{prepTime:"15 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions and let cool.","Season and grill chicken breast until cooked through, then dice.","Finely dice cucumber.","Toss cooled brown rice with cucumber, olive oil, and lemon juice.","Season with salt and pepper.","Top tabbouleh with diced grilled chicken."]},
"Pork Tonkatsu":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Pound pork loin to even thickness and season with salt and pepper.","Set up breading station: flour, beaten egg, panko breadcrumbs.","Coat pork in flour, dip in egg, then press into panko.","Pan-fry in oil over medium-high heat for 3-4 minutes per side until golden and crispy.","Slice tonkatsu and serve with rice and shredded cabbage."]},
"Thai Basil Chicken":{prepTime:"10 mins",cookTime:"10 mins",steps:["Cook white rice according to package directions.","Dice chicken breast into small pieces.","Mince garlic and slice bell pepper.","Heat sesame oil in a wok over high heat, cook chicken until browned.","Add garlic, bell pepper, and soy sauce. Stir-fry for 3-4 minutes.","Serve over rice."]},
"Tuscan White Bean Soup":{prepTime:"10 mins",cookTime:"20 mins",steps:["Slice pork loin into small pieces. Mince garlic.","Heat olive oil in a large pot. Brown pork for 3-4 minutes. Add garlic and cook 1 minute.","Add white beans, tomato sauce, oregano, and 2 cups water or broth.","Simmer for 15 minutes.","Stir in spinach and cook until wilted, about 2 minutes.","Toast whole wheat bread and serve soup with bread on the side."]},
"Mango Chicken Curry":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Cut chicken thigh into pieces and dice onion.","Saut\u00e9 onion in oil until softened, add chicken and brown on all sides.","Add coconut milk, diced mango, cumin, turmeric, and garam masala.","Simmer for 15-20 minutes until chicken is cooked and sauce thickens.","Serve over rice."]},
"Grilled Salmon & Asparagus":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Trim asparagus ends and toss with olive oil, salt, and pepper.","Season salmon fillet with salt, pepper, and lemon juice.","Grill or bake salmon and asparagus at 200\u00b0C (400\u00b0F) for 12-15 minutes.","Plate brown rice, top with salmon and asparagus.","Squeeze fresh lemon over everything."]},
"Beef Tacos":{prepTime:"10 mins",cookTime:"12 mins",steps:["Brown ground beef in a skillet over medium-high heat, breaking it apart.","Season with cumin, chili powder, salt, and pepper.","Dice onion and avocado.","Warm corn tortillas in a dry pan.","Fill tortillas with seasoned beef, onion, avocado, and cilantro.","Serve immediately."]},
"Chicken Pesto Pasta":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook pasta according to package directions.","Season and pan-sear chicken breast until cooked through, then slice.","Toss drained pasta with pesto sauce.","Top with sliced chicken and grated parmesan cheese."]},
"Katsu Curry":{prepTime:"15 mins",cookTime:"25 mins",steps:["Cook white rice according to package directions.","Dice onion and carrot for the curry sauce.","Saut\u00e9 onion and carrot in oil, add curry powder and water, simmer for 15 minutes.","Pound chicken breast to even thickness, coat in flour, beaten egg, then panko.","Pan-fry chicken for 3-4 minutes per side until golden and crispy.","Slice katsu and serve with rice and curry sauce."]},
"Spicy Tuna Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and let it cool slightly.","Cut ahi tuna into cubes.","Mix tuna with soy sauce, sesame oil, and chili flakes.","Slice avocado and cucumber.","Assemble bowls with rice, spicy tuna, avocado, and cucumber.","Drizzle with extra sesame oil if desired."]},
"Steak & Sweet Potato":{prepTime:"10 mins",cookTime:"30 mins",steps:["Peel and cube sweet potato, toss with a little oil and roast at 200\u00b0C (400\u00b0F) for 25 minutes.","Season beef sirloin with salt and pepper.","Sear steak in a hot pan with butter for 3-4 minutes per side for medium.","Let steak rest for 5 minutes, then slice.","Steam broccoli until tender-crisp, about 4 minutes.","Serve sliced steak with sweet potato and broccoli."]},
"Chicken Lettuce Wraps with Rice":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook white rice according to package directions.","Dice chicken breast into small pieces.","Heat oil in a wok, cook chicken until browned.","Add soy sauce and cook 1 more minute.","Grate or julienne carrot.","Separate romaine lettuce leaves to use as cups.","Fill lettuce cups with chicken, carrot, and crushed peanuts. Squeeze lime over top. Serve with rice on the side."]},
"Dal Tadka":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cook brown rice according to package directions.","Rinse red lentils and cook in 2.5 cups water until soft, about 20 minutes.","Dice onion and mince garlic.","Heat butter in a small pan, saut\u00e9 garlic and onion until golden (this is the tadka).","Add tomato sauce, cumin, turmeric, and chili powder to the tadka, cook 2 minutes.","Pour the tadka over the cooked lentils, stir, and serve over rice."]},
"Baba Ganoush Plate":{prepTime:"10 mins",cookTime:"30 mins",steps:["Roast whole eggplant at 220\u00b0C (425\u00b0F) for 25-30 minutes until completely soft.","Scoop out eggplant flesh and mash with tahini, olive oil, and lemon juice.","Season with salt, pepper, and a pinch of cumin.","Dice cucumber.","Arrange baba ganoush on a plate with cucumber and warm pita bread."]},
"Dakgalbi":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Cut chicken breast into bite-sized pieces.","Peel and cube sweet potato, slice cabbage.","Stir-fry chicken in sesame oil with gochugaru and gochujang until nearly cooked.","Add sweet potato and cabbage, cook for 10-12 minutes until vegetables are tender.","Serve over rice."]},
"Pork Milanese":{prepTime:"10 mins",cookTime:"15 mins",steps:["Pound pork loin between plastic wrap to 1cm thickness.","Set up breading station: flour, beaten egg, panko breadcrumbs.","Dredge pork in flour, dip in egg, coat in panko.","Heat olive oil in a large skillet over medium-high heat.","Fry breaded pork for 3-4 minutes per side until golden and cooked through (internal temp 63\u00b0C/145\u00b0F).","Serve on a bed of spinach with tomato sauce and a squeeze of lemon."]},
"Black Bean Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Warm black beans in a pot with cumin and a pinch of salt.","Slice avocado.","If using fresh corn, saut\u00e9 kernels briefly in a hot pan.","Assemble bowls with rice, beans, avocado, and corn.","Squeeze lime over everything."]},
"Salmon Teriyaki Bento":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Season salmon fillet with salt and pepper.","Pan-sear salmon for 4 minutes per side, glaze with soy sauce in the last minute.","Steam broccoli for 4 minutes until tender-crisp.","Cook edamame in boiling water for 3 minutes, drain.","Arrange rice, salmon, broccoli, and edamame in a bento box or plate."]},
"Chicken Alfredo":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook pasta according to package directions. Reserve 1 cup pasta water.","Season and pan-sear chicken breast until cooked through, then slice.","Melt butter in a large pan, saut\u00e9 minced garlic for 1 minute.","Add pasta water gradually and stir in grated parmesan until a creamy sauce forms.","Toss pasta in the sauce.","Top with sliced chicken."]},
"Lamb Biryani":{prepTime:"15 mins",cookTime:"35 mins",steps:["Wash and soak basmati rice for 10 minutes, then parboil until 70% cooked. Drain.","Brown ground lamb in a pot with diced onion and minced garlic.","Add greek yogurt, cumin, turmeric, garam masala, cardamom, cinnamon, and bay leaf, cook for 5 minutes.","Layer parboiled rice over the lamb mixture.","Cover tightly and cook on low heat for 15-20 minutes until rice is fully cooked.","Fluff gently and serve."]},
"Shrimp & Feta Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook brown rice according to package directions and let cool.","Peel and devein shrimp.","Sear shrimp 2-3 minutes per side until pink.","Dice cucumber.","Toss brown rice with cucumber, olive oil, lemon juice, a pinch of oregano, and crumbled feta.","Top salad with warm shrimp."]},
"Meatball Sub":{prepTime:"15 mins",cookTime:"20 mins",steps:["Mix ground beef with breadcrumbs, salt, pepper, and a beaten egg. Form into meatballs.","Brown meatballs in a pan on all sides, about 5 minutes.","Add tomato sauce, cover, and simmer for 15 minutes until meatballs are cooked through.","Split the sub roll and toast lightly.","Fill the roll with meatballs and sauce.","Top with sliced mozzarella and broil briefly until cheese melts."]},
"Chicken Shawarma Plate":{prepTime:"15 mins",cookTime:"15 mins",steps:["Slice chicken breast into strips and marinate with cumin, paprika, turmeric, cinnamon, allspice, and olive oil.","Cook chicken in a hot skillet for 5-6 minutes until browned and cooked through.","Warm pita bread in a dry pan.","Dice cucumber.","Arrange chicken on a plate with pita, hummus, and cucumber."]},
"Beef Japchae":{prepTime:"15 mins",cookTime:"15 mins",steps:["Soak sweet potato noodles in warm water for 10 minutes, then cook in boiling water for 5-6 minutes. Drain and cut with scissors.","Slice beef sirloin into thin strips. Marinate with soy sauce, sesame oil, and a pinch of sugar.","Blanch spinach for 30 seconds, drain and squeeze dry. Season with sesame oil and salt.","Julienne carrot and bell pepper.","Stir-fry beef in a hot pan for 2-3 minutes until browned. Remove. Stir-fry vegetables for 2-3 minutes.","Toss noodles, beef, spinach, and vegetables together. Season with soy sauce and sesame oil."]},
"Shrimp Fra Diavolo":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook pasta in salted boiling water until al dente. Drain, reserving pasta water.","Peel and devein shrimp. Mince garlic and dice onion.","Heat olive oil in a large skillet. Saute onion and garlic for 2-3 minutes.","Add tomato sauce and a pinch of chili flakes. Simmer for 10 minutes.","Add shrimp and cook 3-4 minutes until pink and curled.","Toss with pasta, adding a splash of pasta water to coat. Serve immediately."]},
"Cobb Salad":{prepTime:"15 mins",cookTime:"15 mins",steps:["Season and grill or pan-sear chicken breast until cooked through, then dice.","Hard-boil egg for 10 minutes, peel and quarter.","Dice avocado.","Chop romaine lettuce and arrange on a plate.","Arrange rows of chicken, egg, avocado, and crumbled cheddar on the lettuce.","Drizzle with olive oil and season with salt and pepper."]},
"Veggie Sushi Wrap":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice and season with rice vinegar while warm. Let cool.","Julienne cucumber, carrot, and slice avocado thinly.","Warm a tortilla in a dry pan.","Spread seasoned rice over the tortilla and arrange vegetables in a line.","Roll tightly into a wrap. Slice in half.","Serve with soy sauce."]},
"Chipotle Chicken Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Season chicken thigh with cumin, paprika, chili powder, and garlic powder. Cook in a hot pan for 6-7 minutes per side.","Warm black beans in a pot.","Dice avocado. Cook corn in a hot dry pan for a charred effect.","Slice chicken and assemble bowls with rice, beans, corn, chicken, and avocado."]},
"Minestrone Soup":{prepTime:"10 mins",cookTime:"25 mins",steps:["Slice pork loin into small pieces. Dice zucchini and carrot.","Heat olive oil in a large pot, brown pork for 3-4 minutes. Add carrot and cook 3 minutes.","Add zucchini, tomato sauce, and 3 cups water or broth.","Add white beans, pasta, oregano, and dried basil. Simmer for 15 minutes.","Stir in spinach and cook 2 more minutes until wilted.","Season with salt and pepper."]},
"Saag Chicken":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook basmati rice according to package directions.","Blanch spinach, then blend into a smooth puree.","Dice onion and cut chicken breast into pieces.","Saut\u00e9 onion until golden, add chicken and cook until browned.","Add spinach puree, greek yogurt, cumin, turmeric, garam masala, and coriander. Simmer for 15 minutes.","Serve over rice."]},
"Stuffed Grape Leaves":{prepTime:"20 mins",cookTime:"40 mins",steps:["Mix cooked white rice with ground lamb, diced onion, allspice, and cinnamon.","Blanch grape leaves briefly in boiling water and pat dry.","Place a spoonful of filling on each leaf and roll tightly, tucking in sides.","Layer stuffed leaves seam-side down in a pot.","Add olive oil, lemon juice, and enough water to just cover.","Cover and simmer on low for 35-40 minutes."]},
"Doenjang Jjigae":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Slice pork belly into thin pieces. Slice zucchini and onion.","Brown pork belly in the pot for 3-4 minutes until crispy. Dissolve miso paste (doenjang) in 2 cups of water or anchovy broth.","Bring to a boil and add zucchini and onion.","Simmer for 15 minutes until vegetables are tender.","Serve stew alongside rice."]},
"Chicken Souvlaki Plate":{prepTime:"15 mins",cookTime:"12 mins",steps:["Cut chicken breast into cubes and marinate with olive oil, oregano, lemon juice, salt, and pepper.","Thread chicken onto skewers if desired.","Grill or pan-sear chicken for 10-12 minutes, turning occasionally, until cooked through.","Dice cucumber and red onion.","Mix greek yogurt with a pinch of garlic and salt for tzatziki.","Serve chicken with warm pita, tzatziki, and diced vegetables."]},
"Pulled Pork Sandwich":{prepTime:"10 mins",cookTime:"3 hrs",steps:["Season pork shoulder generously with salt, pepper, and smoked paprika.","Place in a slow cooker or Dutch oven with a splash of liquid, cover tightly.","Cook on low for 3 hours until fork-tender.","Shred pork with two forks and toss with BBQ sauce.","Toast the sub rolls.","Pile pulled pork on the rolls and top with coleslaw mix."]},
"Shrimp Scampi":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook spaghetti according to package directions.","Peel and devein shrimp. Mince garlic.","Melt butter in a large skillet, saut\u00e9 garlic for 1 minute.","Add shrimp and cook 2-3 minutes per side until pink.","Squeeze in lemon juice and toss with drained pasta.","Season with salt, pepper, and parsley if desired."]},
"Shrimp & Veggie Stir Fry":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Peel and devein shrimp. Slice bell pepper, carrot, and zucchini.","Heat sesame oil in a wok, cook shrimp until pink on all sides, about 2-3 minutes per side. Set aside.","Add vegetables and stir-fry for 4-5 minutes.","Return shrimp, add soy sauce and toss everything together.","Serve over rice."]},
"Chicken Fried Rice":{prepTime:"10 mins",cookTime:"10 mins",steps:["Use day-old cooked rice for best results. Dice chicken breast.","Heat sesame oil in a wok over high heat, cook chicken until done, set aside.","Scramble egg in the wok, break apart.","Add rice, green peas, and diced carrot, stir-fry for 3-4 minutes.","Return chicken, add soy sauce, and toss until combined.","Serve immediately."]},
"Caprese Panini":{prepTime:"5 mins",cookTime:"8 mins",steps:["Slice mozzarella and pork loin.","Layer pork, mozzarella, and spinach on the flatbread.","Drizzle with olive oil, season with salt and pepper.","Fold or top with another piece of flatbread.","Press in a panini press or cook in a skillet with a weight on top, 3-4 minutes per side.","Slice and serve warm."]},

"Chicken Korma":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook basmati rice according to package directions.","Cut chicken thigh into pieces and dice onion.","Saut\u00e9 onion in oil until golden, add chicken and brown.","Stir in greek yogurt, coconut milk, cumin, coriander, turmeric, cardamom, and cinnamon.","Simmer for 15-20 minutes until chicken is cooked through.","Stir in crushed peanuts and serve over rice."]},
"Beef Bulgogi Noodle Bowl":{prepTime:"15 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Cook rice noodles according to package directions, drain.","Slice beef sirloin thinly and marinate in soy sauce, sesame oil, garlic, and a pinch of sugar.","Cook beef in a hot skillet for 3-4 minutes until caramelized.","Julienne carrot.","Assemble bowls with rice, rice noodles, bulgogi beef, and carrot."]},
"Beef Meatballs & Zoodles":{prepTime:"15 mins",cookTime:"20 mins",steps:["Mix ground beef with salt, pepper, and oregano and dried basil. Form into meatballs.","Brown meatballs in olive oil on all sides.","Add tomato sauce, cover, and simmer for 15 minutes until meatballs are cooked through.","Spiralize or ribbon-cut zucchini into zoodles.","Saut\u00e9 zoodles briefly in a hot pan for 2 minutes.","Serve meatballs and sauce over zoodles with grated parmesan."]},
"Lamb Tagine":{prepTime:"10 mins",cookTime:"35 mins",steps:["Dice onion and mince garlic. Dice carrot into small pieces.","Brown ground lamb in a pot over medium-high heat for 5 minutes, breaking it apart. Drain excess fat.","Add onion, garlic, and carrot. Saut\u00e9 for 3-4 minutes until softened.","Add tomato sauce, drained chickpeas, and cumin, cinnamon, ginger, turmeric, and paprika. Add 1 cup water.","Cover and simmer for 25 minutes until sauce thickens and flavors meld.","Season with salt and pepper. Serve in a bowl."]},
"Pesto Shrimp Pasta":{prepTime:"10 mins",cookTime:"15 mins",steps:["Bring a pot of salted water to a boil. Cook pasta according to package directions until al dente. Drain.","Peel and devein shrimp. Sear in a hot pan for 2-3 minutes per side until pink.","Toss hot pasta with pesto sauce and shrimp in a bowl.","Top with grated parmesan cheese and serve immediately."]},
"Shrimp Ceviche Bowl":{prepTime:"20 mins",cookTime:"5 mins",steps:["Cook and cool shrimp: boil for 2-3 minutes until pink, then ice bath and dice.","Dice avocado and cucumber.","Toss shrimp with lime juice, diced vegetables, salt, and a pinch of chili.","Refrigerate for 10 minutes to let flavors meld.","Warm corn tortillas in a dry pan.","Serve ceviche in a bowl with tortillas on the side."]},
"Asian Noodle Soup":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook rice noodles according to package directions, drain.","Slice chicken thigh and sear in a pot until browned.","Add 3 cups water or dashi broth and soy sauce, bring to a simmer.","Add spinach and cook for 1 minute.","Soft-boil an egg (6-7 minutes), peel and halve.","Place noodles in bowls, ladle broth and chicken over them, top with egg and green onion."]},
"Mediterranean Tuna Salad":{prepTime:"10 mins",cookTime:"0 mins",steps:["Drain canned tuna.","Dice cucumber and thinly slice red onion.","Toss tuna with vegetables and olive oil.","Season with salt, pepper, and oregano.","Toast whole wheat bread.","Serve salad with toast on the side."]},
"Beef & Broccoli":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice beef sirloin into thin strips against the grain.","Cut broccoli into small florets.","Heat sesame oil in a wok over high heat, sear beef for 2 minutes, set aside.","Stir-fry broccoli for 3-4 minutes, add soy sauce.","Return beef to wok, toss together, and serve over rice."]},
"Veggie Burrito":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Warm black beans in a pot with cumin.","Slice bell pepper and avocado.","Warm the tortilla in a dry pan.","Layer rice, black beans, bell pepper, avocado, and cheddar cheese on the tortilla.","Roll up tightly, tucking in the sides, and serve."]},
"Okonomiyaki":{prepTime:"10 mins",cookTime:"15 mins",steps:["Shred cabbage finely and slice green onion.","Mix panko breadcrumbs with water to form a batter.","Stir in shredded cabbage, green onion, and beaten eggs.","Heat a pan and add thin-sliced pork loin.","Pour batter over the thin-sliced pork loin and cook for 5-6 minutes per side until golden and set.","Serve with okonomiyaki sauce and mayonnaise."]},
"Paneer Tikka Wrap":{prepTime:"15 mins",cookTime:"10 mins",steps:["Cut paneer into cubes and marinate in greek yogurt with cumin, turmeric, garam masala, coriander, and chili powder for 10 minutes.","Dice bell pepper and onion.","Grill or pan-sear paneer and vegetables until charred and cooked.","Warm the tortilla in a dry pan.","Arrange paneer and vegetables on the tortilla.","Roll up tightly and serve."]},
"Shrimp Spinach & Rice Salad":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook brown rice according to package directions and let cool.","Peel and devein shrimp. Sear in a hot pan for 2-3 minutes per side until pink.","Wash spinach and toss with a drizzle of olive oil.","Slice avocado.","Toss spinach, brown rice, avocado, and shrimp together.","Top with crushed peanuts, remaining olive oil, salt and pepper."]},
"Lamb Gyro":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season ground lamb with cumin, oregano, garlic, salt, and pepper.","Cook lamb as crumbles in a hot skillet for 5-6 minutes, set aside.","Season chicken breast with salt, pepper, and oregano. Cook in the same skillet for 4-5 minutes per side, then slice thinly.","Warm pita bread in a dry pan.","Slice red onion and dice cucumber.","Mix greek yogurt with a pinch of garlic and lemon juice for tzatziki.","Fill pita with lamb, sliced chicken, vegetables, and tzatziki."]},
"Lomo Saltado":{prepTime:"10 mins",cookTime:"15 mins",steps:["Season beef sirloin with cumin. Slice into thick strips. Cut onion into wedges. Slice bell pepper.","Heat olive oil in a wok or large skillet over very high heat.","Sear beef strips for 2-3 minutes until browned. Remove and set aside.","In the same pan, stir-fry onion and bell pepper for 2 minutes.","Add tomato sauce and soy sauce, toss for 1 minute.","Return beef to the pan, squeeze lime juice over everything, and toss. Serve over white rice."]},
"Pollo Guisado":{prepTime:"10 mins",cookTime:"30 mins",steps:["Cut chicken thigh into chunks. Dice onion, bell pepper, and potato.","Heat olive oil in a Dutch oven, brown chicken pieces for 3-4 minutes per side.","Add onion, bell pepper, and garlic. Cook 3 minutes until softened.","Add tomato sauce, coconut milk, cumin, oregano, potatoes, and green beans.","Cover and simmer for 20-25 minutes until potatoes are tender and sauce thickens.","Squeeze lime juice over the stew and serve."]},
"Feijoada":{prepTime:"10 mins",cookTime:"40 mins",steps:["Cook white rice according to package directions.","Dice onion and mince garlic. Cut pork shoulder into small cubes.","Heat olive oil in a large pot. Brown pork for 5 minutes on all sides.","Add onion and garlic, cook 3 minutes until softened.","Add drained black beans, a pinch of cumin, and 2 cups water. Simmer for 30 minutes until pork is tender.","Season with salt and pepper, squeeze lime juice, and serve over rice."]},
"Moqueca":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Peel and devein shrimp. Dice onion and bell pepper.","Heat olive oil in a deep pan. Saute onion and bell pepper for 3 minutes.","Add tomato sauce and paprika. Cook 2 minutes until softened.","Pour in coconut milk and bring to a simmer. Add shrimp.","Cook for 5-6 minutes until shrimp are pink. Squeeze lime and serve over rice."]},
"Paella Mixta":{prepTime:"15 mins",cookTime:"30 mins",steps:["Dice onion and bell pepper. Mince garlic. Trim green beans and halve.","Heat olive oil in a wide pan. Brown chicken thigh pieces for 4-5 minutes. Remove.","Saute onion, bell pepper, and garlic for 3 minutes.","Add rice, tomato sauce, paprika, and 2 cups water or broth. Stir once.","Return chicken, add green beans and peas. Do not stir again.","Simmer for 18-20 minutes until rice absorbs liquid. Add shrimp for last 5 minutes. Rest 5 minutes before serving."]},
"Ceviche de Pescado":{prepTime:"20 mins",cookTime:"5 mins",steps:["Boil shrimp for 2-3 minutes until pink. Transfer to ice bath, then dice.","Boil sweet potato until fork-tender, about 15 minutes. Slice into rounds.","Dice onion, mango, and avocado. Chop cilantro.","Toss diced shrimp with lime juice, onion, and cilantro. Refrigerate 10 minutes.","Cook corn on the cob or use canned corn, warmed.","Plate ceviche with avocado, sweet potato rounds, mango, and corn on the side."]},
"Arroz con Pollo":{prepTime:"10 mins",cookTime:"30 mins",steps:["Season chicken breast with cumin, oregano, salt, and pepper. Dice onion and bell pepper.","Heat olive oil in a large pot. Brown chicken for 4 minutes per side. Remove.","Saute onion, bell pepper, and garlic for 3 minutes.","Add rice, tomato sauce, coconut milk, green beans, and 1.5 cups water.","Nestle chicken into the rice. Cover and cook 20 minutes until rice is done.","Stir in green peas and cilantro. Rest 5 minutes before serving."]},
"Gambas al Ajillo":{prepTime:"5 mins",cookTime:"10 mins",steps:["Peel and devein shrimp. Thinly slice garlic.","Heat olive oil in a small skillet over medium heat. Add garlic and cook 1 minute until fragrant.","Add shrimp and a pinch of chili flakes. Cook 2-3 minutes per side until pink and curled.","Squeeze lemon juice over the shrimp.","Toast whole wheat bread slices.","Serve shrimp over a bed of spinach with bread on the side."]},
"Aji de Gallina":{prepTime:"15 mins",cookTime:"25 mins",steps:["Cook white rice according to package directions. Hard-boil the egg.","Poach or simmer chicken breast in water for 15 minutes until cooked. Shred with two forks.","Soak bread in a splash of water to soften. Blend soaked bread with peanuts into a paste.","Saute onion and garlic in olive oil until soft. Stir in cumin and turmeric. Add the bread-peanut paste.","Stir in shredded chicken and cook 5 minutes until sauce thickens.","Serve over rice topped with sliced hard-boiled egg."]},
"Ropa Vieja":{prepTime:"40 mins",cookTime:"3 hrs 30 mins",steps:["Cook white rice according to package directions.","Marinate beef sirloin with oregano, cumin, black pepper, mashed garlic, adobo, soy sauce, and juice of half a lemon for at least 30 minutes.","Heat olive oil in a large pot. Sear marinated beef for 3 minutes per side.","Add water and bay leaves to the pot. Cover and braise on low heat for 3 hours.","Remove bay leaves. Shred beef with two forks in the sauce.","Add diced onion, bell pepper, eggplant, and tomato sauce. Cook for 10-15 minutes until vegetables are tender. Serve over rice."]},
"Picanha with Farofa":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice and black beans separately according to package directions.","Season beef sirloin generously with coarse salt.","Grill or pan-sear beef for 4-5 minutes per side for medium-rare.","Dice onion and saute with garlic in a dry pan for farofa flavor base.","Fry an egg sunny-side up.","Slice the steak against the grain. Serve with rice, beans, egg, and a squeeze of lime."]},
"Tortilla Espanola":{prepTime:"10 mins",cookTime:"20 mins",steps:["Peel and thinly slice potato. Slice onion into thin rings.","Heat olive oil in a non-stick skillet. Gently fry potato and onion for 10 minutes until soft.","Beat eggs in a large bowl. Add the cooked potato and onion mixture. Stir in spinach.","Pour the mixture back into the oiled skillet over medium-low heat.","Cook for 6-8 minutes until the bottom is set. Flip using a plate and cook 4 more minutes.","Slide onto a plate and serve warm or at room temperature."]},
"Beef Pho":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook rice noodles according to package directions. Drain and set aside.","Slice beef sirloin very thinly against the grain.","Bring 3 cups water or beef broth to a boil with sliced onion, garlic, a cinnamon stick, and a splash of soy sauce.","Place noodles in bowls. Arrange raw beef slices on top.","Pour boiling broth over the beef — the heat will cook the thin slices.","Top with spinach, a squeeze of lime, and serve immediately."]},
"Chicken Pho":{prepTime:"10 mins",cookTime:"20 mins",steps:["Slice chicken breast into thin strips.","Bring 3 cups water or chicken broth to a boil with sliced onion, garlic, and a cinnamon stick.","Add chicken strips and simmer for 8-10 minutes until cooked through.","Cook rice noodles according to package directions.","Place noodles in bowls, ladle broth and chicken over them.","Top with spinach and a squeeze of lime."]},
"Bun Tom":{prepTime:"15 mins",cookTime:"10 mins",steps:["Cook rice noodles according to package directions, drain and rinse with cold water.","Season shrimp with salt and pepper. Grill or pan-sear for 2-3 minutes per side.","Julienne cucumber and carrot into thin strips.","Arrange cold noodles in bowls with romaine lettuce.","Top with grilled shrimp, cucumber, and carrot.","Squeeze lime over everything and toss gently."]},
"Tuna Tataki Bowl":{prepTime:"10 mins",cookTime:"10 mins",steps:["Cook white rice according to package directions.","Pat ahi tuna dry and season with salt. Sear in a very hot pan for 30-45 seconds per side.","Slice seared tuna into thin pieces.","Cook edamame in boiling water for 3 minutes. Drain.","Mix a small amount of miso paste with soy sauce for dressing.","Arrange rice in bowl, top with tuna, cucumber, and edamame. Drizzle with dressing."]},
"Chicken Yakitori Bowl":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Cut chicken breast into bite-sized pieces.","Mix soy sauce, honey, and sesame oil to make yakitori glaze.","Thread chicken onto skewers or cook in a hot pan, glazing frequently, for 6-8 minutes.","Slice green onion for garnish.","Serve glazed chicken over rice, topped with green onion."]},
"Greek Lemon Chicken":{prepTime:"10 mins",cookTime:"25 mins",steps:["Cook brown rice according to package directions.","Season chicken breast with lemon juice, minced garlic, oregano, salt, and pepper.","Heat olive oil in a skillet. Sear chicken for 6-7 minutes per side until cooked through.","Wilt spinach in the same pan for 1-2 minutes.","Slice red onion thinly.","Serve chicken over rice with spinach, red onion, and a lemon wedge."]},
"Seared Tuna Steak":{prepTime:"5 mins",cookTime:"5 mins",steps:["Pat ahi tuna steak dry. Season with salt and pepper.","Heat olive oil in a skillet over very high heat.","Sear tuna for 1-2 minutes per side for rare, 3 minutes for medium.","Mince garlic and squeeze lemon juice.","Arrange spinach and sliced cucumber on a plate.","Place seared tuna on greens. Drizzle with lemon-garlic dressing."]},
"Turkey & Broccoli Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Slice turkey breast into strips. Mince garlic.","Heat a non-stick pan, cook turkey strips for 4-5 minutes per side until golden.","Steam or blanch broccoli for 3-4 minutes until bright green.","Add a splash of soy sauce to the turkey in the last minute.","Serve turkey and broccoli over rice."]},
"Chicken & Sweet Potato Bowl":{prepTime:"10 mins",cookTime:"25 mins",steps:["Peel and cube sweet potato. Toss with a drizzle of olive oil and roast at 200C for 20 minutes.","Season chicken breast with garlic, salt, and pepper.","Grill or pan-sear chicken for 6-7 minutes per side until cooked through. Slice.","Dice onion and wilt spinach briefly in a hot pan.","Arrange roasted sweet potato, sliced chicken, and spinach in a bowl.","Serve with sauteed onion."]},
"Shrimp Fajitas":{prepTime:"10 mins",cookTime:"10 mins",steps:["Peel and devein shrimp. Season with cumin, paprika, salt, and pepper.","Slice bell pepper and onion into strips.","Heat a skillet over high heat. Sear shrimp 2-3 minutes per side. Set aside.","In the same pan, cook bell pepper and onion strips for 3-4 minutes.","Warm tortilla in a dry pan.","Fill tortilla with shrimp, peppers, and onion. Top with cilantro and lime."]},
"Tandoori Chicken":{prepTime:"15 mins",cookTime:"20 mins",steps:["Mix Greek yogurt with minced garlic, lemon juice, and cumin, paprika, turmeric, and garam masala.","Coat chicken breast in the marinade. Refrigerate for at least 10 minutes.","Grill or bake chicken at 220C for 15-20 minutes until charred and cooked through.","Cook a small portion of basmati rice.","Slice onion into rings for garnish.","Serve tandoori chicken with rice and onion rings."]},
"Jerk Chicken Rice Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions.","Season chicken breast with allspice, thyme, garlic powder, and cayenne.","Grill or pan-sear chicken for 6-7 minutes per side. Let rest, then slice.","Dice bell pepper and onion. Saute briefly.","Heat coconut milk gently for a drizzle.","Serve sliced chicken over rice with peppers, onion, lime, and coconut drizzle."]},
"Pollo a la Plancha":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Season chicken breast with garlic, lime juice, cumin, salt, and pepper.","Heat olive oil on a flat griddle or skillet over high heat.","Cook chicken for 5-6 minutes per side until charred and cooked through.","Dice onion for a simple salsa criolla (onion with lime juice).","Serve grilled chicken with rice and salsa criolla."]},
"Turkey Lettuce Wraps":{prepTime:"10 mins",cookTime:"10 mins",steps:["Slice turkey breast into thin strips or small dice.","Heat a non-stick pan over medium-high heat. Cook turkey for 4-5 minutes until golden.","Add a splash of soy sauce and toss to coat in the last minute.","Grate or julienne carrot into thin strips.","Separate romaine lettuce leaves to use as cups.","Fill lettuce cups with turkey and carrot. Squeeze lime over top and serve with sliced onion."]},
"Turkey Kofta Plate":{prepTime:"15 mins",cookTime:"12 mins",steps:["Mince or finely chop turkey breast. Mix with finely diced onion, cumin, coriander, salt, and pepper.","Form into small oval patties or cylinder shapes.","Cook kofta in a hot skillet for 3-4 minutes per side until browned and cooked through.","Warm pita bread in a dry pan.","Slice cucumber and red onion. Mix Greek yogurt with a pinch of garlic for tzatziki.","Serve kofta with pita, hummus, vegetables, and tzatziki."]},
"Turkey Stir Fry with Rice":{prepTime:"10 mins",cookTime:"15 mins",steps:["Cook white rice according to package directions.","Slice turkey breast into thin strips. Mince garlic.","Heat sesame oil in a wok over high heat. Stir-fry turkey for 3-4 minutes until browned.","Add sliced bell pepper and broccoli florets. Stir-fry for 3 more minutes.","Add soy sauce and toss everything together.","Serve over rice."]},
"Turkey Burrito Bowl":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook brown rice according to package directions.","Season turkey breast strips with cumin, paprika, salt, and pepper.","Cook turkey in a hot pan for 4-5 minutes per side until done. Slice.","Warm black beans in a small pot with a pinch of cumin.","Dice onion and chop cilantro.","Assemble bowl with rice, turkey, black beans, corn, onion, and cilantro. Squeeze lime over top."]},
"Lean Beef Tacos":{prepTime:"10 mins",cookTime:"10 mins",steps:["Season 90% lean ground beef with cumin, chili powder, salt, and pepper.","Brown beef in a skillet over medium-high heat for 6-8 minutes, breaking apart.","Warm corn tortillas in a dry pan for 30 seconds per side.","Dice onion and chop cilantro.","Fill tortillas with seasoned beef, onion, and cilantro.","Squeeze lime over tacos and serve."]},
"Baked Cod with Lemon & Herbs":{prepTime:"10 mins",cookTime:"20 mins",steps:["Cook white rice according to package directions. Steam or blanch broccoli until tender-crisp, about 4 minutes.","Preheat oven to 200\u00b0C (400\u00b0F).","Place cod fillets on a lined baking sheet. Season with salt, pepper, oregano, parsley, and minced garlic.","Drizzle with olive oil and squeeze lemon juice over the fish.","Bake for 12-15 minutes until fish flakes easily with a fork.","Serve cod over rice with broccoli on the side."]}
